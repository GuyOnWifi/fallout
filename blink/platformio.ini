; PlatformIO project — XIAO ESP32-S3 blink
; Hybrid framework: Arduino + ESP-IDF. You can #include Arduino.h AND
; ESP-IDF headers (driver/gpio.h, freertos/*, esp_wifi.h, ...) in the same file.

[env:seeed_xiao_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32s3
framework = arduino, espidf

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; XIAO ESP32-S3 uses native USB-CDC for serial + flashing.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
