; Three envs share one src/ dir via build_src_filter:
;   wrist_a  (ARM_ID=0)  -> flash to player-A wristband
;   wrist_b  (ARM_ID=1)  -> flash to player-B wristband
;   dongle               -> flash to the receiver plugged into the laptop
;
; All three are the same XIAO ESP32-S3 board.
;
; Flash examples:
;   pio run -e wrist_a -t upload --upload-port /dev/ttyACM0
;   pio run -e wrist_b -t upload --upload-port /dev/ttyACM0
;   pio run -e dongle  -t upload --upload-port /dev/ttyACM0
[platformio]
src_dir = src

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:wrist_right]
build_src_filter = +<wrist.cpp>
build_flags = ${env.build_flags} -DARM_ID=0

[env:wrist_left]
build_src_filter = +<wrist.cpp>
build_flags = ${env.build_flags} -DARM_ID=1

[env:dongle]
build_src_filter = +<dongle.cpp>

; ── XIAO ESP32-C3 variants for wristbands. The C3 does NOT auto-enter
; bootloader over RTS/DTR the way the S3 does. Manual boot sequence:
;   1. Unplug USB
;   2. Hold the small BOOT button (labeled B, near USB port)
;   3. Plug USB back in while still holding BOOT
;   4. Release BOOT
;   5. Then run the upload command below
;
; MPU I2C pin overrides. XIAO C3 label → GPIO map:
;   D4 → GPIO6 (default SDA)
;   D5 → GPIO7 (default SCL)
; If a board was soldered with the SDA/SCL wires crossed, use the "_swap"
; env variant to flip them in software instead of resoldering.
[env:wrist_right_c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
board_build.flash_mode = dio
build_src_filter = +<wrist.cpp>
build_flags = -DARM_ID=0 -DMPU_SDA_PIN=6 -DMPU_SCL_PIN=7

[env:wrist_left_c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
board_build.flash_mode = dio
build_src_filter = +<wrist.cpp>
build_flags = -DARM_ID=1 -DMPU_SDA_PIN=6 -DMPU_SCL_PIN=7

; ── Same C3 boards but with SDA/SCL wired swapped (fixes solder mistakes
; in software). Physical wiring: SDA lands on the D5 pad, SCL on the D4 pad.
[env:wrist_right_c3_swap]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
board_build.flash_mode = dio
build_src_filter = +<wrist.cpp>
build_flags = -DARM_ID=0 -DMPU_SDA_PIN=7 -DMPU_SCL_PIN=6

[env:wrist_left_c3_swap]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
board_build.flash_mode = dio
build_src_filter = +<wrist.cpp>
build_flags = -DARM_ID=1 -DMPU_SDA_PIN=7 -DMPU_SCL_PIN=6

; ── One-shot diagnostic. Walks every safe GPIO pair on the C3 and reports
; which pair (if any) shows an I2C device. Flash this when the sensor
; is not responding on the expected pins.
[env:pinsweep_c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
board_build.flash_mode = dio
build_src_filter = +<pinsweep.cpp>

