<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soup Sports — Tennis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  /* ── Soup Sports palette (from index.html) ── */
  :root {
    --sky-top:    #7bd3ee;
    --sky-mid:    #4fc0e3;
    --sky-deep:   #2a95c4;
    --water:      #37a7d0;
    --cream:      #fbf3e0;
    --cream-warm: #f6e9c9;
    --cream-deep: #ecdcb1;
    --ruin-blue:  #37628a;
    --ruin-teal:  #2f8fa3;
    --vine:       #6cb85a;
    --vine-deep:  #4a9440;
    --ink:        #1c2a3a;
    --ink-soft:   #476278;
    --hot:        #ff9663;
    --gold:       #f4c95d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
               font-family: "Fredoka", "Nunito", -apple-system,
                            "SF Pro Rounded", "SF Pro Display", system-ui,
                            sans-serif;
               color: var(--ink);
               background: linear-gradient(180deg,
                            var(--sky-top) 0%,
                            var(--sky-mid) 45%,
                            var(--sky-deep) 78%,
                            var(--water) 100%); }
  canvas { display:block; }

  /* ── Scoreboard HUD ── */
  #hud { position:absolute; top:14px; left:0; right:0; text-align:center;
         pointer-events:none; z-index:100; }
  @media (max-width: 640px) { #hud { top: 64px; } }
  #scoreboard {
    display:inline-flex; align-items:stretch; gap:0;
    background: var(--cream);
    border: 3px solid var(--ink); border-radius: 18px;
    box-shadow: 0 4px 0 var(--ink);
    overflow: hidden;
    font-weight: 900; letter-spacing:-.01em;
  }
  #scoreboard .col {
    display:flex; flex-direction:column; align-items:center;
    padding: 8px 20px 6px; min-width: 130px;
  }
  #scoreboard .col.A .label { color: #e60012; text-shadow: 0 2px 0 #8b0009; }
  #scoreboard .col.B .label { color: #0088cc; text-shadow: 0 2px 0 #005080; }
  #scoreboard .label { font-size: 13px; letter-spacing:.14em;
                       text-transform: uppercase; font-weight: 800; }
  #scoreboard .games { font-size: 32px; font-weight: 900; line-height: 1;
                       color: var(--ink); margin-top: 2px; }
  #scoreboard .point { font-size: 13px; letter-spacing:.06em; margin-top: 2px;
                       color: var(--ink-soft); font-weight: 800; }
  #scoreboard .serve-dot { font-size: 12px; margin-top: 2px; color: transparent;
                           font-weight: 900; letter-spacing:.1em; }
  #scoreboard .col.serving .serve-dot { color: var(--vine-deep); }
  #scoreboard .col.serving .games { text-shadow: 0 3px 0 rgba(74,148,64,.35); }
  #scoreboard .mid {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 4px 12px; background: var(--cream-deep);
    border-left: 3px solid var(--ink); border-right: 3px solid var(--ink);
    font-size: 10px; letter-spacing:.18em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 800; min-width: 96px;
  }
  #scoreboard .mid .call { color: var(--ink); font-size: 14px; letter-spacing:.02em;
                           text-transform: none; margin-top: 2px; font-weight: 900; }
  #scoreboard .games.pop, #scoreboard .point.pop { animation: scorePop 240ms ease-out; }
  @keyframes scorePop {
    40% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  #rally-wrap { margin-top:12px; display:flex; justify-content:center; }
  #rally { display:inline-flex; align-items:center; gap:6px;
           padding:5px 14px; background: var(--cream);
           border-radius: 999px;
           font-size:11px; letter-spacing:.28em; text-transform:uppercase;
           color: var(--ink); font-weight: 800;
           border: 2px solid var(--ink);
           box-shadow: 0 2px 0 var(--ink);
           transition: background 240ms, color 240ms, transform 200ms,
                       box-shadow 240ms, border-color 240ms; }
  #rally.streak-1 { background: #fff2d6; }
  #rally.streak-2 { background: #ffe3b8; color: #7a4a12; }
  #rally.streak-3 { background: linear-gradient(180deg,#ffce7a,#ff9663);
                    color: #fff; border-color: #a5471d;
                    box-shadow: 0 4px 0 #a5471d, 0 0 22px rgba(255,150,99,.65);
                    transform: scale(1.05); }
  #rally .streak-flame { font-size: 14px; letter-spacing:0;
                        display:inline-block; transform-origin: 50% 80%;
                        animation: flame-flicker 480ms ease-in-out infinite alternate;
                        filter: drop-shadow(0 0 6px rgba(255,150,99,.7)); }
  @keyframes flame-flicker {
    0%   { transform: scale(1) rotate(-3deg); }
    100% { transform: scale(1.15) rotate(4deg); }
  }

  /* ── Pairing hint (single-player fallback) — lives in the HUD flow just
        below the rally pill so it can never overlap the scoreboard. ── */
  #pair-hint { display:none; margin-top:8px;
               padding:7px 14px; background: rgba(28,42,58,.7);
               color: var(--cream); border-radius: 999px;
               font-size:11px; letter-spacing:.14em; text-transform:uppercase;
               font-weight: 800; pointer-events:none;
               max-width: 92vw; }
  #pair-hint.show { display:inline-block; }

  /* ── Point sparkle shower ── */
  #sparkles { position:absolute; inset:0; overflow:hidden;
              pointer-events:none; z-index:93; }
  .spark { position:absolute; width:16px; height:16px;
           background: var(--gold);
           clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
           animation: spark-fall 900ms ease-out forwards;
           filter: drop-shadow(0 2px 0 rgba(28,42,58,.35)); }
  @keyframes spark-fall {
    0%   { opacity:0; transform: translate(0,0) rotate(0deg) scale(.3); }
    25%  { opacity:1; }
    100% { opacity:0;
           transform: translate(var(--dx,0), var(--dy,140px))
                      rotate(var(--rot,320deg)) scale(1); }
  }

  /* ── Serve / status prompt ── */
  #prompt { position:absolute; bottom:60px; left:50%;
            transform:translateX(-50%);
            padding:11px 22px; background: var(--cream);
            border: 3px solid var(--ink); border-radius: 999px;
            box-shadow: 0 3px 0 var(--ink);
            font-weight:700; letter-spacing:.01em;
            font-size:13px; text-align:center; z-index:100;
            color: var(--ink); white-space:nowrap;
            transition: opacity 220ms; }
  #prompt.hidden { opacity: 0; }

  /* First-time swing hint — sits just under the prompt pill, fades after the
     first detected swing (body.has-gestured). Cream text with an ink outline
     to stay legible over the bright sky background. */
  #howto {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    font-size:12px; font-weight:800; letter-spacing:.06em;
    text-transform:uppercase; color:var(--cream);
    text-shadow: 0 2px 0 var(--ink), 0 0 6px rgba(28,42,58,.6);
    white-space:nowrap; z-index:99; pointer-events:none;
    transition:opacity 500ms ease;
  }
  body.has-gestured #howto { opacity:0; }

  /* ── Center gesture flash ── */
  #gesture { position:absolute; top:38%; left:50%;
             transform:translate(-50%,-50%) scale(1);
             font-size:56px; font-weight:900; letter-spacing:-.02em;
             text-shadow:0 5px 0 var(--ink), 0 8px 24px rgba(28,42,58,.4);
             opacity:0; transition:opacity 90ms, transform 140ms;
             pointer-events:none; z-index:95; color: var(--hot); }
  #gesture.pop { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  @media (max-width: 640px) { #gesture { font-size:38px; } }

  /* Serve indicator: big colored plaque that fades in when a new serve
     starts, so you can see whose turn it is at a glance. */
  #serve-indicator {
    position: absolute; top: 18%; left: 50%;
    transform: translate(-50%, -8px);
    padding: 8px 22px;
    font-size: clamp(22px, 3.4vw, 42px);
    font-weight: 900; letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--cream, #fbf3e0);
    border: 3px solid var(--ink, #1c2a3a);
    border-radius: 14px;
    box-shadow: 0 5px 0 var(--ink, #1c2a3a), 0 10px 24px rgba(28,42,58,.28);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms, transform 300ms;
    white-space: nowrap;
  }
  #serve-indicator.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  #serve-indicator[data-server="A"] { background: #e60012; }   /* Player A red  */
  #serve-indicator[data-server="B"] { background: #0088cc; }   /* Player B blue */

  /* ── Hit confirm ── */
  .hit-confirm { position:absolute; inset:0;
                 pointer-events:none; z-index:91; overflow:hidden; }
  .hit-confirm .burst, .hit-confirm .ring {
    position:absolute; left:var(--hit-x, 50%); top:var(--hit-y, 50%);
    opacity:0; will-change:transform, opacity;
  }
  .hit-confirm .burst {
    width:  calc(120px + 260px * var(--hit-power, .4));
    height: calc(120px + 260px * var(--hit-power, .4));
    margin-left: calc(-1 * (120px + 260px * var(--hit-power, .4)) / 2);
    margin-top:  calc(-1 * (120px + 260px * var(--hit-power, .4)) / 2);
    border-radius:50%;
    background: radial-gradient(circle,
      rgba(255,243,224,.95) 0%,
      rgba(244,201,93,.75) 30%,
      rgba(255,150,99,.4) 60%,
      rgba(255,150,99,0) 75%);
    mix-blend-mode:screen; filter:blur(2px);
  }
  .hit-confirm .ring {
    width:  calc(90px + 320px * var(--hit-power, .4));
    height: calc(90px + 320px * var(--hit-power, .4));
    margin-left: calc(-1 * (90px + 320px * var(--hit-power, .4)) / 2);
    margin-top:  calc(-1 * (90px + 320px * var(--hit-power, .4)) / 2);
    border-radius:50%;
    border: calc(3px + 5px * var(--hit-power, .4)) solid rgba(255,220,130,.85);
    mix-blend-mode:screen;
  }
  .hit-confirm.active .burst  { animation: burst 440ms ease-out forwards; }
  .hit-confirm.active .ring   { animation: ring  520ms ease-out forwards; }
  @keyframes burst {
    0%   { opacity:0; transform:scale(.3); }
    30%  { opacity:1; transform:scale(1.05); }
    100% { opacity:0; transform:scale(1.3); }
  }
  @keyframes ring {
    0%   { opacity:0; transform:scale(.4); }
    25%  { opacity:1; }
    100% { opacity:0; transform:scale(1.7); }
  }

  /* ── Point banner ── */
  #banner { position:absolute; top:42%; left:50%;
            transform:translate(-50%,-50%) scale(1);
            font-size:clamp(34px, 8.5vw, 64px); font-weight:900; letter-spacing:-.03em;
            text-transform:uppercase; opacity:0;
            text-shadow:0 6px 0 var(--ink), 0 10px 32px rgba(28,42,58,.4);
            transition:opacity 120ms, transform 200ms; pointer-events:none;
            color: var(--hot); z-index:96; text-align:center; }
  #banner.pop { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  #banner.b   { color: #0088cc; }
  #banner.miss{ color: var(--gold); }
  #banner .sub { display:block; font-size: clamp(18px, 4.5vw, 28px); margin-top: 6px;
                 font-weight: 800; letter-spacing:.02em; text-transform: none;
                 text-shadow: 0 3px 0 var(--ink); }

  /* ── Soup Sports chrome ── */
  .ss-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--cream); color: var(--ink);
    border: 3px solid var(--ink); border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .01em; text-decoration: none; cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 120ms cubic-bezier(.3,.7,.3,1), box-shadow 120ms;
  }
  .ss-btn:hover { transform: translateY(-2px); background: var(--cream-warm);
                  box-shadow: 0 5px 0 var(--ink); }
  .ss-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--ink); }

  #back { position:absolute; top:16px; left:16px; z-index:120; }
  #connect { position:absolute; top:16px; right:16px; z-index:120; }
  #connect::before {
    content: ""; width: 9px; height: 9px; border-radius: 50%; flex-shrink:0;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
    animation: hubpulse 1.8s ease-in-out infinite;
  }
  #connect.connected::before {
    background: var(--vine); box-shadow: 0 0 8px var(--vine);
    animation: none;
  }
  @keyframes hubpulse { 50% { opacity: 0.35; transform: scale(0.85); } }

  #devhint { position:absolute; bottom:12px; right:16px; z-index:60;
             font-size:10px; letter-spacing:.04em; color:var(--ink);
             opacity:.45; font-weight:600; pointer-events:none; }
  @media (max-width: 640px) { #devhint { display:none; } }
  /* Hide dev-only chrome (training-data log + keyboard hint) unless ?dev is set. */
  html:not(.dev) #tune-log-wrap, html:not(.dev) #devhint { display:none !important; }

  /* Tune log */
  #tune-log-wrap { position:absolute; top:16px; left:120px; z-index:131;
                   display:flex; flex-direction:column; gap:6px; max-width:38vw; }
  #tune-log-controls { display:flex; gap:6px; align-items:center; }
  #tune-log-controls button {
    padding:6px 12px; border-radius:8px;
    background:var(--cream); color:var(--ink);
    border:2px solid var(--ink); box-shadow:0 2px 0 var(--ink);
    font:inherit; font-size:11px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; cursor:pointer;
  }
  #tune-log-controls button:hover { background:var(--cream-warm); }
  #tune-log-controls #tune-log-count {
    font-family:ui-monospace,Menlo,monospace; font-size:11px;
    color:var(--cream); background:rgba(28,42,58,.65);
    padding:4px 10px; border-radius:999px;
  }
  #tune-log {
    width:100%; height:200px; padding:10px 12px;
    background:rgba(28,42,58,.85); color:#f7f3e6;
    border:none; border-radius:8px;
    font-family:ui-monospace,Menlo,monospace;
    font-size:11px; line-height:1.5; resize:none;
  }
  @media (max-width: 640px) { #tune-log-wrap { display:none; } }
</style>
</head>
<body>

<script>
  if (true) {
    document.documentElement.classList.add('dev');
  }
</script>

<div id="hud">
  <div id="scoreboard">
    <div class="col A" id="col-A">
      <div class="label">player a</div>
      <div class="games" id="games-A">0</div>
      <div class="point" id="point-A">0</div>
      <div class="serve-dot">serve</div>
    </div>
    <div class="mid">
      <span id="mid-sets">sets 0–0</span>
      <span class="call" id="score-call">love–love</span>
    </div>
    <div class="col B" id="col-B">
      <div class="label">player b</div>
      <div class="games" id="games-B">0</div>
      <div class="point" id="point-B">0</div>
      <div class="serve-dot">serve</div>
    </div>
  </div>
  <div id="rally-wrap"><span id="rally">rally 0</span></div>
  <div id="pair-hint">only one wristband paired · b is cpu · pair both on menu</div>
</div>

<div id="sparkles"></div>
<div id="prompt">connect the hub to start</div>
<div id="serve-indicator" aria-live="polite"></div>
<div id="howto">swing your wristband like a racket</div>
<div id="gesture"></div>
<div id="banner"></div>
<div class="hit-confirm" id="hit-confirm">
  <div class="burst"></div>
  <div class="ring"></div>
</div>

<div id="devhint">keys · space swing for receiver</div>
<div id="tune-log-wrap">
  <div id="tune-log-controls">
    <button id="tune-log-copy" type="button">copy</button>
    <button id="tune-log-clear" type="button">clear</button>
    <span id="tune-log-count">0 rows</span>
  </div>
  <textarea id="tune-log" readonly placeholder="each swing logs one row. throw a bunch, click copy, paste back."></textarea>
</div>
<button id="connect" class="ss-btn">connect hub</button>
<a id="back" class="ss-btn" href="index.html">← menu</a>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { openSerial, autoOpenSerial } from './serial.js';
import { ArmDispatcher } from './dispatch.js';
import { pairing } from './pairing.js';
import { sfx } from './sfx.js';
import { showLoader } from './loader.js';

showLoader({ game: 'tennis', tips: [
  'wait for the ball to be near the net before you swing',
  'forehand and backhand come from the direction of your swing',
  "serve when you're paired and the CPU tosses to you",
] });

// ═══════════════════════ Three.js scene ═══════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4fc0e3);
scene.fog = new THREE.Fog(0x4fc0e3, 40, 110);

// Side-elevated view so a full 23.77m court fits in frame.
const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 200);
const camHome = new THREE.Vector3(11, 9, 17);
const camLook = new THREE.Vector3(0, 1, 0);
camera.position.copy(camHome);
camera.lookAt(camLook);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Lights
scene.add(new THREE.AmbientLight(0xcfe6f2, 0.75));
const key = new THREE.DirectionalLight(0xfff2d0, 1.05);
key.position.set(5, 12, 6);
scene.add(key);
const rim = new THREE.DirectionalLight(0x99ccee, 0.45);
rim.position.set(-4, 6, -6);
scene.add(rim);
// Warm cream rim from high behind the mascots — back-edge glow (polish pass).
const rimWarm = new THREE.DirectionalLight(0xffe4b0, 0.5);
rimWarm.position.set(-6, 9, -12);
scene.add(rimWarm);

// ── Court dimensions ──
// Real singles tennis court, meters. Player A on +z (near) half. Player B on
// -z (far) half. Net at z=0. All physics units meters, seconds.
const COURT_LEN     = 23.77;
const BASELINE      = COURT_LEN / 2;   // 11.885
const SERVICE_LINE  = 6.40;
const SINGLES_W     = 8.23;
const SINGLES_HALF  = SINGLES_W / 2;   // 4.115
const DOUBLES_W     = 10.97;
const DOUBLES_HALF  = DOUBLES_W / 2;   // 5.485
const NET_H_CENTER  = 0.914;
const NET_H_POST    = 1.07;
const BALL_R        = 0.033;
const G_ACCEL       = 9.81;
// Drag: per-frame factor at 60fps (spec) applied to horizontal velocity.
const DRAG_60       = 0.995;
// Bounce restitution: vy = -vy * BOUNCE_R, horiz *= BOUNCE_H.
const BOUNCE_R      = 0.75;
const BOUNCE_H      = 0.95;

// Court flooring — extends past doubles + baselines.
const court = new THREE.Mesh(
  new THREE.PlaneGeometry(DOUBLES_W + 5.0, COURT_LEN + 6.0),
  new THREE.MeshStandardMaterial({ color: 0xebd9a8, roughness: 0.9 })
);
court.rotation.x = -Math.PI/2;
scene.add(court);

const outer = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x37a7d0, roughness: 0.95 })
);
outer.rotation.x = -Math.PI/2;
outer.position.y = -0.02;
scene.add(outer);

function addLine(x1, z1, x2, z2, thickness = 0.06) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.hypot(dx, dz);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(len, thickness),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 })
  );
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set((x1+x2)/2, 0.01, (z1+z2)/2);
  mesh.rotation.z = -Math.atan2(dz, dx);
  scene.add(mesh);
}
// Baselines
addLine(-DOUBLES_HALF, -BASELINE,  DOUBLES_HALF, -BASELINE, 0.08);
addLine(-DOUBLES_HALF,  BASELINE,  DOUBLES_HALF,  BASELINE, 0.08);
// Doubles sidelines
addLine(-DOUBLES_HALF, -BASELINE, -DOUBLES_HALF,  BASELINE, 0.08);
addLine( DOUBLES_HALF, -BASELINE,  DOUBLES_HALF,  BASELINE, 0.08);
// Singles sidelines
addLine(-SINGLES_HALF, -BASELINE, -SINGLES_HALF,  BASELINE, 0.08);
addLine( SINGLES_HALF, -BASELINE,  SINGLES_HALF,  BASELINE, 0.08);
// Service lines (span singles width, on both sides of the net)
addLine(-SINGLES_HALF, -SERVICE_LINE,  SINGLES_HALF, -SERVICE_LINE);
addLine(-SINGLES_HALF,  SERVICE_LINE,  SINGLES_HALF,  SERVICE_LINE);
// Center service line (between the two service lines)
addLine(0, -SERVICE_LINE, 0, SERVICE_LINE);
// Center marks at each baseline (small ticks)
addLine(0,  BASELINE - 0.30, 0, BASELINE);
addLine(0, -BASELINE, 0, -BASELINE + 0.30);

// ── Net ──
// Slight visual sag: three panels; collision uses flat NET_H_CENTER.
const netGroup = new THREE.Group();
const netMat = new THREE.MeshStandardMaterial({
  color: 0xfbf3e0, roughness: 0.9, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
const netPanel = new THREE.Mesh(
  new THREE.PlaneGeometry(DOUBLES_W + 1.8, NET_H_CENTER), netMat);
netPanel.position.set(0, NET_H_CENTER/2, 0);
netGroup.add(netPanel);
const netTop = new THREE.Mesh(
  new THREE.BoxGeometry(DOUBLES_W + 1.9, 0.05, 0.05),
  new THREE.MeshStandardMaterial({ color: 0x1c2a3a, roughness: 0.6 })
);
netTop.position.set(0, NET_H_CENTER, 0);
netGroup.add(netTop);
const postGeo = new THREE.CylinderGeometry(0.06, 0.06, NET_H_POST + 0.05, 12);

const DUST_MAX = 30;

let dustSpawnClock = 0;
function updateDust(dt) {
  dustSpawnClock += dt;

    dustSpawnClock = 0;
    const m = new THREE.Mesh(dustGeo,
      new THREE.MeshBasicMaterial({ color: 0xfbf3e0, transparent: true, opacity: 0.9 }));

// ═══════════════ Visual polish: toon mascots, blobs, impact FX ═══════════════
// Additive only — no gameplay changes. Toon + inverted-hull outlines on the
// soup mascots, ground shadow blobs, impact bursts + swing streaks, FOV punch.
const TOON_LIGHT_DIR = { value: new THREE.Vector3(0.5, 0.8, 0.6) }; // view space, shared by all toon mats
const TOON_KEY_DIR = new THREE.Vector3(5, 12, 6).normalize();       // matches `key` light
const TOON_VERT = `
varying vec3 vNormal;
void main() {
  vNormal = normalize(normalMatrix * normal);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;
const TOON_FRAG = `
varying vec3 vNormal;
uniform vec3 baseColor;
uniform vec3 lightDir;
void main() {
  float d = dot(normalize(vNormal), normalize(lightDir));
  float shade = (d > 0.5) ? 1.0 : (d > 0.0) ? 0.75 : 0.55;
  gl_FragColor = vec4(baseColor * shade, 1.0);
}`;
const OUTLINE_VERT = `
uniform float outlineWidth;
void main() {
  vec3 p = position + normal * outlineWidth;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
}`;
// ink #1c2a3a
const OUTLINE_FRAG = `void main() { gl_FragColor = vec4(0.110, 0.165, 0.227, 1.0); }`;

function applyToonMaterial(mesh, baseHex, outlineWidth = 2.0) {
  const tint = new THREE.Color(baseHex);
  const mat = new THREE.ShaderMaterial({
    uniforms: { baseColor: { value: tint }, lightDir: TOON_LIGHT_DIR },
    vertexShader: TOON_VERT, fragmentShader: TOON_FRAG,
  });
  mat.color = tint;   // alias so existing tint/flash code keeps working
  mesh.material = mat;
  if (outlineWidth > 0) {
    const outline = new THREE.Mesh(mesh.geometry, new THREE.ShaderMaterial({
      uniforms: { outlineWidth: { value: outlineWidth } },
      vertexShader: OUTLINE_VERT, fragmentShader: OUTLINE_FRAG,
      side: THREE.BackSide,
    }));
    outline.castShadow = false;
    mesh.add(outline);   // inherits the part's transform, incl. paw anim
  }
  return mat;
}
// Toon-shade every named mascot part; outline only the chunky parts — the
// face decals are thin shells, hulling them smears ink across the face.
const TOON_PARTS = ['body', 'ears', 'face_patch', 'eyes_nose', 'paws', 'tail'];
const OUTLINE_PARTS = new Set(['body', 'ears', 'paws', 'tail']);
function applyToonToSoup(soup, outlineWidth = 2.0) {   // width in model units (mm)
  for (const name of TOON_PARTS) {
    const node = soup.getObjectByName(name);
    if (node && node.isMesh) {
      applyToonMaterial(node, node.material.color.getHex(),
                        OUTLINE_PARTS.has(name) ? outlineWidth : 0);
    }
  }
}

// Impact FX — particle bursts on ball contact + racket afterimage streaks.
const FX_COLORS = [0xfbf3e0, 0xff9663, 0xf4c95d];
const FX_P_SIZE = 0.06, FX_P_VEL = 3.0, FX_STREAK_W = 0.12, FX_STREAK_SPAN = 1.6;
const fxGeo = new THREE.SphereGeometry(FX_P_SIZE, 6, 6);
const fxParticles = [], fxStreaks = [];
function spawnImpactBurst(pos, power = 0.7) {
  const n = 10 + Math.floor(Math.random() * 5);
  for (let i = 0; i < n; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: FX_COLORS[i % 3],
      transparent: true, opacity: 1, depthWrite: false });
    const m = new THREE.Mesh(fxGeo, mat);
    m.position.copy(pos);
    const th = Math.random() * Math.PI * 2, up = Math.random();
    const r = Math.sqrt(1 - up * up);
    m.userData.vel = new THREE.Vector3(Math.cos(th) * r, up, Math.sin(th) * r)
      .multiplyScalar(FX_P_VEL * (0.6 + 0.8 * power) * (0.7 + Math.random() * 0.6));
    m.userData.born = performance.now();
    scene.add(m); fxParticles.push(m);
  }
}
const _fxAxis = new THREE.Vector3(1, 0, 0);
function spawnSwingStreaks(pos, dir) {
  const d = dir.clone().normalize();
  const n = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const len = FX_STREAK_SPAN * (0.35 + Math.random() * 0.45);
    const geo = new THREE.PlaneGeometry(len, FX_STREAK_W * (1 - i / (n + 1)));
    const mat = new THREE.MeshBasicMaterial({ color: 0xfbf3e0, transparent: true,
      opacity: 0.5 * (1 - i / n), side: THREE.DoubleSide, depthWrite: false });
    const q = new THREE.Mesh(geo, mat);
    q.position.copy(pos).addScaledVector(d, -(i * FX_STREAK_SPAN * 0.22) - len * 0.3)
      .add(new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5,
                             Math.random() - 0.5).multiplyScalar(FX_STREAK_W * 2));
    q.quaternion.setFromUnitVectors(_fxAxis, d);
    q.userData.born = performance.now();
    q.userData.o0 = mat.opacity;
    scene.add(q); fxStreaks.push(q);
  }
}
function updateImpactFx(dt) {
  const nowFx = performance.now();
  for (let i = fxParticles.length - 1; i >= 0; i--) {
    const m = fxParticles[i];
    const a = (nowFx - m.userData.born) / 400;
    if (a >= 1) { scene.remove(m); m.material.dispose(); fxParticles.splice(i, 1); continue; }
    m.userData.vel.y -= 8 * dt;
    m.position.addScaledVector(m.userData.vel, dt);
    m.material.opacity = 1 - a;
  }
  for (let i = fxStreaks.length - 1; i >= 0; i--) {
    const q = fxStreaks[i];
    const a = (nowFx - q.userData.born) / 120;
    if (a >= 1) { scene.remove(q); q.geometry.dispose(); q.material.dispose(); fxStreaks.splice(i, 1); continue; }
    q.material.opacity = q.userData.o0 * (1 - a);
  }
}

// Camera FOV punch — ~2° push for 120ms on ball contact. Baseline untouched.
const BASE_FOV = camera.fov;
const camFx = { fov: BASE_FOV, target: BASE_FOV, until: 0, phase: 'idle' };
function fovPunch(power = 0.7) {
  camFx.target = BASE_FOV - 2.2 * Math.max(0.4, Math.min(1, power));
  camFx.phase = 'in';
  camFx.until = performance.now() + 45;
}
function updateFovPunch(now) {
  if (camFx.phase === 'in') {
    const p = Math.min(1, 1 - (camFx.until - now) / 45);
    camera.fov = camFx.fov + (camFx.target - camFx.fov) * p;
    if (p >= 1) { camFx.fov = camera.fov; camFx.phase = 'out'; camFx.until = now + 120; }
    camera.updateProjectionMatrix();
  } else if (camFx.phase === 'out') {
    const p = Math.min(1, 1 - (camFx.until - now) / 120);
    camera.fov = camFx.fov + (BASE_FOV - camFx.fov) * p;
    if (p >= 1) { camera.fov = BASE_FOV; camFx.fov = BASE_FOV; camFx.phase = 'idle'; }
    camera.updateProjectionMatrix();
  }
}

const TRAIL_LEN = 40;

const trailSpriteCanvas = (() => {

})();
const trailSpriteTex = new THREE.CanvasTexture(trailSpriteCanvas);
const TRAIL_SPRITES = 10;
const trailSprites = [];
for (let i = 0; i < TRAIL_SPRITES; i++) {
  const m = new THREE.SpriteMaterial({
    map: trailSpriteTex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, opacity: 0,
  });
  const s = new THREE.Sprite(m);
  s.scale.setScalar(0.35);
  scene.add(s);
  trailSprites.push(s);

const trailBuf = [];
function pushTrail(p) {
  trailBuf.push(p.clone());
  while (trailBuf.length > TRAIL_LEN) trailBuf.shift();
  for (let i = 0; i < TRAIL_LEN; i++) {
    const src = trailBuf[i] || trailBuf[trailBuf.length - 1] || p;
    trailPositions[i*3]   = src.x;
    trailPositions[i*3+1] = src.y;
    trailPositions[i*3+2] = src.z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  const bufLen = trailBuf.length;
  for (let i = 0; i < TRAIL_SPRITES; i++) {
    const idx = bufLen - 1 - Math.floor(i * (bufLen - 1) / (TRAIL_SPRITES - 1 || 1));
    const src = trailBuf[Math.max(0, idx)];
    const s = trailSprites[i];
    if (src) {
      s.position.copy(src);
      const t = 1 - i / TRAIL_SPRITES;
      s.scale.setScalar(0.14 + 0.36 * t);
      s.material.opacity = 0.9 * t * t;
    } else {
      s.material.opacity = 0;
    }
  }
}
function clearTrail() {
  trailBuf.length = 0;
  for (let i = 0; i < TRAIL_LEN; i++) {
    trailPositions[i*3] = ball.position.x;
    trailPositions[i*3+1] = ball.position.y;
    trailPositions[i*3+2] = ball.position.z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  for (const s of trailSprites) s.material.opacity = 0;
}

// ═══════════════════════ Game state ═══════════════════════
//
// Real-tennis state machine:
//   idle             — waiting to start
//   serve_wait       — ball pinned by server, awaiting their swing
//   in_flight_serve  — ball airborne, must land in target service box
//   in_flight_rally  — post-serve, either player can hit before 2nd bounce
//   point_end / game_end / set_end / match_end — banner interlude
//
// SCORE
//   points  — 0..3 (=0/15/30/40) or 'AD' after advantage. Deuce at 3-3.
//   games   — 0..7. Win: >=6 AND lead>=2, cap 7 (no tiebreak).
//   sets    — first to 1 wins match.
//
// SERVE
//   server         — 'A' | 'B', alternates each game
//   servingFrom    — 'deuce' | 'ad', alternates every point in a game
//   firstServe     — true on first attempt of a point; false after a fault
//
// BALL TRACKING
//   hitter/receiver, bounces since last hit, target service box for a serve.
//
// From server A's view (standing at +z looking toward -z), A's right is +x
// (A's deuce court is world +x, +z). Diagonal-opposite = receiver B's deuce
// box (world -x, -z half). B faces +z so B's right is -x; B's deuce court is
// world -x, -z.

    const dx = Math.sin(angle) * dist;
    const dy = 60 + Math.abs(Math.cos(angle)) * dist * 0.7;
    const rot = (Math.random() - 0.5) * 720;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.animationDelay = (Math.random() * 120) + 'ms';
    $sparkles.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

function pointLabel(p) { return p === 'AD' ? 'AD' : ['0','15','30','40'][p]; }
function scoreCall() {
  const { A, B } = state.points;
  if (A === 3 && B === 3) return 'deuce';

function fireHitConfirm(worldPos, power) {
  const p = worldPos.clone().project(camera);
  const px = (p.x *  0.5 + 0.5) * innerWidth;
  const py = (p.y * -0.5 + 0.5) * innerHeight;

  $conf.style.setProperty('--hit-y', py + 'px');

function shakeCamera(power) {
  state.camShake.until = performance.now() + 260;
  state.camShake.amp = 0.06 + 0.18 * power;
}

// ═══════════════════════ Helpers ═══════════════════════
function otherPlayer(p) { return p === 'A' ? 'B' : 'A'; }
function mascotPos(player) { return player === 'A' ? soupA.position : soupB.position; }
function baselineZFor(player) { return player === 'A' ? BASELINE : -BASELINE; }
function zSideOf(player) { return player === 'A' ? +1 : -1; }

// Diagonal-opposite service box for a serve.
function serveTargetBox(server, side) {
  // Server A (at +z looking -z): deuce = server's right = world +x. Target =
  // receiver B's deuce court, world (-x, -z half).
  if (server === 'A' && side === 'deuce')
    return { xMin: -SINGLES_HALF, xMax: 0,             zMin: -SERVICE_LINE, zMax: 0 };
  if (server === 'A' && side === 'ad')
    return { xMin: 0,             xMax:  SINGLES_HALF, zMin: -SERVICE_LINE, zMax: 0 };
  // Server B (at -z looking +z): deuce = server's right = world -x. Target =
  // receiver A's deuce court, world (+x, +z half).
  if (server === 'B' && side === 'deuce')
    return { xMin: 0,             xMax:  SINGLES_HALF, zMin: 0, zMax: SERVICE_LINE };
  return   { xMin: -SINGLES_HALF, xMax: 0,             zMin: 0, zMax: SERVICE_LINE };
}

// Server standing position (behind their baseline, offset to the correct
// half of the court based on deuce/ad).
function serverStartPos(server, side) {
  const z = server === 'A' ? BASELINE + 0.3 : -BASELINE - 0.3;
  // Deuce court is server's right. A faces -z (right = +x), B faces +z (right = -x).
  const xSign = server === 'A'
    ? (side === 'deuce' ? +1 : -1)
    : (side === 'deuce' ? -1 : +1);
  const x = xSign * (SINGLES_HALF * 0.55);
  return new THREE.Vector3(x, 2.30, z);
}

// Center of a target box.
function boxCenter(box) {
  return new THREE.Vector3((box.xMin+box.xMax)/2, BALL_R, (box.zMin+box.zMax)/2);
}

// ═══════════════════════ Serve launcher ═══════════════════════
// Given start, target-landing point, and power → initial velocity that (in
// gravity, no drag) reaches target at time t. Serve speed 25 + 10*power m/s
// gives us t = horizontal_dist / speed for a roughly-flat trajectory.
// Original simple ballistic solver — no iterations, no net-clearance
// gymnastics. Reverted from the arc-iterator experiment which made returns
// float slowly and killed the game's feel. Ball speed = 25 + 10·power;
// flight time = horizontal_distance / speed clamped to a sensible range;
// vy solves the parabola to hit the target y. If the ball doesn't clear
// the net, the net collision handler awards the point cleanly.
function ballisticVelocity(from, target, power, minT = 0.55, maxT = 1.2) {
  const dx = target.x - from.x;
  const dz = target.z - from.z;
  const dy = target.y - from.y;
  const horiz = Math.hypot(dx, dz);
  const speed = 25 + 10 * power;
  const t = THREE.MathUtils.clamp(horiz / speed, minT, maxT);
  const vx = dx / t;
  const vz = dz / t;
  const vy = (dy + 0.5 * G_ACCEL * t * t) / t;
  return { v: new THREE.Vector3(vx, vy, vz), t };
}

function pinBallToServer() {
  const pos = serverStartPos(state.server, state.servingFrom);
  ball.position.copy(pos);
  clearTrail();
  ballShadow.position.x = pos.x;
  ballShadow.position.z = pos.z;
}

const $serveIndicator = document.getElementById('serve-indicator');
let _serveIndicatorTimer = 0;
function showServeIndicator(who) {
  if (!$serveIndicator) return;
  $serveIndicator.textContent = `player ${who.toLowerCase()} serves`;
  $serveIndicator.setAttribute('data-server', who);
  $serveIndicator.classList.add('show');
  clearTimeout(_serveIndicatorTimer);
  _serveIndicatorTimer = setTimeout(() => {
    $serveIndicator.classList.remove('show');
  }, 2200);
}

function startServe() {
  state.mode = 'serve_wait';
  state.rally = 0;
  bt.hitter = null; bt.receiver = null; bt.bounces = 0;
  bt.isServe = false; bt.serveTargetBox = null;
  pinBallToServer();
  refreshScore();
  const label = state.server === 'A' ? 'player a' : 'player b';
  const which = state.firstServe ? '1st' : '2nd';
  setPrompt(`${label} — ${which} serve, ${state.servingFrom} court`);
  // Big blue/red plaque above the server so you can see whose turn it is
  // even if you're not reading the prompt pill.
  showServeIndicator(state.server);
  // 3D floating arrow that hovers above the serving mascot until they hit.
  showServeArrow(true);
  // CPU serves after a beat.
  if (!state.pvp && state.cpuControls === state.server) {
    setTimeout(() => {
      if (state.mode !== 'serve_wait') return;
      // CPU is generally reliable but faults occasionally.
      const misfire = Math.random() > 0.9;
      const power = 0.4 + Math.random() * 0.5;
      // Deliberate wide roll on misfire.
      const roll = misfire ? (Math.random() < 0.5 ? -45 : 45) : (Math.random() - 0.5) * 12;
      handleSwing(state.server, { power, roll, forehand: true });
    }, 900);
  }
}

// ═══════════════════════ Hit resolution ═══════════════════════
// Serve: launch to diagonal service box (with a tiny aim offset from roll).
// Timing-based tennis — no ballistics, no bounce, no net collision. The ball
// flies from hitter to receiver on a smooth parabolic-shaped LERP over a
// fixed duration. Whether the receiver "returns" it depends purely on
// whether they swing inside the hit window centered on the arrival time.
//
// Real physics was making the game feel like a coin flip — arcs that missed
// the net by an inch, ballistic solvers that produced returns you couldn't
// react to. Timing lets us tune "how hard is it" with a single knob (window
// width) instead of chasing edge cases in the solver.

// Flight endpoints and timing for the current in-flight ball.
const flight = {
  from:      new THREE.Vector3(),
  to:        new THREE.Vector3(),
  startMs:   0,
  durationMs:0,
  arcHeight: 3.0,
};

function launchTimingBased(from, to, hitter, receiver, isServe, durationMs, power) {
  // Hide the serve arrow — it lives above the SERVER until they hit.
  showServeArrow(false);
  flight.from.copy(from);
  flight.to.copy(to);
  flight.startMs = performance.now();
  flight.durationMs = durationMs;
  // Higher arc for slower shots (looks more like a lob), lower arc for
  // faster ones (looks like a drive).
  flight.arcHeight = 2.2 + (1 - power) * 2.0;
  ball.position.copy(from);
  state.mode = isServe ? 'in_flight_serve' : 'in_flight_rally';
  bt.hitter   = hitter;
  bt.receiver = receiver;
  bt.bounces  = 0;
  bt.isServe  = isServe;
  clearTrail();
  fireHitConfirm(from, power);
  shakeCamera(power * (isServe ? 0.6 : 0.7));
  spawnImpactBurst(from, power);
  // Swing streaks along the outgoing direction, since ballVel is unused now.
  const dir = to.clone().sub(from);
  spawnSwingStreaks(from, dir);
  fovPunch(power);
  anim[hitter].swingStart = performance.now();
  // Hit window centered on arrival. Wider for softer shots, tighter for
  // full-power drives — the fair way to reward pace.
  state.arriveTime    = flight.startMs + durationMs;
  const windowHalf    = 220 - power * 80;   // 220 ms at 0.0 → 140 ms at 1.0
  state.hittableStart = state.arriveTime - windowHalf;
  state.hittableEnd   = state.arriveTime + windowHalf;
}

function launchServe(server, power, roll) {
  const box = serveTargetBox(server, state.servingFrom);
  bt.serveTargetBox = box;
  const from = serverStartPos(server, state.servingFrom);
  // Serve lands AT the receiver's position, not deep in their box —
  // timing-based means they need the ball reachable when it arrives.
  const receiver = otherPlayer(server);
  const receiverPos = mascotPos(receiver);
  const aim = THREE.MathUtils.clamp(roll / 60, -1, 1);
  const target = new THREE.Vector3(receiverPos.x + aim * 0.8, 1.0, receiverPos.z);
  // Serve duration: 750 ms at max power, 1050 ms at zero — matches classic
  // "hard serve is fast, weak serve floats" feel.
  const durationMs = 1050 - power * 300;
  launchTimingBased(from, target, server, receiver, true, durationMs, power);
}

function launchReturn(swinger, power, roll) {
  const target = otherPlayer(swinger);
  // Land the ball RIGHT AT the receiver's racket position — since the game
  // is timing-based now, the ball needs to be reachable at arrival time.
  // Landing "deep in their court" leaves them chasing a spot they can't get
  // to; the racket connects when the ball reaches them, and their mascot is
  // planted at BASE_Z_{A,B}, roughly at chest height (1.0 m).
  const receiverPos = mascotPos(target);
  const aim = THREE.MathUtils.clamp(roll / 45, -1, 1);
  const targetX = receiverPos.x + aim * 0.8;   // small lateral drift from roll
  const targetZ = receiverPos.z;               // right at the receiver
  const to = new THREE.Vector3(targetX, 1.0, targetZ);
  const from = ball.position.clone();
  // Rally duration: 800-1100 ms scaled by power.
  const durationMs = 1100 - power * 300;
  launchTimingBased(from, to, swinger, target, false, durationMs, power);
}

// ═══════════════════════ Faults / scoring ═══════════════════════
function serveFault(reason) {
  if (state.mode === 'point_end' || state.mode === 'game_end') return;
  state.mode = 'point_end';
  if (state.firstServe) {
    state.firstServe = false;
    popBanner('fault', reason, 'miss');
    setTimeout(startServe, 1400);
  } else {
    // Double fault → point to receiver.
    popBanner('double fault!', reason, 'miss');
    state.firstServe = true;
    setTimeout(() => resolvePoint(otherPlayer(state.server), 'double fault'), 900);
  }
}

function resolvePoint(winner, subtitle) {
  if (state.mode === 'game_end') return;
  const loser = otherPlayer(winner);
  const w = state.points[winner];
  const l = state.points[loser];

  let gameWon = false;
  if (w === 'AD') {
    gameWon = true;
  } else if (l === 'AD') {
    state.points = { A: 3, B: 3 };
  } else if (w < 3) {
    state.points[winner] = w + 1;
  } else {
    if (l < 3) gameWon = true;
    else state.points[winner] = 'AD';
  }

  const cx = innerWidth * 0.5;
  const cy = innerHeight * 0.42;
  sparkleShower(cx, cy, 22);
  anim[winner].hopStart = performance.now();
  const bannerKind = winner === 'A' ? '' : 'b';
  const winnerName = winner === 'A' ? 'player a' : 'player b';

  if (gameWon) {
    state.games[winner] += 1;
    state.points = { A: 0, B: 0 };
    const gw = state.games[winner], gl = state.games[loser];
    const setWon = (gw >= SET_TARGET_GAMES && gw - gl >= 2) || gw >= SET_CAP_GAMES;

    if (setWon) {
      state.sets[winner] += 1;
      const matchWon = state.sets[winner] >= MATCH_TARGET_SETS;
      state.mode = 'set_end';
      if (matchWon) {
        state.mode = 'match_end';
        popBanner(`${winnerName} wins the match!`,
                  `sets ${state.sets.A}–${state.sets.B}`, bannerKind);
        refreshScore();
        setTimeout(() => {
          state.sets = { A: 0, B: 0 };
          state.games = { A: 0, B: 0 };
          state.points = { A: 0, B: 0 };
          state.server = winner;
          state.servingFrom = 'deuce';
          state.firstServe = true;
          refreshScore();
          startServe();
        }, 4200);
        return;
      }
      popBanner(`${winnerName} takes the set`,
                `sets ${state.sets.A}–${state.sets.B}`, bannerKind);
      refreshScore();
      setTimeout(() => {
        state.games = { A: 0, B: 0 };
        state.server = otherPlayer(state.server);
        state.servingFrom = 'deuce';
        state.firstServe = true;
        refreshScore();
        startServe();
      }, 3000);
      return;
    }
    state.mode = 'game_end';
    popBanner(`game — ${winnerName}`,
              `games ${state.games.A}–${state.games.B}`, bannerKind);
    state.server = otherPlayer(state.server);
    state.servingFrom = 'deuce';
    state.firstServe = true;
    refreshScore();
    setTimeout(startServe, 1800);
  } else {
    state.mode = 'point_end';
    popBanner(subtitle || `point — ${winnerName}`, scoreCall(), bannerKind);
    // Alternate service side within a game.
    state.servingFrom = (state.servingFrom === 'deuce') ? 'ad' : 'deuce';
    state.firstServe = true;
    refreshScore();
    setTimeout(startServe, 1600);
  }
}

function awardPoint(winner, subtitle) {
  if (state.mode === 'point_end' || state.mode === 'game_end' ||
      state.mode === 'set_end' || state.mode === 'match_end') return;
  state.mode = 'point_end';
  resolvePoint(winner, subtitle);
}

// ═══════════════════════ Bounce & net handling ═══════════════════════
function handleBounce() {
  bt.bounces++;
  const { x, z } = ball.position;

  // 1) Serve first bounce → must be in target service box.
  if (bt.isServe) {
    bt.isServe = false;
    const b = bt.serveTargetBox;
    const inBox = b && x >= b.xMin - 0.02 && x <= b.xMax + 0.02
                    && z >= b.zMin - 0.02 && z <= b.zMax + 0.02;
    if (!inBox) {
      const reason =
        (Math.sign(z) === zSideOf(state.server)) ? 'in the net area' :
        (Math.abs(x) > SINGLES_HALF)             ? 'wide' :
        (Math.abs(z) > SERVICE_LINE)             ? 'long' : 'out of box';
      serveFault(reason);
      return;
    }
    // Valid serve — reset bounce count for the return window.
    bt.bounces = 1;
    state.mode = 'in_flight_rally';
    state.firstServe = true;   // reset for next point
    // Receiver has until second bounce; set an arrival estimate from apex.
    return;
  }

  // 2) Rally first bounce after a hit — must be in receiver's singles court.
  if (bt.bounces === 1) {
    const receiver = bt.receiver;
    const hitter   = bt.hitter;
    const rSign = zSideOf(receiver);
    const inCourt = Math.abs(x) <= SINGLES_HALF + 0.02
                 && Math.sign(z) === rSign
                 && Math.abs(z) <= BASELINE + 0.02
                 && Math.abs(z) > 0.02;
    if (!inCourt) {
      const reason =
        (Math.sign(z) !== rSign)                  ? 'into the net area' :
        (Math.abs(x) > SINGLES_HALF)              ? 'wide' :
        (Math.abs(z) > BASELINE)                  ? 'long' : 'out';
      awardPoint(receiver, `${hitter.toLowerCase()} hit ${reason}`);
    }
    return;
  }

  // 3) Second bounce on receiver's side → they failed to return.
  if (bt.bounces >= 2) {
    awardPoint(bt.hitter, `${bt.receiver.toLowerCase()} let it double-bounce`);
  }
}

// Net collisions removed entirely as a gameplay feature. Serves and rallies
// used to fault into the net so often that it killed the fun. Now the ball
// clips through the net visually if it comes in low — no fault, no let-cord
// deflection, no penalty. The scene still renders the net (it's part of the
// visual court identity), it just doesn't stop the ball.
//
// If a ball would land on the net's side (hit low and stopped there), the
// arc iterator in ballisticVelocity already fights that; anything that
// still gets through is now just cosmetic.
function checkNetCollision(prevZ, prevY) {
  return false;
}

// ═══════════════════════ Ball animation tick — timing-based ═══════════════════════
// No physics: the ball's position is a smooth LERP from flight.from to
// flight.to over flight.durationMs, plus a parabolic arc in y so it *looks*
// like a real shot. When it arrives, we wait for the receiver's swing or
// the hit window to expire.
function updateBall(dt) {
  if (state.mode !== 'in_flight_serve' && state.mode !== 'in_flight_rally') return;

  const now = performance.now();
  const rawP = (now - flight.startMs) / flight.durationMs;
  const p = Math.min(1, Math.max(0, rawP));

  // Linear x/z from start to target.
  ball.position.x = flight.from.x + (flight.to.x - flight.from.x) * p;
  ball.position.z = flight.from.z + (flight.to.z - flight.from.z) * p;
  // Parabolic y: peaks at p=0.5, back at the target height at p=1.
  const baseY = flight.from.y + (flight.to.y - flight.from.y) * p;
  ball.position.y = baseY + 4 * flight.arcHeight * p * (1 - p);
  ball.rotation.x += 8 * dt;
  pushTrail(ball.position);
  ballShadow.position.x = ball.position.x;
  ballShadow.position.z = ball.position.z;
  const s = THREE.MathUtils.clamp(1.0 - ball.position.y * 0.25, 0.2, 1.0);
  ballShadow.scale.setScalar(s);
  ballShadow.material.opacity = 0.28 * s;

  // CPU return: swing at arrival time with 85% success.
  if (!state.pvp && state.cpuControls === bt.receiver && !bt._cpuScheduled) {
    bt._cpuScheduled = true;
    const cpuFireAt = state.arriveTime;
    setTimeout(() => {
      bt._cpuScheduled = false;
      if (state.mode !== 'in_flight_serve' && state.mode !== 'in_flight_rally') return;
      if (bt.receiver !== state.cpuControls) return;
      if (Math.random() < 0.85) {
        const power = 0.45 + Math.random() * 0.5;
        const roll = (Math.random() - 0.5) * 60;
        handleSwing(state.cpuControls, { power, roll, forehand: Math.random() < 0.7 });
      }
    }, Math.max(0, cpuFireAt - now));
  }

  // Hit window expired → receiver failed to return in time.
  if (now > state.hittableEnd) {
    if (state.mode === 'in_flight_serve') {
      // Receiver missed the serve → ace.
      awardPoint(bt.hitter, `${bt.receiver.toLowerCase()} couldn't reach the serve`);
    } else {
      awardPoint(bt.hitter, `${bt.receiver.toLowerCase()} missed the return`);
    }
    return;
  }
}

// ═══════════════════════ Swing detector (per-arm) ═══════════════════════
const GYRO_ARM_DPS   = 200;
const GYRO_QUIET_DPS = 90;
const QUIET_MS       = 40;
const MAX_ACTIVE_MS  = 260;
const REFRACTORY_MS  = 400;
const POST_PEAK_DROP = 0.55;
const POST_PEAK_MIN  = 25;
const ACCEL_MIN      = 15;
const ACCEL_MAX      = 100;
const MIN_PEAK_ACC   = 22;
const FOREHAND_YAW_SIGN = +1;

function newSwingState() {
  return {
    phase: 'IDLE',
    startedAt: 0,
    refractoryUntil: 0,
    peakAccel: 0,
    peakGyro: 0,
    rollAtPeak: 0,
    yawSignAtPeak: 0,
    lastAboveT: 0,
  };
}
const swingByArm = new Map();
function swingFor(armId) {
  let s = swingByArm.get(armId);
  if (!s) { s = newSwingState(); swingByArm.set(armId, s); }
  return s;
}

function fireSwing(armId, sw) {
  if (sw.peakAccel < MIN_PEAK_ACC) {
    sw.phase = 'REFRACTORY';
    sw.refractoryUntil = performance.now() + REFRACTORY_MS;
    return;
  }
  const power = THREE.MathUtils.clamp(
    (sw.peakAccel - ACCEL_MIN) / (ACCEL_MAX - ACCEL_MIN), 0.15, 1.0);
  const roll = sw.rollAtPeak;
  const yawSign = sw.yawSignAtPeak || FOREHAND_YAW_SIGN;
  const isForehand = yawSign === FOREHAND_YAW_SIGN;
  const paired = pairing.playerForArm(armId);
  const player = paired || (armId === 1 ? 'B' : 'A');
  logTune('swing', {
    peakGyro: sw.peakGyro, peakAccel: sw.peakAccel,
    roll, power, forehand: isForehand ? 'F' : 'B',
    yawSign, arm: armId, player,
  });
  handleSwing(player, { power, roll, forehand: isForehand });
  sw.phase = 'REFRACTORY';
  sw.refractoryUntil = performance.now() + REFRACTORY_MS;
}

function onRawSample(armId, s) {
  const sw = swingFor(armId);
  const now = performance.now();
  if (sw.phase === 'REFRACTORY') {
    if (now >= sw.refractoryUntil) {
      const fresh = newSwingState();
      Object.assign(sw, fresh);
    } else return;
  }
  const accelMag = Math.hypot(s.ax, s.ay, s.az);
  const dynA = Math.abs(accelMag - 9.8);
  const gyroMag = Math.hypot(s.gx, s.gy, s.gz);

  if (sw.phase === 'IDLE') {
    if (gyroMag > GYRO_ARM_DPS) {
      sw.phase = 'ACTIVE';
      sw.startedAt = now;
      sw.peakAccel = dynA;
      sw.peakGyro = gyroMag;
      sw.rollAtPeak = s.roll;
      sw.yawSignAtPeak = Math.sign(s.gz || 0);
      sw.lastAboveT = now;
    }
    return;
  }

  if (dynA > sw.peakAccel) {
    sw.peakAccel = dynA;
    sw.rollAtPeak = s.roll;
    sw.yawSignAtPeak = Math.sign(s.gz || sw.yawSignAtPeak);
  }
  if (gyroMag > sw.peakGyro) sw.peakGyro = gyroMag;
  if (gyroMag > GYRO_QUIET_DPS) sw.lastAboveT = now;

  const quietFor = now - sw.lastAboveT;
  const activeFor = now - sw.startedAt;
  const postPeakFire = sw.peakAccel >= POST_PEAK_MIN
                    && dynA < sw.peakAccel * POST_PEAK_DROP;

  if (postPeakFire || activeFor > MAX_ACTIVE_MS || quietFor > QUIET_MS) {
    if (sw.peakAccel > ACCEL_MIN * 0.4) fireSwing(armId, sw);
    else {
      sw.phase = 'REFRACTORY';
      sw.refractoryUntil = now + REFRACTORY_MS;
    }
  }
}

// ═══════════════════════ Swing → game event ═══════════════════════
function handleSwing(player, { power, roll, forehand }) {
  const now = performance.now();

  // Serve.
  if (state.mode === 'serve_wait') {
    if (player !== state.server) return;
    popGesture(`serve ${Math.round(power*100)}`, '#ff9663');
    sfx.serve(power);
    launchServe(player, power, roll);
    return;
  }

  // Rally / serve return — receiver's swing is judged purely on timing.
  if (state.mode === 'in_flight_serve' || state.mode === 'in_flight_rally') {
    if (player !== bt.receiver) return;
    if (now < state.hittableStart) {
      popGesture('too early', '#ff9663');
      return;
    }
    if (now > state.hittableEnd) {
      popGesture('too late', '#f4c95d');
      return;
    }
    state.rally++;
    refreshScore();
    popGesture(`${forehand ? 'forehand' : 'backhand'} ${Math.round(power*100)}`,
               forehand ? '#ff9663' : '#37628a');
    sfx.rally(power);
    launchReturn(player, power, roll);
    return;
  }
}

// ═══════════════════════ Main tick ═══════════════════════
let lastT = performance.now();
function tick() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  updateBall(dt);
  updateServeArrow();

  // Ball glued to server between points.
  if (state.mode === 'serve_wait') {
    const pos = serverStartPos(state.server, state.servingFrom);
    ball.position.copy(pos);
    ballShadow.position.x = pos.x;
    ballShadow.position.z = pos.z;
  }

  // Mascots track ball x when it's coming to them.
  if (state.mode === 'in_flight_serve' || state.mode === 'in_flight_rally') {
    const target = bt.receiver;
    if (target) {
      const tGroup = target === 'A' ? soupA : soupB;
      const tx = THREE.MathUtils.clamp(ball.position.x, -SINGLES_HALF + 0.5, SINGLES_HALF - 0.5);
      tGroup.position.x += (tx - tGroup.position.x) * 3 * dt;
      const other = target === 'A' ? soupB : soupA;
      other.position.x += (0 - other.position.x) * 1.5 * dt;
    }
  }

  // ── Mascot procedural anim (per player) ──
  for (const p of ['A', 'B']) {
    const m = mascot[p].mesh;
    if (!m) continue;
    const a = anim[p];
    const t = now / 1000 + (p === 'A' ? 0 : 0.5);

    let hop = 0;
    if (a.hopStart) {
      const dth = now - a.hopStart;
      if (dth > 480) a.hopStart = 0;
      else hop = Math.sin((dth / 480) * Math.PI) * 0.35;
    }
    const bob = Math.sin(t * 2) * 0.02;
    m.position.y = bob + hop;
    const breathe = 1 + Math.sin(t * 2) * 0.02;
    m.scale.set(MASCOT_SCALE, MASCOT_SCALE, MASCOT_SCALE * breathe);

    let swingLean = 0;
    if (a.swingStart) {
      const dt2 = now - a.swingStart;
      if (dt2 > 320) {
        a.swingStart = 0;
        if (mascot[p].paws) mascot[p].paws.rotation.set(0, 0, 0);
      } else {
        const phase = dt2 / 320;
        if (mascot[p].paws) mascot[p].paws.rotation.z = Math.sin(phase * Math.PI) * 0.9;
        swingLean = Math.sin(phase * Math.PI) * 0.28;
      }
    }
    let missLean = 0;
    if (a.missStart) {
      const dt2 = now - a.missStart;
      if (dt2 > 500) a.missStart = 0;
      else {
        const phase = dt2 / 500;
        missLean = phase < 0.35
          ? (phase / 0.35) * 0.55
          : (1 - (phase - 0.35) / 0.65) * 0.55;
      }
    }
    m.rotation.z = swingLean + missLean;
  }

  // ── Visual polish updates: mascot shadow blobs, FX, FOV punch, toon light ──
  blobA.position.x = soupA.position.x; blobA.position.z = soupA.position.z;
  blobB.position.x = soupB.position.x; blobB.position.z = soupB.position.z;
  updateImpactFx(dt);
  updateFovPunch(now);
  TOON_LIGHT_DIR.value.copy(TOON_KEY_DIR).transformDirection(camera.matrixWorldInverse);

  // Cloud drift
  for (const c of clouds) {
    c.position.x += c.userData.driftSpeed * dt;
    if (c.position.x > 50) c.position.x = -50;
  }
  updateDust(dt);

  // Camera shake
  const shake = state.camShake.until > now ? (state.camShake.until - now) / 260 : 0;
  camera.position.x = camHome.x + (Math.random() - 0.5) * state.camShake.amp * shake;
  camera.position.y = camHome.y + (Math.random() - 0.5) * state.camShake.amp * shake * 0.7;
  camera.lookAt(camLook);

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ═══════════════════════ Serial wire-up ═══════════════════════
const $tuneLog = document.getElementById('tune-log');
const $tuneCount = document.getElementById('tune-log-count');
let tuneRows = 0;
function logTune(kind, f) {
  if (!$tuneLog) return;
  const pad = (v, w=5, p=1) => (typeof v === 'number' ? v.toFixed(p) : String(v)).padStart(w);
  const yawStr = (typeof f.yawSign === 'number') ? (f.yawSign > 0 ? '+' : (f.yawSign < 0 ? '-' : '0')) : ' ';
  const row = `${kind.padEnd(6)} arm=${f.arm} p=${f.player} pkGyro=${pad(f.peakGyro,5,0)} pkAcc=${pad(f.peakAccel,5,1)} roll=${pad(f.roll,6,1)} pwr=${pad(f.power,4,2)} yaw=${yawStr} side=${f.forehand}\n`;
  $tuneLog.value += row;
  $tuneLog.scrollTop = $tuneLog.scrollHeight;
  tuneRows++;
  if ($tuneCount) $tuneCount.textContent = `${tuneRows} row${tuneRows === 1 ? '' : 's'}`;
}
document.getElementById('tune-log-copy')?.addEventListener('click', async () => {
  if (!$tuneLog?.value) return;
  try { await navigator.clipboard.writeText($tuneLog.value); }
  catch { $tuneLog.select(); document.execCommand('copy'); }
});
document.getElementById('tune-log-clear')?.addEventListener('click', () => {
  if ($tuneLog) $tuneLog.value = '';
  tuneRows = 0;
  if ($tuneCount) $tuneCount.textContent = '0 rows';
});

const dispatcher = new ArmDispatcher(() => {});
const origOnLine = dispatcher.onLine.bind(dispatcher);
dispatcher.onLine = (line) => {
  origOnLine(line);
  if (!line || line[0] === '#' || line.startsWith('ERR')) return;
  const parts = line.split(',');
  let armId = 0, offset = 0;
  if (parts.length === 10) { armId = +parts[0]; offset = 1; }
  else if (parts.length !== 9) return;
  const s = {
    t_us: +parts[offset],
    ax: +parts[offset + 1], ay: +parts[offset + 2], az: +parts[offset + 3],
    gx: +parts[offset + 4], gy: +parts[offset + 5], gz: +parts[offset + 6],
    roll: +parts[offset + 7], pitch: +parts[offset + 8],
  };
  if (!Number.isNaN(s.ax)) onRawSample(armId, s);
};

const serialHandlers = {
  baud: 115200,
  onLine: (line) => { pairing.onLine(line); dispatcher.onLine(line); },
  onOpen:  () => { $stat.textContent = 'hub connected';
                   $stat.classList.add('connected');
                   if (state.mode === 'idle') startServe(); },
  onClose: () => { $stat.textContent = 'hub disconnected';
                   $stat.classList.remove('connected'); },
  onError: () => { $stat.textContent = 'hub error, try again';
                    $stat.classList.remove('connected'); },
};
document.getElementById('connect').addEventListener('click', async () => {
  try {
    $stat.textContent = 'choosing port…';
    await openSerial(serialHandlers);
  } catch (e) { $stat.textContent = 'connect hub'; }
});
autoOpenSerial(serialHandlers).catch(() => {});

// ═══════════════════════ Dev shortcuts ═══════════════════════
// SPACE: swing on behalf of whoever should swing now.
addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    const player = state.mode === 'serve_wait'      ? state.server
                 : state.mode === 'in_flight_rally' ? bt.receiver
                 : state.mode === 'in_flight_serve' ? bt.receiver
                 : null;
    if (!player) return;
    handleSwing(player, {
      power: 0.6 + Math.random() * 0.35,
      roll:  (Math.random() - 0.5) * 30,
      forehand: true,
    });
  }
});

// ═══════════════════════ Kick off ═══════════════════════
refreshScore();
clearTrail();
startServe();
</script>
