<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Soup Sports">
  <!-- Soup Sports logo — the real Soup, console-split.
       Two-body snowman: small cream head circle stacked on a bigger cream
       body circle (drawn after the body so the head's outline reads as a
       separate ball). Two small tan ears on the top of the head, a tan
       face patch (bear-muzzle oval) on the front of the head carrying
       three ink dots (two eyes + a nose), and two tan paw circles on the
       front of the body. Outlines split down the middle Nintendo-Switch
       style: left half strawberry red #e60012, right half blueberry blue
       #0088cc, 4px unstroked cream seam (x 198-202) between them.
       Flat illustration — no gradients, no filter/shadow blurs. -->

  <defs>
    <!-- half-plane clips; the 4px unclipped seam reads cream -->
    <clipPath id="ss-clip-l"><rect x="0"   y="0" width="198" height="400"/></clipPath>
    <clipPath id="ss-clip-r"><rect x="202" y="0" width="198" height="400"/></clipPath>
  </defs>

  <!-- ── ears: small tan blobs on top of the head, drawn behind it ── -->
  <circle cx="164" cy="56" r="19" fill="#c9a878" stroke="#e60012" stroke-width="5"/>
  <circle cx="236" cy="56" r="19" fill="#c9a878" stroke="#0088cc" stroke-width="5"/>

  <!-- ── body: the big lower ball ── -->
  <circle cx="200" cy="247" r="94" fill="#fbf3e0"/>
  <circle cx="200" cy="247" r="94" fill="none" stroke="#e60012" stroke-width="6"
          clip-path="url(#ss-clip-l)"/>
  <circle cx="200" cy="247" r="94" fill="none" stroke="#0088cc" stroke-width="6"
          clip-path="url(#ss-clip-r)"/>

  <!-- ── paws: small tan circles on the front of the body ── -->
  <circle cx="159" cy="243" r="22" fill="#c9a878"/>
  <circle cx="241" cy="243" r="22" fill="#c9a878"/>

  <!-- ── head: the small upper ball, overlapping the body slightly ── -->
  <circle cx="200" cy="104" r="60" fill="#fbf3e0"/>
  <circle cx="200" cy="104" r="60" fill="none" stroke="#e60012" stroke-width="6"
          clip-path="url(#ss-clip-l)"/>
  <circle cx="200" cy="104" r="60" fill="none" stroke="#0088cc" stroke-width="6"
          clip-path="url(#ss-clip-r)"/>

  <!-- ── face patch: tan muzzle oval low on the front of the head ── -->
  <ellipse cx="200" cy="127" rx="38" ry="27" fill="#b98b6a"/>

  <!-- ── face: two eyes + a nose, ink dots on the patch ── -->
  <circle cx="181" cy="120" r="7" fill="#1c2a3a"/>
  <circle cx="219" cy="120" r="7" fill="#1c2a3a"/>
  <circle cx="200" cy="133" r="6.5" fill="#1c2a3a"/>

  <!-- ── wordmark ── -->
  <text x="200" y="382" text-anchor="middle"
        font-family="Fredoka, Nunito, 'Arial Rounded MT Bold', 'Segoe UI', sans-serif"
        font-weight="700" font-size="34" letter-spacing="0.5"
        fill="#1c2a3a">Soup Sports</text>
</svg>
