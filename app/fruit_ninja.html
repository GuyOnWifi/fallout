<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soup Sports — Soup Ninja</title>
<style>
  :root {
    --sky-top:    #7bd3ee;
    --sky-mid:    #4fc0e3;
    --sky-deep:   #2a95c4;
    --water:      #37a7d0;
    --cream:      #fbf3e0;
    --cream-warm: #f6e9c9;
    --cream-deep: #ecdcb1;
    --ruin-blue:  #37628a;
    --ruin-teal:  #2f8fa3;
    --vine:       #6cb85a;
    --vine-deep:  #4a9440;
    --ink:        #1c2a3a;
    --ink-soft:   #476278;
    --hot:        #ff9663;
    --gold:       #f4c95d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
               font-family: "Fredoka", "Nunito", -apple-system,
                            "SF Pro Rounded", "SF Pro Display", system-ui,
                            sans-serif;
               color: var(--ink);
               background: linear-gradient(180deg,
                           var(--sky-top) 0%,
                           var(--sky-mid) 45%,
                           var(--sky-deep) 78%,
                           var(--water) 100%); }
  canvas { display:block; position:absolute; inset:0; z-index:1; }

  /* Shared chrome */
  .ss-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--cream); color: var(--ink);
    border: 3px solid var(--ink); border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .01em; text-decoration: none; cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 120ms cubic-bezier(.3,.7,.3,1), box-shadow 120ms;
  }
  .ss-btn:hover { transform: translateY(-2px); background: var(--cream-warm);
                  box-shadow: 0 5px 0 var(--ink); }
  .ss-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--ink); }

  #back { position:absolute; top:16px; left:16px; z-index:120; }
  #connect { position:absolute; top:16px; right:16px; z-index:120; }
  #connect::before {
    content: ""; width: 9px; height: 9px; border-radius: 50%; flex-shrink:0;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
    animation: hubpulse 1.8s ease-in-out infinite;
  }
  #connect.connected::before {
    background: var(--vine); box-shadow: 0 0 8px var(--vine);
    animation: none;
  }
  @keyframes hubpulse { 50% { opacity: 0.35; transform: scale(0.85); } }

  /* Score/timer card top center */
  #hud { position:absolute; top:14px; left:50%;
         transform:translateX(-50%); z-index:100;
         display:flex; gap:10px; align-items:center;
         padding:8px 16px 10px; border-radius:16px;
         background: var(--cream); border:3px solid var(--ink);
         box-shadow: 0 4px 0 var(--ink);
         pointer-events:none; }
  #timer { font-size:26px; font-weight:900; line-height:1;
           color: var(--ink); letter-spacing:-.02em; min-width:52px;
           text-align:center; }
  .sep { width:2px; height:26px; background:var(--ink-soft); opacity:.35;
         border-radius:2px; }
  .pscore { display:flex; flex-direction:column; align-items:center; gap:2px;
            min-width:56px; }
  .pscore .lbl { font-size:9px; letter-spacing:.14em; font-weight:800;
                 text-transform:uppercase; color:var(--ink-soft); }
  .pscore.a .lbl { color:var(--hot); }
  .pscore.b .lbl { color:var(--ruin-blue); }
  .pscore .val { font-size:22px; font-weight:900; line-height:1;
                 color: var(--ink); }
  #hud.solo .pscore.b, #hud.solo .sep.rt { display:none; }
  .lives { display:inline-block; margin-left:6px; color:#d84a4a; font-size:13px; letter-spacing:-1px; font-weight:900; }
  @media (max-width: 640px) { #hud { top: 64px; } }

  /* Prompt bottom-center */
  #prompt { position:absolute; bottom:20px; left:50%;
            transform:translateX(-50%); z-index:5;
            padding:10px 20px; background: var(--cream);
            border: 3px solid var(--ink); border-radius: 999px;
            font-weight:700; letter-spacing:.01em;
            font-size:13px; color: var(--ink);
            box-shadow: 0 3px 0 var(--ink);
            white-space:nowrap; }

  /* Pair-hint pill */
  #pair-hint { position:absolute; bottom:20px; left:16px; z-index:60;
               font-size:10px; letter-spacing:.06em; font-weight:700;
               padding:6px 12px; border-radius:999px;
               background: var(--cream); color: var(--ink);
               border: 2px solid var(--ink);
               box-shadow: 0 2px 0 var(--ink);
               pointer-events:none; opacity:0.85; }
  #pair-hint.hidden { display:none; }

  /* Big banner */
  #banner { position:absolute; top:44%; left:50%; z-index:6;
            transform:translate(-50%,-50%) scale(1);
            font-size:88px; font-weight:900; letter-spacing:-.03em;
            text-transform:uppercase; opacity:0;
            color: var(--cream);
            text-shadow: 0 6px 0 var(--ruin-blue),
                         0 8px 32px rgba(28,42,58,.35);
            transition: opacity 100ms, transform 200ms;
            pointer-events:none; }
  #banner.pop { opacity:1; transform:translate(-50%,-50%) scale(1.14); }

  /* Devhint */
  #devhint { position:absolute; bottom:12px; right:16px; z-index:60;
             font-size:10px; letter-spacing:.04em; color:var(--ink);
             opacity:.45; font-weight:600; pointer-events:none; }
  @media (max-width: 640px) { #devhint { display:none; } }
  html:not(.dev) #tune-log-wrap, html:not(.dev) #devhint { display:none !important; }

  /* Tune log */
  #tune-log-wrap {
    position:absolute; top:16px; left:120px; z-index:131;
    display:flex; flex-direction:column; gap:6px; max-width:44vw;
  }
  #tune-log-controls { display:flex; gap:6px; align-items:center; }
  #tune-log-controls button {
    padding:6px 12px; border-radius:8px;
    background:var(--cream); color:var(--ink);
    border:2px solid var(--ink); box-shadow:0 2px 0 var(--ink);
    font:inherit; font-size:11px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; cursor:pointer;
  }
  #tune-log-controls #tune-log-count {
    font-family:ui-monospace,Menlo,monospace; font-size:11px;
    color:var(--cream); background:rgba(28,42,58,.65);
    padding:4px 10px; border-radius:999px;
  }
  #tune-log {
    width:100%; height:220px; padding:10px 12px;
    background:rgba(28,42,58,.85); color:#f7f3e6;
    border:none; border-radius:8px;
    font-family:ui-monospace,Menlo,monospace;
    font-size:11px; line-height:1.5; resize:none;
  }
  @media (max-width: 640px) { #tune-log-wrap { display:none; } }
</style>
</head>
<body>
<script>
  if (true) {
    document.documentElement.classList.add('dev');
  }
</script>
<a id="back" class="ss-btn" href="index.html">← menu</a>
<button id="connect" class="ss-btn">connect hub</button>

<div id="hud" class="solo">
  <div class="pscore a">
    <span class="lbl">you</span>
    <span class="val" id="scoreA">0</span>
    <span class="lives" id="livesA">♥♥♥</span>
  </div>
  <div class="sep"></div>
  <div id="timer">60</div>
  <div class="sep rt"></div>
  <div class="pscore b">
    <span class="lbl">P B</span>
    <span class="val" id="scoreB">0</span>
    <span class="lives" id="livesB">♥♥♥</span>
  </div>
</div>

<div id="prompt">swing to slice the soups · don't touch the slime</div>
<div id="pair-hint" class="hidden">pair on the menu for versus</div>
<div id="devhint">keys · space slash · r reset</div>
<div id="banner"></div>

<div id="tune-log-wrap">
  <div id="tune-log-controls">
    <button id="tune-log-copy" type="button">copy</button>
    <button id="tune-log-clear" type="button">clear</button>
    <span id="tune-log-count">0 rows</span>
  </div>
  <textarea id="tune-log" readonly placeholder="each swing logs one row."></textarea>
</div>

<canvas id="stage"></canvas>

<script type="module">
import { openSerial, autoOpenSerial } from './serial.js';
import { ArmDispatcher } from './dispatch.js';
import { pairing } from './pairing.js';
import { sfx } from './sfx.js';
import { showLoader } from './loader.js';

showLoader({ game: 'ninja', tips: [
  'slash any direction, timing matters more than aim',
  'bombs slime you out, small fruits are worth two points',
  'keep the wristband strap snug so it reads your slash cleanly',
] });

// ─── canvas ───
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function fit() {
  W = innerWidth; H = innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
addEventListener('resize', fit); fit();

// ─── palette ───
const PAL = {
  ink:'#1c2a3a', cream:'#fbf3e0', creamDeep:'#ecdcb1',
  hot:'#ff9663', gold:'#f4c95d', vine:'#6cb85a', ruinBlue:'#37628a',
  water:'#37a7d0',
};
const FRUIT_COLORS = [PAL.hot, PAL.gold, PAL.vine, PAL.water, '#f7b8c4'];
const PLAYER_BLADE = { A: PAL.hot, B: PAL.ruinBlue };

// ─── state ───
const ROUND_MS = 60_000;
const GRAVITY = 900;                // px/s^2
const SPAWN_MIN_MS = 550, SPAWN_MAX_MS = 950;
const SLASH_HALF = 46;              // px band around blade line
const SLASH_ACTIVE_MS = 220;
const BOMB_PROB = 0.14;
const FRUIT_R_MIN = 22, FRUIT_R_MAX = 42;
const FRUIT_SMALL_THRESH = 30;    // r < this => small fruit, worth +2 instead of +1

const state = {
  running: false,
  startedMs: 0,
  endMs: 0,
  scoreA: 0, scoreB: 0,
  // Three lives per player. One slime = one life lost + a shake + a warning
  // banner. Third slime ends the round. Was instant-out — didn't leave any
  // room to recover from one misjudged slice.
  livesA: 3, livesB: 3,
  slimedA: false, slimedB: false,
  nextSpawn: 0,
  fruits: [],       // {x,y,vx,vy,r,color,bomb,alive,spin,rot}
  halves: [],       // {x,y,vx,vy,r,color,rot,vrot,alpha,side}
  slashes: [],      // {y,startMs,side,player,angle}
  splats: [],       // {x,y,r,color,life}
  sparks: [],       // {x,y,vx,vy,life,max,color} — slash-end sparkles
  booms: [],        // {x,y,life,max} — expanding ink ring on bomb hit
  boomFlash: 0,     // seconds of red screen flash remaining
  boomShake: 0,     // seconds of screen shake remaining
  gameOver: false,
  pvp: false,
};

// ─── HUD refs ───
const scoreAEl = document.getElementById('scoreA');
const scoreBEl = document.getElementById('scoreB');
const timerEl = document.getElementById('timer');
const promptEl = document.getElementById('prompt');
const bannerEl = document.getElementById('banner');
const hudEl = document.getElementById('hud');
const statusEl = document.getElementById('connect');
const pairHintEl = document.getElementById('pair-hint');

function popBanner(text, color = PAL.gold) {
  bannerEl.textContent = text;
  bannerEl.style.color = color;
  bannerEl.classList.remove('pop'); void bannerEl.offsetWidth;
  bannerEl.classList.add('pop');
  setTimeout(() => bannerEl.classList.remove('pop'), 1600);
}

// ─── spawning ───
function spawnFruit() {
  const bomb = Math.random() < BOMB_PROB;
  const r = FRUIT_R_MIN + Math.random() * (FRUIT_R_MAX - FRUIT_R_MIN);
  const fromLeft = Math.random() < 0.5;
  const x = fromLeft ? (60 + Math.random() * W * 0.35)
                     : (W - 60 - Math.random() * W * 0.35);
  const targetX = W / 2 + (Math.random() - 0.5) * W * 0.4;
  const y = H + 40;
  // Choose a vertical velocity, derive vx from geometry so it peaks around mid.
  const vy = -(900 + Math.random() * 250);
  const flightT = -vy / GRAVITY;   // to peak
  const vx = (targetX - x) / (flightT * 1.4);
  state.fruits.push({
    x, y, vx, vy, r,
    color: bomb ? '#101015' : FRUIT_COLORS[(Math.random() * FRUIT_COLORS.length) | 0],
    bomb, alive: true,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 5,
  });
}

// Fixed strike-zone y (fraction of arena height). The persistent guide
// line lives at this height so players can see WHERE their swings land.
// Was previously randomized 0.35-0.60 per slash which made "why did I
// miss?" impossible to answer.
const STRIKE_Y_FRAC = 0.55;

// ─── slice ───
function fireSlash(player) {
  if (!state.running || state.gameOver) return;
  // Blade sweeps a horizontal line at the FIXED strike-zone height. Player
  // A cuts left half in PvP, player B cuts right half. Solo = full width.
  const side = state.pvp ? (player === 'A' ? 'L' : 'R') : 'F';
  const y = H * STRIKE_Y_FRAC;
  state.slashes.push({ y, startMs: performance.now(), side, player });
  // Sparkle burst at both ends of the streak so the cut reads instantly.
  const ex0 = side === 'R' ? W / 2 : 0;
  const ex1 = side === 'L' ? W / 2 : W;
  for (const ex of [ex0, ex1]) {
    const dir = ex === ex0 ? 1 : -1;
    for (let i = 0; i < 6; i++) {
      state.sparks.push({
        x: ex, y: y + (Math.random() - 0.5) * 10,
        vx: dir * (40 + Math.random() * 180),
        vy: (Math.random() - 0.5) * 240,
        life: 0.22 + Math.random() * 0.16, max: 0.38,
        color: Math.random() < 0.5 ? '#ffffff' : PAL.gold,
      });
    }
  }
  // Immediately test hit against all in-flight fruits inside the band + half.
  for (const f of state.fruits) {
    if (!f.alive) continue;
    if (side === 'L' && f.x > W / 2 + 30) continue;
    if (side === 'R' && f.x < W / 2 - 30) continue;
    if (Math.abs(f.y - y) > SLASH_HALF + f.r * 0.6) continue;
    sliceFruit(f, player, y);
  }
}

function sliceFruit(f, player, sliceY) {
  f.alive = false;
  // Bomb hit: costs 1 life. Third hit ends the round. Softer than the old
  // instant-out — gives players a chance to recover after one misjudged slice.
  if (f.bomb) {
    if (player === 'A') state.livesA = Math.max(0, state.livesA - 1);
    else                state.livesB = Math.max(0, state.livesB - 1);
    const remaining = player === 'A' ? state.livesA : state.livesB;
    sfx.bombSlash();
    kickBanner();
    // BOOM burst: red screen flash + shake + expanding ink shockwave ring.
    state.booms.push({ x: f.x, y: f.y, life: 0.5, max: 0.5 });
    state.boomFlash = 0.22;
    state.boomShake = 0.3;
    if (remaining <= 0) {
      if (player === 'A') state.slimedA = true;
      else                state.slimedB = true;
      popBanner('slimed out!', PAL.vine);
      endRound();
      return;
    }
    popBanner(`${remaining} ${remaining === 1 ? 'life' : 'lives'} left`, PAL.vine);
    refreshHud();
    return;
  }
  sfx.slice();
  // Smaller fruits are harder to hit → worth more.
  const pts = f.r < FRUIT_SMALL_THRESH ? 2 : 1;
  if (player === 'A') state.scoreA += pts;
  else state.scoreB += pts;
  // Split into two halves flying apart vertically.
  const spread = 220 + Math.random() * 80;
  state.halves.push({
    x:f.x, y:f.y, r:f.r, color:f.color,
    vx: f.vx * 0.6 - spread * 0.3, vy: f.vy * 0.4 - spread,
    rot:f.rot, vrot: f.vrot - 3, alpha:1, side:-1, bomb:f.bomb,
  });
  state.halves.push({
    x:f.x, y:f.y, r:f.r, color:f.color,
    vx: f.vx * 0.6 + spread * 0.3, vy: f.vy * 0.4 + spread * 0.4,
    rot:f.rot, vrot: f.vrot + 3, alpha:1, side:+1, bomb:f.bomb,
  });
  // Splat
  state.splats.push({ x:f.x, y:f.y, r:f.r * 1.3, color:f.color, life:0.5, max:0.5 });
  updateHUD();
}

let bannerKickT = 0;
function kickBanner() { bannerKickT = 0.35; }

const livesAEl = document.getElementById('livesA');
const livesBEl = document.getElementById('livesB');
function updateHUD() {
  scoreAEl.textContent = state.scoreA;
  scoreBEl.textContent = state.scoreB;
  if (livesAEl) livesAEl.textContent = '♥'.repeat(state.livesA) || '—';
  if (livesBEl) livesBEl.textContent = '♥'.repeat(state.livesB) || '—';
}
// Alias for the bomb-hit path (which called this before it existed).
function refreshHud() { updateHUD(); }

// ─── game loop ───
let lastT = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (state.running && !state.gameOver) {
    const remain = state.endMs - now;
    timerEl.textContent = Math.max(0, Math.ceil(remain / 1000));
    if (remain <= 0) endRound();

    if (now >= state.nextSpawn) {
      spawnFruit();
      state.nextSpawn = now + SPAWN_MIN_MS + Math.random() * (SPAWN_MAX_MS - SPAWN_MIN_MS);
    }
  }

  // Physics
  for (const f of state.fruits) {
    if (!f.alive) continue;
    if (f.demo) { f.rot += f.vrot * dt; continue; }  // ?bombdemo: pinned in place
    f.vy += GRAVITY * dt;
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.rot += f.vrot * dt;
    if (f.y > H + 80) f.alive = false;
  }
  for (const h of state.halves) {
    h.vy += GRAVITY * dt;
    h.x += h.vx * dt; h.y += h.vy * dt;
    h.rot += h.vrot * dt;
    h.alpha -= dt * 0.9;
  }
  for (const sp of state.sparks) {
    sp.x += sp.vx * dt; sp.y += sp.vy * dt;
    sp.vy += GRAVITY * 0.5 * dt;
  }
  state.fruits = state.fruits.filter(f => f.alive);
  state.halves = state.halves.filter(h => h.alpha > 0 && h.y < H + 100);
  state.splats = state.splats.filter(s => (s.life -= dt) > 0);
  state.slashes = state.slashes.filter(s => now - s.startMs < SLASH_ACTIVE_MS);
  state.sparks = state.sparks.filter(sp => (sp.life -= dt) > 0);
  state.booms = state.booms.filter(b => (b.life -= dt) > 0);
  if (state.boomFlash > 0) state.boomFlash = Math.max(0, state.boomFlash - dt);
  if (state.boomShake > 0) state.boomShake = Math.max(0, state.boomShake - dt);

  if (bannerKickT > 0) bannerKickT -= dt;

  render();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function render() {
  ctx.clearRect(0, 0, W, H);

  // Screen shake while a bomb boom is live.
  ctx.save();
  if (state.boomShake > 0) {
    const m = state.boomShake * 16;
    ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
  }

  // Half tints — left is player A red, right is player B blue (PvP only).
  if (state.pvp) {
    ctx.fillStyle = 'rgba(230,0,18,0.03)';
    ctx.fillRect(0, 0, W / 2, H);
    ctx.fillStyle = 'rgba(0,136,204,0.03)';
    ctx.fillRect(W / 2, 0, W / 2, H);
  }

  // Faint dashed arena mid-line — always drawn (solo + PvP) so "where the
  // arena splits" is legible before a second player even pairs in.
  ctx.strokeStyle = 'rgba(28,42,58,.18)';
  ctx.setLineDash([6, 8]);
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // Persistent horizontal STRIKE ZONE guide — anything crossing this y at
  // the moment a swing fires gets sliced. Draws a translucent band and a
  // bolder middle line so players learn "wait for the fruit to hit here."
  const sy = H * STRIKE_Y_FRAC;
  ctx.fillStyle = 'rgba(244, 201, 93, 0.08)';
  ctx.fillRect(0, sy - SLASH_HALF, W, SLASH_HALF * 2);
  ctx.strokeStyle = 'rgba(244, 201, 93, 0.55)';
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 10]);
  ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  ctx.setLineDash([]);

  // A/B half badges in the top corners (PvP only — solo has no player B).
  if (state.pvp) {
    drawHalfBadge(34, 96, 'A', PAL.hot);
    drawHalfBadge(W - 34, 96, 'B', PAL.ruinBlue);
  }

  // Splats (behind fruits)
  for (const s of state.splats) {
    const p = s.life / s.max;
    ctx.globalAlpha = p * 0.6;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * (1.4 - p * 0.4), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Halves
  for (const h of state.halves) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, h.alpha);
    ctx.translate(h.x, h.y);
    ctx.rotate(h.rot);
    drawHalf(h.r, h.color, h.side, h.bomb);
    ctx.restore();
  }

  // Fruits
  for (const f of state.fruits) {
    if (!f.alive) continue;
    ctx.save();
    ctx.translate(f.x, f.y);
    // Danger halo for bombs — subtle pulsing red glow drawn before rotation.
    if (f.bomb) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.012);
      const g = ctx.createRadialGradient(0, 0, f.r * 0.6, 0, 0, f.r * 1.9);
      g.addColorStop(0, `rgba(255,60,40,${0.28 + pulse * 0.18})`);
      g.addColorStop(1, 'rgba(255,60,40,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, f.r * 1.9, 0, Math.PI * 2); ctx.fill();
    }
    // Bombs only wobble — a full spin whirls the fuse around and the
    // silhouette starts reading as a dark fruit. Fuse stays up = bomb.
    ctx.rotate(f.bomb ? Math.sin(f.rot) * 0.18 : f.rot);
    drawFruit(f.r, f.color, f.bomb);
    ctx.restore();
  }

  // Slashes
  for (const s of state.slashes) {
    const age = (performance.now() - s.startMs) / SLASH_ACTIVE_MS;
    const alpha = Math.max(0, 1 - age);
    const x0 = s.side === 'L' ? 0 : s.side === 'R' ? W/2 : 0;
    const x1 = s.side === 'L' ? W/2 : W;
    const col = PLAYER_BLADE[s.player] || PAL.hot;
    // Glow
    ctx.strokeStyle = col; ctx.globalAlpha = alpha * 0.35;
    ctx.lineWidth = 24; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x0, s.y); ctx.lineTo(x1, s.y); ctx.stroke();
    // Core — bright white streak, edge to edge of the swinger's half.
    ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = alpha;
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(x0, s.y); ctx.lineTo(x1, s.y); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Slash-end sparkles
  for (const sp of state.sparks) {
    const p = Math.max(0, sp.life / sp.max);
    ctx.globalAlpha = p;
    ctx.fillStyle = sp.color;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, 1.2 + p * 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Bomb shockwave rings — expanding ink ring with a cream echo inside.
  for (const b of state.booms) {
    const p = 1 - b.life / b.max;            // 0 → 1 over lifetime
    const rad = 24 + p * 190;
    ctx.globalAlpha = (1 - p) * 0.9;
    ctx.strokeStyle = PAL.ink;
    ctx.lineWidth = 12 * (1 - p) + 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, rad, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = (1 - p) * 0.6;
    ctx.strokeStyle = PAL.cream;
    ctx.lineWidth = 5 * (1 - p) + 1;
    ctx.beginPath(); ctx.arc(b.x, b.y, rad * 0.82, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();   // end screen shake

  // Red flash overlay on bomb hit — drawn unshaken, over everything.
  if (state.boomFlash > 0) {
    ctx.fillStyle = `rgba(230,0,18,${(state.boomFlash / 0.22) * 0.28})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawHalfBadge(x, y, letter, color) {
  ctx.fillStyle = PAL.cream;
  ctx.strokeStyle = PAL.ink; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '900 17px Fredoka, Nunito, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(letter, x, y + 1);
}

function drawFruit(r, color, bomb) {
  if (bomb) { drawBomb(r); return; }
  // Body
  ctx.fillStyle = color;
  ctx.strokeStyle = PAL.ink; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(-r*0.35, -r*0.4, r*0.28, 0, Math.PI * 2); ctx.fill();
  // Cute leaf
  ctx.fillStyle = PAL.vine; ctx.strokeStyle = PAL.ink; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(r*0.15, -r*0.95, r*0.28, r*0.14, -0.7, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
}

function drawBomb(r) {
  // "Bomb-Soup" — the Soup mascot gone dark and dangerous. Near-black round
  // body keeps the classic bomb silhouette, but two matte dark ears poke up
  // beside the (smaller) fuse cap, and a dusk-tan face patch on the lower
  // front carries two GLOWING red eyes. Still instantly "do not slice":
  // dark body, lit fuse, sparks, ambient red halo. No green, no pink,
  // no seed/stripe patterning — nothing fruit-like, nothing smiling.
  const t = performance.now() / 1000;
  const pulse = 1 + 0.2 * Math.sin(t * Math.PI * 8);

  // Ambient red danger halo behind the whole body.
  const halo = ctx.createRadialGradient(0, 0, r * 0.6, 0, 0, r * 1.5);
  halo.addColorStop(0, 'rgba(255,70,40,0.28)');
  halo.addColorStop(1, 'rgba(255,70,40,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2); ctx.fill();

  // Two small matte ears on top, drawn behind the body (Soup silhouette).
  // Dark greyish-brown fill with a slightly lighter rim — not cute, just Soup.
  const earR = r * 0.3;
  for (const s of [-1, 1]) {
    ctx.fillStyle = '#3a2f28';
    ctx.strokeStyle = '#4d4038'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(s * r * 0.58, -r * 0.82, earR, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // heavy dark outer edge so the ear still reads bomb-dark against the sky
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(s * r * 0.58, -r * 0.82, earR + 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Matte near-black body with heavy pure-black outline. Flat fill on
  // purpose — shading gradients made the old bomb read as a dark fruit.
  ctx.fillStyle = '#1a1410';
  ctx.strokeStyle = '#000000'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // White highlight arc, upper-left — the classic cartoon "shiny ball" cue.
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = r * 0.13; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.66, Math.PI * 1.05, Math.PI * 1.42); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.55, r * 0.07, 0, Math.PI * 2); ctx.fill();

  // Dusk-tan face patch (Soup's muzzle oval) on the lower front. Muted,
  // NOT cream — Soup in shadow.
  ctx.fillStyle = '#6a5240';
  ctx.beginPath();
  ctx.ellipse(0, r * 0.34, r * 0.5, r * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();

  // Two glowing red eyes on the patch — angry Soup, not friendly ink dots.
  for (const s of [-1, 1]) {
    const ex = s * r * 0.24, ey = r * 0.24;
    const glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, r * 0.22);
    glow.addColorStop(0, 'rgba(255,85,64,0.35)');
    glow.addColorStop(1, 'rgba(255,85,64,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(ex, ey, r * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff5540';
    ctx.beginPath(); ctx.arc(ex, ey, r * 0.09, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd0c4';
    ctx.beginPath(); ctx.arc(ex, ey, r * 0.035, 0, Math.PI * 2); ctx.fill();
  }

  // Scowl: a short flat dark bar where Soup's nose dot would sit.
  ctx.strokeStyle = '#241a12'; ctx.lineWidth = Math.max(2, r * 0.07);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-r * 0.1, r * 0.48); ctx.lineTo(r * 0.1, r * 0.48);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Metallic light-gray cap where the fuse meets the body — narrower than
  // the old one so the ears stay visible on either side.
  const cw = r * 0.3, ch = r * 0.26;
  const capY = -r - ch * 0.7;
  ctx.fillStyle = '#9aa2ad';
  ctx.strokeStyle = '#000000'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(-cw / 2, capY, cw, ch, r * 0.07); ctx.fill(); ctx.stroke();
  // Darker lower band + bright top rim = simple metal read.
  ctx.fillStyle = '#6b737d';
  ctx.fillRect(-cw / 2 + 2, capY + ch * 0.55, cw - 4, ch * 0.35);
  ctx.strokeStyle = '#d8dee6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-cw / 2 + 3, capY + 3); ctx.lineTo(cw / 2 - 3, capY + 3); ctx.stroke();

  // Bright yellow-orange fuse curling up out of the cap. Thick and loud.
  const fx = r * 0.32, fy = capY - r * 0.55;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#ff9d2e'; ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, capY + 2);
  ctx.quadraticCurveTo(r * 0.52, capY - r * 0.35, fx, fy);
  ctx.stroke();
  // Hot yellow core down the middle of the fuse.
  ctx.strokeStyle = '#ffdf6b'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, capY + 2);
  ctx.quadraticCurveTo(r * 0.52, capY - r * 0.35, fx, fy);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Animated flame at the fuse tip — red-orange halo, orange body, hot core.
  const fr = r * 0.24 * pulse;
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#ff5a26';
  ctx.beginPath(); ctx.arc(fx, fy, fr * 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#ffa53d';
  ctx.beginPath();
  ctx.ellipse(fx, fy - fr * 0.35, fr * 0.85, fr * 1.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff6c8';
  ctx.beginPath(); ctx.arc(fx, fy - fr * 0.2, fr * 0.45, 0, Math.PI * 2); ctx.fill();

  // Sparkle particles around the tip — 3-5 gold flecks, some as 4-point stars.
  const sparkCount = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < sparkCount; i++) {
    const sx = fx + (Math.random() * 10 - 5) * pulse;
    const sy = fy + (Math.random() * 10 - 5) * pulse;
    const sr = (0.9 + Math.random() * 1.4) * pulse;
    ctx.fillStyle = Math.random() < 0.5 ? '#ffdf6b' : '#ffb14d';
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    if (Math.random() < 0.45) {
      ctx.strokeStyle = '#fff6c8'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx - sr * 2.4, sy); ctx.lineTo(sx + sr * 2.4, sy);
      ctx.moveTo(sx, sy - sr * 2.4); ctx.lineTo(sx, sy + sr * 2.4);
      ctx.stroke();
    }
  }
}

function drawHalf(r, color, side, bomb) {
  ctx.fillStyle = color;
  ctx.strokeStyle = PAL.ink; ctx.lineWidth = 4;
  ctx.beginPath();
  // Half circle: side=-1 top half, +1 bottom half
  if (side < 0) ctx.arc(0, 0, r, Math.PI, 0);
  else ctx.arc(0, 0, r, 0, Math.PI);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Cream juicy interior
  ctx.fillStyle = bomb ? '#2a3746' : PAL.cream;
  ctx.beginPath();
  if (side < 0) ctx.moveTo(-r, 0), ctx.lineTo(r, 0), ctx.arc(0, 0, r * 0.7, 0, Math.PI, true);
  else ctx.moveTo(-r, 0), ctx.lineTo(r, 0), ctx.arc(0, 0, r * 0.7, 0, Math.PI, false);
  ctx.closePath();
  ctx.fill();
}

// ─── round control ───
function startRound() {
  state.scoreA = 0; state.scoreB = 0;
  state.livesA = 3; state.livesB = 3;
  state.slimedA = false; state.slimedB = false;
  state.fruits.length = 0; state.halves.length = 0;
  state.slashes.length = 0; state.splats.length = 0;
  state.sparks.length = 0; state.booms.length = 0;
  state.boomFlash = 0; state.boomShake = 0;
  state.gameOver = false;
  state.running = true;
  state.startedMs = performance.now();
  state.endMs = state.startedMs + ROUND_MS;
  state.nextSpawn = state.startedMs + 400;
  updateHUD();
  promptEl.textContent = state.pvp
    ? 'left side = player a · right side = player b'
    : 'swing to slice · avoid the bombs';
  popBanner('go!', PAL.gold);
}

function endRound() {
  if (state.gameOver) return;
  state.running = false;
  state.gameOver = true;
  if (state.pvp) {
    // Slime = instant loss for the slicer.
    let msg;
    if (state.slimedA && !state.slimedB)      msg = 'player b wins';
    else if (state.slimedB && !state.slimedA) msg = 'player a wins';
    else if (state.slimedA && state.slimedB)  msg = 'both slimed';
    else msg = state.scoreA === state.scoreB ? 'tie!'
              : state.scoreA > state.scoreB ? 'player a wins' : 'player b wins';
    popBanner(msg, PAL.vine);
    promptEl.textContent = `final ${state.scoreA} to ${state.scoreB} · press R to play again`;
  } else {
    if (state.slimedA) {
      popBanner('slimed!', PAL.vine);
      promptEl.textContent = `you got slimed at ${state.scoreA} · press R to try again`;
    } else {
      popBanner(`${state.scoreA} sliced`, PAL.gold);
      promptEl.textContent = `time · press R to play again`;
    }
  }
}

// Auto-start on load; keep it looping-friendly for demo.
setTimeout(startRound, 400);

// ─── serial + swing detection (adapted from bowling.html) ───
const SWING_ARM_DPS       = 260;
const SWING_RELEASE_FRAC  = 0.35;
const SWING_MIN_PEAK_DPS  = 260;
const SWING_REFRACTORY_MS = 380;
const SWING_MAX_ACTIVE_MS = 900;
const SWING_MIN_ACTIVE_MS = 60;

const swing = {
  0: { phase:'IDLE', peakGyro:0, peakAccel:0, activeStart:0, lockUntil:0 },
  1: { phase:'IDLE', peakGyro:0, peakAccel:0, activeStart:0, lockUntil:0 },
};
// Dynamic per-arm state — any armId, not just 0/1 (MAC-derived after v2).
function ensureSwing(armId) {
  if (!swing[armId]) swing[armId] = { phase:'IDLE', peakGyro:0, peakAccel:0, activeStart:0, lockUntil:0 };
  return swing[armId];
}

function onRawSample(armId, sample) {
  const st = ensureSwing(armId);
  const nowMs = performance.now();
  if (nowMs < st.lockUntil) return;

  const gyroMag  = Math.hypot(sample.gx, sample.gy, sample.gz);
  const accelMag = Math.hypot(sample.ax, sample.ay, sample.az);

  switch (st.phase) {
    case 'IDLE': {
      if (gyroMag > SWING_ARM_DPS) {
        st.phase = 'ACTIVE';
        st.peakGyro = gyroMag;
        st.peakAccel = accelMag;
        st.activeStart = nowMs;
      }
      break;
    }
    case 'ACTIVE': {
      if (gyroMag > st.peakGyro) st.peakGyro = gyroMag;
      if (accelMag > st.peakAccel) st.peakAccel = accelMag;
      const dtActive = nowMs - st.activeStart;
      const releasing = gyroMag < st.peakGyro * SWING_RELEASE_FRAC
                     && dtActive > SWING_MIN_ACTIVE_MS
                     && st.peakGyro > SWING_MIN_PEAK_DPS;
      if (releasing) {
        const player = pairing.playerForArm(armId) || (state.pvp ? null : 'A');
        if (player) {
          fireSlash(player);
          logTune('slash', { arm:armId, player, peakGyro:st.peakGyro, peakAccel:st.peakAccel, dtActive });
        }
        st.phase = 'IDLE';
        st.lockUntil = nowMs + SWING_REFRACTORY_MS;
        st.peakGyro = 0; st.peakAccel = 0;
      } else if (dtActive > SWING_MAX_ACTIVE_MS) {
        st.phase = 'IDLE';
        st.peakGyro = 0; st.peakAccel = 0;
      }
      break;
    }
  }
}

// Tune log
const $tuneLog = document.getElementById('tune-log');
const $tuneCount = document.getElementById('tune-log-count');
let tuneRows = 0;
function logTune(kind, f) {
  if (!$tuneLog) return;
  const pad = (v, w=5, p=1) => (typeof v === 'number' ? v.toFixed(p) : String(v)).padStart(w);
  const row = `${kind.padEnd(8)} arm=${f.arm} p=${f.player} pkGyro=${pad(f.peakGyro,5,0)} pkAcc=${pad(f.peakAccel,5,1)} dt=${pad(f.dtActive,4,0)}\n`;
  $tuneLog.value += row;
  $tuneLog.scrollTop = $tuneLog.scrollHeight;
  tuneRows++;
  $tuneCount.textContent = `${tuneRows} row${tuneRows === 1 ? '' : 's'}`;
}
document.getElementById('tune-log-copy')?.addEventListener('click', async () => {
  if (!$tuneLog?.value) return;
  try { await navigator.clipboard.writeText($tuneLog.value); }
  catch { $tuneLog.select(); document.execCommand('copy'); }
});
document.getElementById('tune-log-clear')?.addEventListener('click', () => {
  $tuneLog.value = ''; tuneRows = 0; $tuneCount.textContent = '0 rows';
});

// Dispatcher wires per-arm sample stream.
const dispatcher = new ArmDispatcher(() => {});
const origOnLine = dispatcher.onLine.bind(dispatcher);
dispatcher.onLine = (line) => {
  origOnLine(line);
  if (!line || line[0] === '#' || line.startsWith('ERR')) return;
  const parts = line.split(',');
  let armId = 0, offset = 0;
  if (parts.length === 10) { armId = +parts[0]; offset = 1; }
  else if (parts.length !== 9) return;
  const s = {
    t_us: +parts[offset],
    ax: +parts[offset + 1], ay: +parts[offset + 2], az: +parts[offset + 3],
    gx: +parts[offset + 4], gy: +parts[offset + 5], gz: +parts[offset + 6],
    roll: +parts[offset + 7], pitch: +parts[offset + 8],
  };
  if (!Number.isNaN(s.ax)) onRawSample(armId, s);
};

function refreshPairing() {
  const armA = pairing.armForPlayer('A');
  const armB = pairing.armForPlayer('B');
  state.pvp = armA !== null && armB !== null;
  hudEl.classList.toggle('solo', !state.pvp);
  pairHintEl.classList.toggle('hidden', state.pvp);
}
pairing.onChange(refreshPairing);
refreshPairing();

const serialHandlers = {
  baud: 115200,
  onLine: (line) => { pairing.onLine(line); dispatcher.onLine(line); },
  onOpen: () => { statusEl.textContent = 'hub connected';
                  statusEl.classList.add('connected'); },
  onClose: () => { statusEl.textContent = 'hub disconnected';
                   statusEl.classList.remove('connected'); },
  onError: () => { statusEl.textContent = 'hub error, try again';
                    statusEl.classList.remove('connected'); },
};
document.getElementById('connect').addEventListener('click', async () => {
  try {
    statusEl.textContent = 'choosing port…';
    await openSerial(serialHandlers);
  } catch { statusEl.textContent = 'connect hub'; }
});
autoOpenSerial(serialHandlers).catch(() => {});

// Dev shortcuts
addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    fireSlash('A');
  } else if (e.key === 'b' || e.key === 'B') {
    fireSlash('B');
  } else if (e.key === 'r' || e.key === 'R') {
    startRound();
  }
});

// Dev: ?bombdemo pins one big bomb at screen center (no gravity) so the
// bomb art can be reviewed/screenshotted without waiting on random spawns.
if (location.search.includes('bombdemo')) {
  // Wait out the auto startRound (400ms) which clears state.fruits.
  setTimeout(() => {
    for (const [dx, r] of [[-90, 42], [90, 24]]) {
      state.fruits.push({
        x: W / 2 + dx, y: H / 2, vx: 0, vy: 0, r,
        color: '#101015', bomb: true, alive: true,
        rot: 0, vrot: 0.6, demo: true,
      });
    }
  }, 600);
}

// No GLB here — module reaching the end means we're booted; dismiss loader.
document.body.classList.add('game-active');
</script>
</body>
