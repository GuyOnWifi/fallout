; Two envs share one src/ dir via build_src_filter:
;   wrist    -> flash to ANY wristband. Arm ID derives from the chip's WiFi
;              MAC at boot, so one binary runs on every band. Browser-side
;              pairing.js assigns slot A/B by order-of-shake.
;   dongle   -> flash to the receiver plugged into the laptop.
;
; All are the same XIAO ESP32-S3 board.
;
; Flash examples:
;   pio run -e wrist  -t upload --upload-port /dev/ttyACM0
;   pio run -e dongle -t upload --upload-port /dev/ttyACM0
[platformio]
src_dir = src

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:wrist]
build_src_filter = +<wrist.cpp>

[env:dongle]
build_src_filter = +<dongle.cpp>

; ── XIAO ESP32-C3 wristband. C3 does NOT auto-enter bootloader over RTS/DTR.
; Manual boot sequence before flashing:
;   1. Unplug USB
;   2. Hold the small BOOT button (labeled B, near USB port)
;   3. Plug USB back in while still holding BOOT
;   4. Release BOOT, then run the upload command
[env:wrist_c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
board_build.flash_mode = dio
build_src_filter = +<wrist.cpp>
build_flags = -DMPU_SDA_PIN=6 -DMPU_SCL_PIN=7
