; Three envs share one src/ dir via build_src_filter:
;   wrist_right  (ARM_ID=0)  -> flash to right-hand wristband
;   wrist_left   (ARM_ID=1)  -> flash to left-hand wristband
;   dongle                   -> flash to the receiver plugged into the laptop
;
; All three are the same XIAO ESP32-S3 board.
;
; Flash examples:
;   pio run -e wrist_right -t upload --upload-port /dev/ttyACM0
;   pio run -e wrist_left  -t upload --upload-port /dev/ttyACM0
;   pio run -e dongle      -t upload --upload-port /dev/ttyACM0
[platformio]
src_dir = src

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:wrist_right]
build_src_filter = +<wrist.cpp>
build_flags = ${env.build_flags} -DARM_ID=0

[env:wrist_left]
build_src_filter = +<wrist.cpp>
build_flags = ${env.build_flags} -DARM_ID=1

[env:dongle]
build_src_filter = +<dongle.cpp>
