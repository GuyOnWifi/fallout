<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soup Games — Bowling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top:    #7bd3ee;
    --sky-mid:    #4fc0e3;
    --sky-deep:   #2a95c4;
    --water:      #37a7d0;
    --cream:      #fbf3e0;
    --cream-warm: #f6e9c9;
    --cream-deep: #ecdcb1;
    --ruin-blue:  #37628a;
    --ruin-teal:  #2f8fa3;
    --vine:       #6cb85a;
    --vine-deep:  #4a9440;
    --ink:        #1c2a3a;
    --ink-soft:   #476278;
    --hot:        #ff9663;
    --gold:       #f4c95d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
               font-family: "Fredoka", "Nunito", -apple-system,
                            "SF Pro Rounded", "SF Pro Display", system-ui,
                            sans-serif;
               color: var(--ink);
               background: linear-gradient(180deg,
                           var(--sky-top) 0%,
                           var(--sky-mid) 45%,
                           var(--sky-deep) 78%,
                           var(--water) 100%); }
  canvas { display:block; }

  /* Vignette focuses eye on the lane */
  #vignette { position:absolute; inset:0; pointer-events:none; z-index:2;
              background: radial-gradient(ellipse at center,
                          rgba(0,0,0,0) 40%,
                          rgba(28,42,58,0.18) 80%,
                          rgba(28,42,58,0.42) 100%); }

  /* ── Soup Games chrome (shared treatment across pages) ── */
  .ss-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--cream); color: var(--ink);
    border: 3px solid var(--ink); border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .01em; text-decoration: none; cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 120ms cubic-bezier(.3,.7,.3,1), box-shadow 120ms;
  }
  .ss-btn:hover { transform: translateY(-2px); background: var(--cream-warm);
                  box-shadow: 0 5px 0 var(--ink); }
  .ss-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--ink); }

  #back { position:absolute; top:16px; left:16px; z-index:120; }
  #connect { position:absolute; top:16px; right:16px; z-index:120; }
  #connect::before {
    content: ""; width: 9px; height: 9px; border-radius: 50%; flex-shrink:0;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
    animation: hubpulse 1.8s ease-in-out infinite;
  }
  #connect.connected::before {
    background: var(--vine); box-shadow: 0 0 8px var(--vine);
    animation: none;
  }
  @keyframes hubpulse { 50% { opacity: 0.35; transform: scale(0.85); } }

  /* Score panel — top center */
  #score-card { position:absolute; top:14px; left:50%;
                transform:translateX(-50%); z-index:100;
                display:flex; flex-direction:column; align-items:center;
                gap:3px; padding:8px 20px 10px; border-radius:16px;
                background: var(--cream); border:3px solid var(--ink);
                box-shadow: 0 4px 0 var(--ink);
                pointer-events:none; min-width:118px; }
  #score { font-size:34px; font-weight:900; line-height:1;
           color: var(--ink); letter-spacing:-.02em;
           text-shadow: 0 2px 0 var(--cream-deep); }
  #score.pop { animation: scorePop 220ms ease-out; }
  @keyframes scorePop {
    40% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }
  #frame { font-size:10px; letter-spacing:.18em; text-transform:uppercase;
           color: var(--ink-soft); font-weight:800; }
  @media (max-width: 640px) {
    #score-card { top: 64px; }
  }

  #devhint { position:absolute; bottom:12px; right:16px; z-index:60;
             font-size:10px; letter-spacing:.04em; color:var(--ink);
             opacity:.45; font-weight:600; pointer-events:none; }
  @media (max-width: 640px) { #devhint { display:none; } }
  /* Hide dev-only chrome (training-data log + keyboard hint) unless ?dev is set. */
  html:not(.dev) #tune-log-wrap, html:not(.dev) #devhint { display:none !important; }

  /* Compact scorecard strip, bottom — two-row PvP layout */
  #scorecard { position:absolute; bottom:16px; left:50%;
               transform:translateX(-50%); z-index:4;
               display:flex; flex-direction:column; gap:4px;
               pointer-events:none;
               padding:6px 8px; border-radius:12px;
               background: rgba(251,243,224,0.75);
               border:2px solid var(--ink);
               box-shadow: 0 3px 0 var(--ink); }
  .sc-row { display:flex; gap:3px; align-items:center;
            padding:2px 4px; border-radius:8px;
            transition: background 160ms ease; }
  .sc-row.active { background: rgba(244,201,93,0.55);
                   box-shadow: inset 0 0 0 2px var(--hot); }
  .sc-row.gone { opacity: 0.55; }
  .sc-label { min-width:44px; font-size:10px; font-weight:900;
              letter-spacing:.08em; text-transform:uppercase;
              color: var(--ink);
              padding: 3px 5px; border-radius: 5px;
              text-align:center; }
  .sc-row.active .sc-label { color: var(--hot); }
  .sc-total { min-width:32px; padding: 3px 5px; border-radius:5px;
              border: 2px solid var(--ink);
              background: var(--cream-warm);
              font-size:12px; font-weight:900;
              text-align:center; color: var(--ink); }
  .frame-cell { min-width:30px;
                border: 2px solid var(--ink);
                background: var(--cream);
                padding:2px 3px; text-align:center;
                border-radius: 5px;
                font-size:9px; letter-spacing:.04em; font-weight:800;
                line-height:1.05; }
  .frame-cell.current { background: var(--gold);
                        border-color: var(--hot); }
  .frame-cell .rolls { color: var(--ink); height:11px; font-size:10px; }
  .frame-cell .total { color: var(--ink-soft); font-weight: 700;
                       font-size:9px; }

  /* Pairing hint pill — small, bottom-left, only when solo */
  #pair-hint { position:absolute; bottom:16px; left:16px; z-index:60;
               font-size:10px; letter-spacing:.06em; font-weight:700;
               padding:6px 12px; border-radius:999px;
               background: var(--cream); color: var(--ink);
               border: 2px solid var(--ink);
               box-shadow: 0 2px 0 var(--ink);
               pointer-events:none; opacity:0.85; }
  #pair-hint.hidden { display:none; }
  @media (max-width: 640px) {
    /* keep it off the scorecard strip on phones — tuck under the score card */
    #pair-hint { bottom:auto; top:132px; left:50%; transform:translateX(-50%);
                 white-space:nowrap; }
    /* shrink the 10-frame strip so it fits a 375px screen */
    #scorecard { transform: translateX(-50%) scale(.76);
                 transform-origin: 50% 100%; }
  }

  /* "Bowl again" button — appears on game over so nobody is stuck */
  #again { position:absolute; bottom:130px; left:50%;
           transform:translateX(-50%); z-index:110;
           display:none; font-size:15px; padding:13px 28px; }
  #again.show { display:inline-flex; animation: againPop 320ms cubic-bezier(.2,1.5,.3,1); }
  @keyframes againPop {
    0% { transform: translateX(-50%) scale(.4); opacity:0; }
    100% { transform: translateX(-50%) scale(1); opacity:1; }
  }

  /* Prompt, bottom center above scorecard. Bottom offset must clear
     the two-row PvP scorecard strip (~110px) — otherwise the pill
     lands on the P B row and clips both the pill and the row. */
  #prompt { position:absolute; bottom:150px; left:50%;
            transform:translateX(-50%); z-index:110;
            padding:10px 20px; background: var(--cream);
            border: 3px solid var(--ink); border-radius: 999px;
            font-weight:700; letter-spacing:.01em;
            font-size:13px; color: var(--ink);
            box-shadow: 0 3px 0 var(--ink);
            white-space:nowrap; }

  /* Peak-charge HUD — small, above prompt. Hidden until a swing arms it. */
  #charge-wrap { position:absolute; bottom:200px; left:50%;
                 transform:translateX(-50%); z-index:4;
                 width:200px; text-align:center; pointer-events:none;
                 font-size:10px; letter-spacing:.22em; font-weight:800;
                 text-transform:uppercase;
                 opacity:0; transition: opacity 240ms ease; }
  #charge-wrap.on { opacity:1; }
  #charge-label { color: var(--ink); margin-bottom:5px;
                  text-shadow: 0 2px 0 rgba(255,255,255,.5); }
  #charge-bar-container { height:12px; width:100%;
                          background: var(--cream);
                          border: 3px solid var(--ink); border-radius: 999px;
                          overflow:hidden;
                          box-shadow: 0 3px 0 var(--ink); }
  #charge-bar { height:100%; width:0%;
                background: linear-gradient(90deg, var(--gold), var(--hot));
                transition: width 60ms linear, opacity 220ms; }
  #charge-wrap.armed #charge-label { color: var(--hot); }
  #charge-wrap.armed #charge-bar-container {
    animation: chargePulse 0.6s ease-in-out infinite;
  }
  @keyframes chargePulse {
    50% { box-shadow: 0 3px 0 var(--ink), 0 0 16px var(--hot); }
  }

  /* Gesture tutorial diagram — sits just above the prompt, wordless */
  #tutorial { position:absolute; left:50%; bottom:150px;
              transform:translateX(-50%); z-index:3;
              pointer-events:none; opacity:0;
              transition: opacity 400ms ease;
              text-align:center; }
  #tutorial.show { opacity: 1; }
  #tutorial svg { display:block; margin: 0 auto;
                  filter: drop-shadow(0 3px 0 rgba(28,42,58,.25)); }
  #tut-arm { transform-origin: 50px 30px;
             animation: armSwing 2s ease-in-out infinite; }
  @keyframes armSwing {
    0%   { transform: rotate(-70deg); }
    45%  { transform: rotate(-70deg); }
    75%  { transform: rotate(60deg); }
    100% { transform: rotate(60deg); }
  }
  #tut-ball {
    animation: ballTrail 2s ease-in-out infinite;
  }
  @keyframes ballTrail {
    0%,45%  { opacity:0; transform: translate(0,0); }
    75%     { opacity:1; transform: translate(30px, -8px); }
    100%    { opacity:0; transform: translate(80px, 20px); }
  }

  /* Banner — strike/spare celebrations */
  #banner { position:absolute; top:44%; left:50%; z-index:6;
            transform:translate(-50%,-50%) scale(1);
            font-size:clamp(44px, 12vw, 96px); font-weight:900; letter-spacing:-.03em;
            text-transform:uppercase; opacity:0;
            color: var(--cream);
            text-shadow: 0 6px 0 var(--ruin-blue),
                         0 8px 32px rgba(28,42,58,.35);
            transition: opacity 100ms, transform 200ms;
            pointer-events:none; }
  #banner.pop { opacity:1; transform:translate(-50%,-50%) scale(1.14); }

  /* Confetti layer */
  #confetti-layer { position:absolute; inset:0; z-index:5;
                    pointer-events:none; overflow:hidden; }
  .confetti { position:absolute; top:-20px; width:12px; height:16px;
              border:2px solid var(--ink); border-radius:2px;
              animation: confettiFall linear forwards; }
  @keyframes confettiFall {
    0%   { transform: translate(0,0) rotate(0deg); opacity:1; }
    100% { transform: translate(var(--dx), 120vh) rotate(var(--rot));
           opacity:0.7; }
  }

  /* Gutter puff cloud */
  #gutter-puff { position:absolute; left:50%; top:36%; z-index:5;
                 transform:translate(-50%,-50%) scale(0);
                 pointer-events:none; opacity:0; }
  #gutter-puff svg { display:block;
                     filter: drop-shadow(0 3px 0 rgba(28,42,58,.3)); }
  #gutter-puff.show { animation: puffPop 1.6s ease-out forwards; }
  @keyframes puffPop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.3); }
    30%  { opacity:1; transform:translate(-50%,-70%) scale(1.1); }
    100% { opacity:0; transform:translate(-50%,-110%) scale(1.3); }
  }

  /* ── Tune log (top-left) ────────────────────────── */
  #tune-log-wrap {
    position:absolute; top:16px; left:120px; z-index:131;
    display:flex; flex-direction:column; gap:6px; max-width:44vw;
  }
  #tune-log-controls { display:flex; gap:6px; align-items:center; }
  #tune-log-controls button {
    padding:6px 12px; border-radius:8px;
    background:var(--cream); color:var(--ink);
    border:2px solid var(--ink); box-shadow:0 2px 0 var(--ink);
    font:inherit; font-size:11px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; cursor:pointer;
  }
  #tune-log-controls button:hover { background:var(--cream-warm); }
  #tune-log-controls #tune-log-count {
    font-family:ui-monospace,Menlo,monospace; font-size:11px;
    color:var(--cream); background:rgba(28,42,58,.65);
    padding:4px 10px; border-radius:999px;
    text-shadow:0 1px 0 rgba(0,0,0,.4);
  }
  #tune-log {
    width:100%; height:220px; padding:10px 12px;
    background:rgba(28,42,58,.85); color:#f7f3e6;
    border:none; border-radius:8px;
    font-family:ui-monospace,Menlo,monospace;
    font-size:11px; line-height:1.5; resize:none;
  }
  @media (max-width: 640px) { #tune-log-wrap { display:none; } }
</style>
</head>
<body>
<script>
  if (/[?&#]dev\b/.test(location.search + location.hash)) {
    document.documentElement.classList.add('dev');
  }
</script>
<a id="back" class="ss-btn" href="index.html">← menu</a>
<button id="connect" class="ss-btn">connect hub</button>

<div id="score-card">
  <div id="score">0</div>
  <div id="frame">FRAME 1 · BALL 1</div>
</div>

<div id="charge-wrap">
  <div id="charge-label">swing power</div>
  <div id="charge-bar-container"><div id="charge-bar"></div></div>
</div>

<div id="prompt">swing forward and let go</div>
<button id="again" class="ss-btn">bowl again</button>
<div id="scorecard"></div>
<div id="pair-hint" class="hidden">pair on the menu for versus</div>
<div id="devhint">keys · space bowl · r reset</div>
<div id="tune-log-wrap">
  <div id="tune-log-controls">
    <button id="tune-log-copy" type="button">copy</button>
    <button id="tune-log-clear" type="button">clear</button>
    <span id="tune-log-count">0 rows</span>
  </div>
  <textarea id="tune-log" readonly placeholder="each release logs one row here. throw a bunch, click copy, paste back."></textarea>
</div>

<div id="tutorial">
  <svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
    <!-- shoulder pivot -->
    <circle cx="60" cy="34" r="12" fill="#f7b8c4" stroke="#1c2a3a" stroke-width="3"/>
    <!-- arm rotates around shoulder -->
    <g id="tut-arm">
      <!-- bicep + forearm as a stubby limb, hand at the tip -->
      <path d="M 60 26
               C 52 30, 50 40, 54 62
               C 55 80, 58 92, 62 96
               C 66 96, 69 90, 68 74
               C 68 60, 66 44, 60 26 Z"
            fill="#ffc9a4" stroke="#1c2a3a" stroke-width="3" stroke-linejoin="round"/>
      <!-- wristband -->
      <rect x="54" y="92" width="14" height="7" rx="2"
            fill="#4a9440" stroke="#1c2a3a" stroke-width="2.5"/>
      <!-- fist -->
      <path d="M 52 100
               C 50 108, 54 116, 62 116
               C 70 116, 74 108, 72 100 Z"
            fill="#fbf3e0" stroke="#1c2a3a" stroke-width="3" stroke-linejoin="round"/>
      <!-- knuckle marks -->
      <circle cx="58" cy="108" r="1.6" fill="#1c2a3a"/>
      <circle cx="64" cy="109" r="1.6" fill="#1c2a3a"/>
      <circle cx="68" cy="107" r="1.6" fill="#1c2a3a"/>
    </g>
    <!-- ball rolling out along the ground -->
    <g id="tut-ball">
      <circle cx="110" cy="132" r="10" fill="#ff9663"
              stroke="#1c2a3a" stroke-width="3"/>
      <ellipse cx="108" cy="128" rx="3" ry="2" fill="rgba(255,255,255,.5)"/>
    </g>
    <!-- faint arc path for the swing -->
    <path d="M 60 46 Q 30 90, 60 130 Q 96 138, 140 132"
          fill="none" stroke="#1c2a3a" stroke-width="2"
          stroke-dasharray="4 6" opacity=".35"/>
  </svg>
</div>

<div id="banner"></div>
<div id="confetti-layer"></div>
<div id="gutter-puff">
  <svg width="72" height="48" viewBox="0 0 72 48" fill="none" aria-hidden="true">
    <path d="M12 34 C6 34 4 28 8 24 C6 17 13 12 19 15 C21 8 32 6 36 12 C41 7 52 9 53 17 C60 16 65 22 62 28 C66 33 61 39 54 38 C48 44 20 44 14 40 C12 38 11 36 12 34 Z"
          fill="#fbf3e0" stroke="#1c2a3a" stroke-width="3" stroke-linejoin="round" opacity=".95"/>
    <path d="M22 26 C26 23 32 23 36 26 M42 24 C45 22 49 22 52 24"
          stroke="#1c2a3a" stroke-width="2.4" stroke-linecap="round" opacity=".45"/>
  </svg>
</div>
<div id="vignette"></div>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { openSerial, autoOpenSerial } from './serial.js';
import { ArmDispatcher } from './dispatch.js';
import { pairing } from './pairing.js';
import { sfx } from './sfx.js';

// ═══════════════════════ Three.js scene ═══════════════════════
const SKY_MID = 0x4fc0e3;
const CREAM   = 0xfbf3e0;
const CREAM_DEEP = 0xecdcb1;
const RUIN_BLUE = 0x37628a;
const INK     = 0x1c2a3a;
const HOT     = 0xff9663;
const GOLD    = 0xf4c95d;

const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY_MID);
scene.fog = new THREE.Fog(SKY_MID, 16, 45);

// Camera: pulled closer so ball at z=0 reads clearly, pins ~z=-8 fill screen.
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 2.2, 4.5);
camera.lookAt(0, 1.0, -6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

scene.add(new THREE.AmbientLight(0xbfe4f3, 0.75));
const key = new THREE.DirectionalLight(0xfff2d0, 1.15);
key.position.set(4, 8, 5);
scene.add(key);
const fill = new THREE.DirectionalLight(0x9ecbe5, 0.5);
fill.position.set(-4, 5, -6);
scene.add(fill);

// ── Lane (cream planks). Shortened + pins closer for better framing. ──
const LANE_LENGTH = 14;
const LANE_CENTER_Z = -6;
const PIN_Z = -9;   // pins clearly visible from camera at z=4.5
const BALL_HOME_Z = 0;

const lane = new THREE.Mesh(
  new THREE.BoxGeometry(2.5, 0.05, LANE_LENGTH),
  new THREE.MeshStandardMaterial({ color: CREAM, roughness: 0.85 })
);
lane.position.set(0, 0, LANE_CENTER_Z);
scene.add(lane);

// Wood-grain lines
const grainMat = new THREE.MeshStandardMaterial({
  color: CREAM_DEEP, roughness: 0.95, transparent: true, opacity: 0.55 });
for (let i = -1.0; i <= 1.0; i += 0.5) {
  const g = new THREE.Mesh(
    new THREE.BoxGeometry(0.02, 0.052, LANE_LENGTH), grainMat);
  g.position.set(i, 0.001, LANE_CENTER_Z);
  scene.add(g);
}

// Aim arrows on the lane (charm)
const arrowMat = new THREE.MeshStandardMaterial({
  color: HOT, roughness: 0.6, transparent: true, opacity: 0.7 });
for (let i = 0; i < 4; i++) {
  const arrow = new THREE.Mesh(
    new THREE.ConeGeometry(0.10, 0.22, 4), arrowMat);
  arrow.rotation.x = -Math.PI / 2;
  arrow.rotation.z = Math.PI / 4;
  arrow.position.set((i - 1.5) * 0.35, 0.03, -3);
  scene.add(arrow);
}

// Gutter rails (ruin-blue)
const gutterMat = new THREE.MeshStandardMaterial({
  color: RUIN_BLUE, roughness: 0.9 });
const gL = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.06, LANE_LENGTH), gutterMat);
gL.position.set(-1.5, 0.005, LANE_CENTER_Z); scene.add(gL);
const gR = gL.clone(); gR.position.x = 1.5; scene.add(gR);

// Foul line
const foulMat = new THREE.MeshStandardMaterial({
  color: HOT, roughness: 0.5 });
const foul = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.055, 0.06), foulMat);
foul.position.set(0, 0.03, 0.5);
scene.add(foul);

// Backstop (soft cream wall behind pins)
const backstop = new THREE.Mesh(
  new THREE.BoxGeometry(6, 3, 0.2),
  new THREE.MeshStandardMaterial({ color: CREAM_DEEP, roughness: 0.9 })
);
backstop.position.set(0, 1.5, PIN_Z - 1.8);
scene.add(backstop);

// ── Floating clouds ──
const clouds = [];
function makeCloud(x, y, z, r) {
  const cloud = new THREE.Group();
  const cMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const s1 = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), cMat);
  const s2 = new THREE.Mesh(new THREE.SphereGeometry(r*0.75, 12, 10), cMat);
  s2.position.set(r*0.85, -r*0.1, 0);
  const s3 = new THREE.Mesh(new THREE.SphereGeometry(r*0.7, 12, 10), cMat);
  s3.position.set(-r*0.8, -r*0.05, 0);
  const s4 = new THREE.Mesh(new THREE.SphereGeometry(r*0.55, 12, 10), cMat);
  s4.position.set(r*0.2, r*0.4, 0);
  cloud.add(s1); cloud.add(s2); cloud.add(s3); cloud.add(s4);
  cloud.position.set(x, y, z);
  cloud.userData.drift = 0.3 + Math.random() * 0.4;
  scene.add(cloud);
  clouds.push(cloud);
}
makeCloud(-8,  10, -18, 1.1);
makeCloud( 9,   9, -22, 0.9);
makeCloud(-4,  11, -28, 1.2);
makeCloud( 5,  12, -12, 0.7);
makeCloud(-11, 12, -6,  0.85);
makeCloud( 12,  9, -30, 1.0);

// ── Pins (10-pin triangle). Larger scale for prominence. ──
const PIN_SCALE = 0.0075;    // ~3x boost vs original 0.0025
const PIN_SPACING = 0.42;
const pinPlaceholderMat = new THREE.MeshStandardMaterial({
  color: 0xf4f4f4, roughness: 0.5 });
const pins = [];
const pinRows = [
  [-0.6, -0.2, 0.2, 0.6],
  [-0.4, 0, 0.4],
  [-0.2, 0.2],
  [0],
];
pinRows.forEach((row, rowI) => {
  row.forEach(x => {
    const pin = new THREE.Group();
    const cyl = new THREE.Mesh(
      new THREE.CylinderGeometry(0.10, 0.13, 0.55, 12), pinPlaceholderMat);
    cyl.position.y = 0.05;
    pin.add(cyl);
    pin.position.set(x, 0.2, PIN_Z + rowI * PIN_SPACING);
    pin.userData.standing = true;
    pin.userData.vel = new THREE.Vector3();
    pin.userData.angVel = 0;
    pin.userData.fallAxis = new THREE.Vector3(1, 0, 0);
    pin.userData.home = pin.position.clone();
    pin.userData.phase = Math.random() * Math.PI * 2;
    pin.userData.isSoup = false;
    pin.userData.squashT = 0;    // squash/stretch progress
    pin.userData.hopT = 0;       // celebration hop
    scene.add(pin);
    pins.push(pin);
  });
});

// ── Ball ── positioned in FRONT of camera
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 24, 18),

);
ball.position.set(0, 0.25, BALL_HOME_Z);
scene.add(ball);

// ── Sparkle particles around the ball while charging ──
const sparkleGroup = new THREE.Group();
scene.add(sparkleGroup);
const sparkles = [];
const sparkleMat = new THREE.MeshBasicMaterial({
  color: GOLD, transparent: true, opacity: 0.9 });
for (let i = 0; i < 22; i++) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.028, 6, 6), sparkleMat.clone());
  s.userData = {
    active: false,
    life: 0,
    maxLife: 0.6 + Math.random() * 0.4,
    vy: 0.4 + Math.random() * 0.5,
    ox: (Math.random() - 0.5) * 0.6,
    oz: (Math.random() - 0.5) * 0.6,
    baseX: 0,
  };
  s.visible = false;
  sparkleGroup.add(s);
  sparkles.push(s);
}
let sparkleSpawnClock = 0;
function spawnSparkle(intensity) {
  // find inactive
  const s = sparkles.find(sp => !sp.userData.active);
  if (!s) return;
  s.userData.active = true;
  s.userData.life = 0;
  s.userData.maxLife = 0.5 + Math.random() * 0.5;
  s.userData.vy = (0.5 + Math.random() * 0.7) * (0.6 + intensity * 0.8);
  const spread = 0.25 + intensity * 0.25;
  s.userData.ox = (Math.random() - 0.5) * spread * 2;
  s.userData.oz = (Math.random() - 0.5) * spread * 2;
  s.position.set(ball.position.x + s.userData.ox,
                 ball.position.y - 0.05,
                 ball.position.z + s.userData.oz);
  s.material.opacity = 0.95;
  s.material.color.setHex(Math.random() < 0.5 ? GOLD : HOT);
  s.visible = true;
}

// ── Bowler soup — big, at near end, off to left, visible clearly. ──
let bowlerSoup = null;
let bowlerBaseY = 0;

// ── Async load mascot and replace pin visuals. ──
let mascotTemplate = null;
async function loadMascot() {
  const loader = new GLTFLoader();
  try {
    const gltf = await loader.loadAsync('assets/mascot.glb');
    mascotTemplate = gltf.scene;

    pins.forEach((pin) => {
      while (pin.children.length) pin.remove(pin.children[0]);

      const soup = mascotTemplate.clone(true);
      soup.traverse(o => { if (o.isMesh) o.material = o.material.clone(); });

      const bodyNode = soup.getObjectByName('body');
      const pawsNode = soup.getObjectByName('paws');
      if (bodyNode) {
        const c = bodyNode.material.color.clone();
        const hsl = {}; c.getHSL(hsl);
        hsl.h = (hsl.h + (Math.random() - 0.5) * (10/360)) % 1;
        if (hsl.h < 0) hsl.h += 1;
        bodyNode.material.color.setHSL(hsl.h, hsl.s, hsl.l);
        pin.userData.bodyMat = bodyNode.material;
        pin.userData.origBodyColor = bodyNode.material.color.clone();
      }
      if (pawsNode && bodyNode) {
        pawsNode.material.color.copy(bodyNode.material.color);
      }

      soup.rotation.x = -Math.PI / 2;
      soup.scale.setScalar(PIN_SCALE);
      soup.position.y = -0.2 + 0.025;
      pin.add(soup);
      pin.userData.soup = soup;
      pin.userData.isSoup = true;
    });

    // Bigger bowler soup — off to left side, near camera, clearly visible
    bowlerSoup = mascotTemplate.clone(true);
    bowlerSoup.traverse(o => { if (o.isMesh) o.material = o.material.clone(); });
    const bBody = bowlerSoup.getObjectByName('body');
    if (bBody) bBody.material.color.setHex(0xf6e9c9);
    // Per soup/HANDOFF.md + DEVLOG §11: no y-flip after the x-flip — the old
    // extra rotation flipped him out of view entirely.
    bowlerSoup.rotation.x = -Math.PI / 2;
    bowlerSoup.scale.setScalar(0.010);
    bowlerSoup.position.set(-1.55, 0.02, 1.7);
    bowlerBaseY = bowlerSoup.position.y;
    scene.add(bowlerSoup);
  } catch (err) {
    console.error('[bowling] mascot load failed', err);
  }
}
loadMascot();

let ballState = 'ready';  // 'ready' | 'rolling' | 'settling'
let ballVel = new THREE.Vector3();
let ballInGutter = false;
const scoreEl = document.getElementById('score');
const promptEl = document.getElementById('prompt');
const statusEl = document.getElementById('connect'); // hub pill doubles as status
const bannerEl = document.getElementById('banner');
const frameEl = document.getElementById('frame');
const scorecardEl = document.getElementById('scorecard');
const tutorialEl = document.getElementById('tutorial');
const confettiLayer = document.getElementById('confetti-layer');
const gutterPuffEl = document.getElementById('gutter-puff');
const againEl = document.getElementById('again');

// ── Frame / scoring state (PvP: one game per player) ──
function makeGame() {
  const g = { frames: [], currentFrame: 0, rollInFrame: 0,
              pinsThisFrame: 0, gameOver: false };
  for (let i = 0; i < 10; i++) g.frames.push({ rolls: [], score: null });
  return g;
}
const games = { A: makeGame(), B: makeGame() };
let activePlayer = 'A';
let pvpMode = false;   // true when both slots are paired
function active() { return games[activePlayer]; }
function otherPlayer() { return activePlayer === 'A' ? 'B' : 'A'; }
function bothDone() { return games.A.gameOver && games.B.gameOver; }
// Back-compat alias so existing code referring to `game` still works during
// this frame; we swap it out per call via active().
const gameProxy = new Proxy({}, {
  get(_, k) { return active()[k]; },
  set(_, k, v) { active()[k] = v; return true; },
});
const game = gameProxy;

function popBanner(text, color = '#f4c95d') {
  bannerEl.textContent = text;
  bannerEl.style.color = color;
  bannerEl.classList.remove('pop'); void bannerEl.offsetWidth;
  bannerEl.classList.add('pop');
  setTimeout(() => bannerEl.classList.remove('pop'), 1600);
}

function spawnConfetti() {
  const colors = ['#ff9663', '#f4c95d', '#6cb85a', '#37628a', '#fbf3e0'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (10 + Math.random() * 80) + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.setProperty('--dx', ((Math.random() - 0.5) * 200) + 'px');
    c.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    confettiLayer.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function popGutterPuff() {
  gutterPuffEl.classList.remove('show');
  void gutterPuffEl.offsetWidth;
  gutterPuffEl.classList.add('show');
}

function rollLabel(g, frameIdx, rollIdx, n) {
  const isTenth = frameIdx === 9;
  const isFirst = rollIdx === 0;
  if (n === 10 && (isFirst || isTenth)) return 'X';
  if (!isFirst) {
    const prev = g.frames[frameIdx].rolls[rollIdx - 1] || 0;
    if (prev + n === 10 && prev !== 10) return '/';
  }
  return String(n);
}

function computeCumulativeScores(g) {
  const flat = [];
  const frameStarts = [];
  for (let f = 0; f < 10; f++) {
    frameStarts.push(flat.length);
    for (const r of g.frames[f].rolls) flat.push(r);
  }
  let total = 0;
  for (let f = 0; f < 10; f++) {
    const s = frameStarts[f];
    const rolls = g.frames[f].rolls;
    if (rolls.length === 0) { g.frames[f].score = null; continue; }
    const r0 = flat[s] ?? 0;
    const r1 = flat[s + 1];
    if (f < 9) {
      if (r0 === 10) {
        if (r1 == null || flat[s + 2] == null) { g.frames[f].score = null; continue; }
        total += 10 + r1 + flat[s + 2];
      } else if ((r0 + (r1 ?? 0)) === 10 && rolls.length >= 2) {
        if (flat[s + 2] == null) { g.frames[f].score = null; continue; }
        total += 10 + flat[s + 2];
      } else if (rolls.length >= 2) {
        total += r0 + r1;
      } else { g.frames[f].score = null; continue; }
      g.frames[f].score = total;
    } else {
      let sum = 0; for (const r of rolls) sum += r;
      total += sum;
      const done = rolls.length === 3 ||
                   (rolls.length === 2 && r0 !== 10 && (r0 + r1) < 10);
      g.frames[f].score = done ? total : null;
    }
  }
  return total;
}

function renderPlayerRow(letter) {
  const g = games[letter];
  const running = computeCumulativeScores(g);
  const row = document.createElement('div');
  row.className = 'sc-row'
    + (pvpMode && letter === activePlayer && !bothDone() ? ' active' : '')
    + (pvpMode && g.gameOver && !bothDone() ? ' gone' : '');
  const label = document.createElement('div');
  label.className = 'sc-label';
  label.textContent = pvpMode ? `P ${letter}` : 'YOU';
  row.appendChild(label);
  for (let i = 0; i < 10; i++) {
    const cell = document.createElement('div');
    const isCurrent = pvpMode
      ? (letter === activePlayer && i === g.currentFrame && !g.gameOver)
      : (i === g.currentFrame && !g.gameOver);
    cell.className = 'frame-cell' + (isCurrent ? ' current' : '');
    const rolls = g.frames[i].rolls;
    const parts = rolls.map((n, ri) => rollLabel(g, i, ri, n));
    const rollsRow = document.createElement('div');
    rollsRow.className = 'rolls';
    rollsRow.textContent = parts.join(' ') || '·';
    const totalRow = document.createElement('div');
    totalRow.className = 'total';
    totalRow.textContent = g.frames[i].score == null ? '' : String(g.frames[i].score);
    cell.appendChild(rollsRow); cell.appendChild(totalRow);
    row.appendChild(cell);
  }
  const total = document.createElement('div');
  total.className = 'sc-total';
  total.textContent = running;
  row.appendChild(total);
  return { row, running };
}

function renderScorecard() {
  scorecardEl.innerHTML = '';
  const a = renderPlayerRow('A');
  scorecardEl.appendChild(a.row);
  if (pvpMode) {
    const b = renderPlayerRow('B');
    scorecardEl.appendChild(b.row);
  }
  const cur = active();
  const running = computeCumulativeScores(cur);
  const newScore = String(running);
  if (scoreEl.textContent !== newScore) {
    scoreEl.textContent = newScore;
    scoreEl.classList.remove('pop'); void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
  }
  if (bothDone() && pvpMode) {
    const ra = computeCumulativeScores(games.A);
    const rb = computeCumulativeScores(games.B);
    frameEl.textContent = ra === rb ? `tie · ${ra}`
                        : ra > rb ? `player a wins · ${ra}-${rb}`
                                  : `player b wins · ${rb}-${ra}`;
  } else if (cur.gameOver && !pvpMode) {
    frameEl.textContent = `game over · ${running}`;
  } else {
    const who = pvpMode ? `PLAYER ${activePlayer} · ` : '';
    frameEl.textContent = `${who}FRAME ${cur.currentFrame + 1} · BALL ${cur.rollInFrame + 1}`;
  }
}
renderScorecard();

// Tutorial visibility state
let lastSwingActivityMs = performance.now();
function updateTutorial() {
  const nowMs = performance.now();
  const idle = nowMs - lastSwingActivityMs;
  const shouldShow = ballState === 'ready'
                   && !game.gameOver
                   && idle > 2000
                   && chargeDisplay < 0.2;
  tutorialEl.classList.toggle('show', shouldShow);
}

function launchBall(speed, angle) {
  if (ballState !== 'ready' || game.gameOver) return;
  const MAX_SPEED = 14;
  ballVel.set(angle * 3, 0, -MAX_SPEED * Math.max(0.3, speed));
  ballState = 'rolling';
  ballInGutter = false;
  promptEl.textContent = `rolling at ${(speed * 100).toFixed(0)}% power`;
  tutorialEl.classList.remove('show');
  lastSwingActivityMs = performance.now();

  if (bowlerSoup) {
    bowlerAnim.releasing = true;
    bowlerAnim.releaseT = 0;
  }
  sfx.ballRoll();
}

function standUpAllPins() {
  pins.forEach(p => {
    p.userData.standing = true;
    p.userData.vel.set(0, 0, 0);
    p.userData.angVel = 0;
    p.userData.squashT = 0;
    p.userData.hopT = 0;
    p.position.copy(p.userData.home);
    p.rotation.set(0, 0, 0);
    p.scale.set(1, 1, 1);
    if (p.userData.bodyMat && p.userData.origBodyColor) {
      p.userData.bodyMat.color.copy(p.userData.origBodyColor);
    }
  });
}

// Bowler slump animation on gutter
const bowlerSlump = { active: false, t: 0 };

function resetBall() {
  ball.position.set(0, 0.25, BALL_HOME_Z);
  ballVel.set(0, 0, 0);

  const g = active();
  const knocked = g.pinsThisFrame;
  const frame = g.frames[g.currentFrame];
  frame.rolls.push(knocked);
  g.pinsThisFrame = 0;

  const isTenth = g.currentFrame === 9;
  const total = frame.rolls.reduce((a, b) => a + b, 0);

  if (knocked === 10 && g.rollInFrame === 0) {
    popBanner('strike', '#ff9663');
    spawnConfetti();
    strikeCelebration();
    sfx.strike();
  }
  else if (!isTenth && g.rollInFrame === 1 && total === 10) {
    popBanner('spare', '#f4c95d');
    spawnConfetti();
  }
  else if (knocked === 0) {
    popBanner('gutter', '#37628a');
    popGutterPuff();
    sfx.gutter();
    bowlerSlump.active = true;
    bowlerSlump.t = 0;
  }

  let advance = false;
  if (isTenth) {
    const rolls = frame.rolls;
    if (rolls.length === 1) {
      if (rolls[0] === 10) { standUpAllPins(); g.rollInFrame = 1; }
      else g.rollInFrame = 1;
    } else if (rolls.length === 2) {
      const bonus = rolls[0] === 10 || (rolls[0] + rolls[1]) === 10;
      if (bonus) {
        if (rolls[1] === 10 || (rolls[0] + rolls[1]) === 10) standUpAllPins();
        g.rollInFrame = 2;
      } else { advance = true; }
    } else advance = true;
  } else {
    if (g.rollInFrame === 0 && knocked < 10) {
      g.rollInFrame = 1;
    } else {
      advance = true;
    }
  }
  if (advance) {
    g.currentFrame++;
    g.rollInFrame = 0;
    if (g.currentFrame >= 10) {
      g.gameOver = true;
    } else {
      standUpAllPins();
    }
  }

  ballState = 'ready';
  ballInGutter = false;

  // PvP turn switch: on frame advance, hand off to the other player if they
  // still have frames left. Applies whether or not this was the 10th frame.
  let turnSwitched = false;
  if (advance && pvpMode) {
    const other = otherPlayer();
    if (!games[other].gameOver) {
      activePlayer = other;
      standUpAllPins();
      turnSwitched = true;
    }
  }

  if (bothDone() && pvpMode) {
    endPvpGame();
  } else if (active().gameOver && !pvpMode) {
    const total = computeCumulativeScores(active());
    promptEl.textContent = "that's the game!";
    // Hold a beat so a last-ball strike/spare banner gets its moment first.
    setTimeout(() => {
      if (active().gameOver) {
        popBanner(`${total} points`, '#6cb85a');
        spawnConfetti();
        againEl.classList.add('show');
      }
    }, 1200);
  } else if (turnSwitched) {
    announceTurn();
  } else {
    promptEl.textContent = 'swing forward and let go';
  }
  lastSwingActivityMs = performance.now();
  renderScorecard();
}

function announceTurn() {
  const cur = active();
  if (pvpMode) {
    popBanner(`player ${activePlayer.toLowerCase()}`, '#37628a');
    promptEl.textContent =
      `player ${activePlayer.toLowerCase()} · frame ${cur.currentFrame + 1}`;
  } else {
    promptEl.textContent = 'swing forward and let go';
  }
}

function endPvpGame() {
  const ra = computeCumulativeScores(games.A);
  const rb = computeCumulativeScores(games.B);
  const msg = ra === rb ? 'tie!' : (ra > rb ? 'player a wins' : 'player b wins');
  popBanner(msg, '#6cb85a');
  spawnConfetti();
  promptEl.textContent = `game over — ${ra} to ${rb}`;
  againEl.classList.add('show');
}

// Strike celebration: all fallen pins do a happy hop after settle
function strikeCelebration() {
  setTimeout(() => {
    pins.forEach(p => {
      if (!p.userData.standing) {
        p.userData.hopT = 0.01; // trigger hop
      }
    });
  }, 900);
}

const PIN_FALL_Y = 0.05;
const PIN_STAND_Y = 0.2;

function knockPin(pin, impactVel, hitStrength) {
  if (!pin.userData.standing) return;
  pin.userData.standing = false;
  sfx.pinHit(hitStrength);

  pin.userData.vel.copy(impactVel).multiplyScalar(0.35 * hitStrength);
  pin.userData.vel.x += (Math.random() - 0.5) * 1.2;
  pin.userData.vel.y = 0;

  const horiz = new THREE.Vector3(impactVel.x, 0, impactVel.z);
  if (horiz.lengthSq() < 1e-4) horiz.set(0, 0, -1);
  horiz.normalize();
  pin.userData.fallAxis.set(-horiz.z, 0, horiz.x);
  pin.userData.angVel = 2.0 + Math.random() * 1.5;
  pin.userData.fallProgress = 0;
  pin.userData.squashT = 0.001; // begin squash

  if (pin.userData.bodyMat) {
    pin.userData.bodyMat.color.setHex(0xff5a3c);
    pin.userData.flashUntil = performance.now() + 100;
  }

  game.pinsThisFrame += 1;
}

// Bowler animation state
const bowlerAnim = {
  releasing: false,
  releaseT: 0,
};

function updatePhysics(dt) {
  const t = performance.now() * 0.001;

  // Clouds drift
  for (const c of clouds) {
    c.position.x += c.userData.drift * dt * 0.4;
    if (c.position.x > 18) c.position.x = -18;
  }

  // Sparkles: spawn while armed on the active player's arm
  const chargeArmId = pvpMode ? (pairing.armForPlayer(activePlayer) ?? 0) : 0;
  const armed = swing[chargeArmId].phase === 'ACTIVE';
  if (armed && ballState === 'ready') {
    sparkleSpawnClock += dt;
    const intensity = Math.min(1, chargeDisplay);
    const interval = 0.05 - intensity * 0.03;
    while (sparkleSpawnClock > interval) {
      spawnSparkle(intensity);
      sparkleSpawnClock -= interval;
    }
  } else {
    sparkleSpawnClock = 0;
  }
  // Advance sparkles
  for (const s of sparkles) {
    if (!s.userData.active) continue;
    s.userData.life += dt;
    if (s.userData.life >= s.userData.maxLife) {
      s.userData.active = false; s.visible = false; continue;
    }
    const p = s.userData.life / s.userData.maxLife;
    s.position.y += s.userData.vy * dt;
    s.material.opacity = 0.95 * (1 - p);
    const sc = 1 - p * 0.6;
    s.scale.setScalar(sc);
  }

  // Ball rolls
  if (ballState === 'rolling') {
    ball.position.addScaledVector(ballVel, dt);
    ball.rotation.x -= ballVel.length() * dt * 3;

    // Gutter detection
    if (Math.abs(ball.position.x) > 1.25 && !ballInGutter) {
      ballInGutter = true;
      ballVel.x *= 0.2;
      ballVel.z *= 0.85;
    }

    if (!ballInGutter) {
      for (const pin of pins) {
        if (!pin.userData.standing) continue;
        const dx = ball.position.x - pin.position.x;
        const dz = ball.position.z - pin.position.z;
        const d2 = dx * dx + dz * dz;
        if (d2 < 0.32 * 0.32) {
          const d = Math.sqrt(d2) || 1e-4;
          const normal = new THREE.Vector3(dx / d, 0, dz / d);
          const impact = ballVel.clone().multiplyScalar(0.15)
                            .add(normal.multiplyScalar(-2.0));
          const strength = Math.min(1.4, ballVel.length() / 10 + 0.5);
          knockPin(pin, impact, strength);
          ballVel.x += -normal.x * 0.4;
          ballVel.z *= 0.94;
        }
      }
    }

    if (Math.abs(ball.position.x) > 1.35) {
      ball.position.x = Math.sign(ball.position.x) * 1.35;
    }
    if (ball.position.z < PIN_Z - 3 && ballState === 'rolling') {
      ballState = 'settling';
      setTimeout(() => resetBall(), 1400);
    }
  }

  // Pin update
  const nowMs = performance.now();
  for (const pin of pins) {
    if (pin.userData.standing) {
      // Idle bob
      pin.position.y = pin.userData.home.y +
        Math.sin((t + pin.userData.phase) * 2) * 0.005;

      // Happy hop (post-strike)
      if (pin.userData.hopT > 0) {
        pin.userData.hopT += dt;
        const hp = pin.userData.hopT;
        if (hp > 0.9) { pin.userData.hopT = 0; }
        else {
          const bounce = Math.sin(hp * Math.PI * 3.5) *
                         Math.max(0, 1 - hp / 0.9) * 0.18;
          pin.position.y += Math.abs(bounce);
        }
      }
    } else {
      // Squash/stretch on hit (first ~120ms)
      if (pin.userData.squashT > 0 && pin.userData.squashT < 0.15) {
        pin.userData.squashT += dt;
        const q = pin.userData.squashT / 0.15;
        const squash = Math.sin(q * Math.PI);
        pin.scale.set(1 + squash * 0.35, 1 - squash * 0.3, 1 + squash * 0.35);
        if (pin.userData.squashT >= 0.15) {
          pin.scale.set(1, 1, 1);
          pin.userData.squashT = 0;
        }
      }

      const v = pin.userData.vel;
      if (v.lengthSq() > 1e-4) {
        pin.position.addScaledVector(v, dt);
        v.multiplyScalar(0.90);
      }

      if (pin.userData.angVel > 0.01 && pin.userData.fallProgress < 1) {
        const step = pin.userData.angVel * dt;
        pin.userData.fallProgress = Math.min(1,
          pin.userData.fallProgress + step / (Math.PI / 2));
        const axis = pin.userData.fallAxis;
        pin.rotateOnWorldAxis(axis, step);
        if (pin.userData.fallProgress >= 1) {
          pin.userData.angVel = 0;
          pin.position.y = PIN_FALL_Y;
        } else {
          pin.position.y = pin.userData.home.y +
              (PIN_FALL_Y - pin.userData.home.y) * pin.userData.fallProgress;
        }
      }

      // Post-strike happy hop for fallen pins too — small wiggle
      if (pin.userData.hopT > 0) {
        pin.userData.hopT += dt;
        const hp = pin.userData.hopT;
        if (hp > 0.9) { pin.userData.hopT = 0; }
        else {
          const bounce = Math.sin(hp * Math.PI * 3.5) *
                         Math.max(0, 1 - hp / 0.9) * 0.12;
          pin.position.y = PIN_FALL_Y + Math.abs(bounce);
        }
      }

      // Chain reactions
      if (v.length() > 0.6) {
        for (const other of pins) {
          if (other === pin || !other.userData.standing) continue;
          const dx = pin.position.x - other.position.x;
          const dz = pin.position.z - other.position.z;
          const d2 = dx * dx + dz * dz;
          if (d2 < 0.35 * 0.35) {
            const d = Math.sqrt(d2) || 1e-4;
            const n = new THREE.Vector3(-dx / d, 0, -dz / d);
            const kick = v.clone().multiplyScalar(0.55)
                          .add(n.multiplyScalar(-0.8));
            knockPin(other, kick, Math.min(1, v.length() / 3 + 0.4));
          }
        }
      }

      if (pin.userData.flashUntil && nowMs > pin.userData.flashUntil) {
        if (pin.userData.bodyMat && pin.userData.origBodyColor) {
          pin.userData.bodyMat.color.copy(pin.userData.origBodyColor);
        }
        pin.userData.flashUntil = 0;
      }
    }
  }

  // Strike zoom — slow camera nudge toward pins when strike banner is showing
  const bannerShowing = bannerEl.classList.contains('pop');
  if (bannerShowing && bannerEl.textContent === 'strike') {
    camera.position.z = THREE.MathUtils.lerp(camera.position.z, 3.4, 0.03);
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, 1.9, 0.03);
  } else {
    camera.position.z = THREE.MathUtils.lerp(camera.position.z, 4.5, 0.04);
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, 2.2, 0.04);
  }

  // Bowler soup animation
  if (bowlerSoup) {
    bowlerSoup.position.y = bowlerBaseY + Math.sin(t * 2) * 0.015;
    if (bowlerAnim.releasing) {
      bowlerAnim.releaseT += dt;
      const p = Math.min(1, bowlerAnim.releaseT / 0.5);
      bowlerSoup.rotation.z = Math.sin(p * Math.PI) * -0.35;
      const paws = bowlerSoup.getObjectByName('paws');
      if (paws) {
        // Underhand swing arc: paw starts behind-and-up (windup), sweeps
        // down through the hip at release (p≈0.5), continues forward-and-up
        // on follow-through. Monotonic cos sweep from -A → 0 → +A around the
        // paws' local X (the swing plane after the bowler's -π/2 X flip).
        // Sign flipped so forward-of-bowler is +rotation, matching the
        // viewer's expectation of an underhand bowl.
        paws.rotation.x = -Math.cos(p * Math.PI) * 0.9;
      }
      if (bowlerAnim.releaseT > 0.7) {
        bowlerAnim.releasing = false;
        bowlerSoup.rotation.z = 0;
        if (paws) paws.rotation.x = 0;
      }
    }
    // Slump on gutter
    if (bowlerSlump.active) {
      bowlerSlump.t += dt;
      const s = bowlerSlump.t;
      if (s < 1.4) {
        const slumpAmount = Math.sin(Math.min(1, s / 0.4) * Math.PI * 0.5);
        const recover = s > 1.0 ? (s - 1.0) / 0.4 : 0;
        const factor = slumpAmount * (1 - recover);
        bowlerSoup.rotation.z = factor * 0.28;
        bowlerSoup.position.y = bowlerBaseY - factor * 0.06;
      } else {
        bowlerSlump.active = false;
        bowlerSoup.rotation.z = 0;
      }
    }
  }

  updateTutorial();
}

let lastT = performance.now();
function tick() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  updatePhysics(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ═══════════════════════ Serial + swing detection ═══════════════════════
const rawSampleBuffer = { 0: [], 1: [] };
const BUF_MS = 800;

const SWING_ARM_DPS       = 300;
const SWING_RELEASE_FRAC  = 0.30;
const SWING_MIN_PEAK_DPS  = 300;
const SWING_GYRO_MAX      = 800;
const SWING_ROLL_MAX_DEG  = 45;
const SWING_REFRACTORY_MS = 1500;
const SWING_MAX_ACTIVE_MS = 1200;
const SWING_MIN_ACTIVE_MS = 80;

// baselineRoll is a slow-moving average of wrist roll during IDLE. When the
// swing arms, we snapshot it into armRoll and compute angle = (release_roll
// − armRoll) / max. That way the user's natural release rotation drops out
// of the aim and "straight" always maps to angle=0. Auto-calibrating.
const swing = {
  0: { phase: 'IDLE', peakGyro: 0, peakAccel: 0, releaseRoll: 0,
       activeStart: 0, lockUntil: 0, baselineRoll: 0, armRoll: 0 },
  1: { phase: 'IDLE', peakGyro: 0, peakAccel: 0, releaseRoll: 0,
       activeStart: 0, lockUntil: 0, baselineRoll: 0, armRoll: 0 },
};
const BASELINE_ROLL_ALPHA = 0.02;   // slow LPF, ~1s to track a pose shift

const chargeWrap = document.getElementById('charge-wrap');
const chargeBar  = document.getElementById('charge-bar');
let chargeDisplay = 0;

function activeArmId() {
  if (!pvpMode) return null;   // any arm accepted in solo mode
  return pairing.armForPlayer(activePlayer);
}

function onRawSample(armId, sample) {
  const buf = rawSampleBuffer[armId];
  const nowMs = performance.now();
  buf.push({ t: nowMs, ...sample });
  while (buf.length && nowMs - buf[0].t > BUF_MS) buf.shift();

  const st = swing[armId];
  if (nowMs < st.lockUntil) return;

  // In PvP, silently track swing state for all arms (so the state machine
  // stays coherent) but only fire a launch for the active player's arm.
  const active_arm = activeArmId();
  const armAccepted = active_arm === null || armId === active_arm;

  const gyroMag  = Math.hypot(sample.gx, sample.gy, sample.gz);
  const accelMag = Math.hypot(sample.ax, sample.ay, sample.az);

  switch (st.phase) {
    case 'IDLE': {
      // Track natural resting wrist roll so we can null it out at release.
      st.baselineRoll = (1 - BASELINE_ROLL_ALPHA) * st.baselineRoll
                      + BASELINE_ROLL_ALPHA * sample.roll;
      if (gyroMag > SWING_ARM_DPS) {
        st.phase = 'ACTIVE';
        st.peakGyro = gyroMag;
        st.peakAccel = accelMag;
        st.releaseRoll = sample.roll;
        st.armRoll = st.baselineRoll;   // snapshot the pose we started from
        st.activeStart = nowMs;
        lastSwingActivityMs = nowMs;
      }
      break;
    }
    case 'ACTIVE': {
      if (gyroMag > st.peakGyro) {
        st.peakGyro = gyroMag;
        st.releaseRoll = sample.roll;
      }
      if (accelMag > st.peakAccel) st.peakAccel = accelMag;

      const dtActive = nowMs - st.activeStart;
      const releasing = gyroMag < st.peakGyro * SWING_RELEASE_FRAC
                     && dtActive > SWING_MIN_ACTIVE_MS
                     && st.peakGyro > SWING_MIN_PEAK_DPS;

      if (releasing) {
        const speed = Math.max(0.15, Math.min(1.0, st.peakGyro / SWING_GYRO_MAX));
        // Angle from the delta between release roll and the pose we armed
        // from. Cancels out natural wrist twist so straight throws go straight.
        const rollDelta = sample.roll - st.armRoll;
        const angle = Math.max(-1, Math.min(1, rollDelta / SWING_ROLL_MAX_DEG));
        if (ballState === 'ready' && !active().gameOver && armAccepted) {
          launchBall(speed, angle);
        } else if (armAccepted && (pvpMode ? bothDone() : active().gameOver)) {
          // Game is over and the player swung again — run it back so
          // wristband-only players are never stuck at the final banner.
          resetGame();
        } else if (!armAccepted) {
          logTune('ignored', {
            arm: armId, peakGyro: st.peakGyro, peakAccel: st.peakAccel,
            roll: rollDelta, dtActive, speed, angle,
          });
        }
        if (armAccepted) logTune('release', {
          arm: armId, peakGyro: st.peakGyro, peakAccel: st.peakAccel,
          roll: rollDelta, dtActive, speed, angle,
        });
        st.phase = 'IDLE';
        st.lockUntil = nowMs + SWING_REFRACTORY_MS;
        chargeDisplay = 0;
        st.peakGyro = 0; st.peakAccel = 0;
      } else if (dtActive > SWING_MAX_ACTIVE_MS) {
        st.phase = 'IDLE';
        st.peakGyro = 0; st.peakAccel = 0;
        chargeDisplay = 0;
      }
      break;
    }
  }

  // Charge HUD tracks the active player's arm (or arm 0 in solo).
  const chargeArm = active_arm === null ? 0 : active_arm;
  if (armId === chargeArm && st.phase === 'ACTIVE') {
    const cur = Math.min(1, st.peakGyro / SWING_GYRO_MAX);
    chargeDisplay = Math.max(chargeDisplay, cur);
    chargeWrap.classList.add('armed');
    if (chargeDisplay > 0.2) tutorialEl.classList.remove('show');
  }
}

setInterval(() => {
  const chargeArmId = pvpMode ? (pairing.armForPlayer(activePlayer) ?? 0) : 0;
  if (swing[chargeArmId].phase !== 'ACTIVE') {
    chargeDisplay *= 0.85;
    if (chargeDisplay < 0.01) chargeDisplay = 0;
    chargeWrap.classList.remove('armed');
  }
  chargeWrap.classList.toggle('on', chargeDisplay > 0.03);
  chargeBar.style.width = (chargeDisplay * 100).toFixed(1) + '%';
}, 40);

// Tune-log helpers, one row per detected event.
const $tuneLog = document.getElementById('tune-log');
const $tuneCount = document.getElementById('tune-log-count');
let tuneRows = 0;
function logTune(kind, f) {
  if (!$tuneLog) return;
  const pad = (v, w=5, p=1) => (typeof v === 'number' ? v.toFixed(p) : String(v)).padStart(w);
  const row = `${kind.padEnd(10)} arm=${f.arm} pkGyro=${pad(f.peakGyro,5,0)} pkAcc=${pad(f.peakAccel,5,1)} roll=${pad(f.roll,6,1)} dt=${pad(f.dtActive,4,0)} spd=${pad(f.speed,4,2)} ang=${pad(f.angle,5,2)}\n`;
  $tuneLog.value += row;
  $tuneLog.scrollTop = $tuneLog.scrollHeight;
  tuneRows++;
  if ($tuneCount) $tuneCount.textContent = `${tuneRows} row${tuneRows === 1 ? '' : 's'}`;
}
document.getElementById('tune-log-copy')?.addEventListener('click', async () => {
  if (!$tuneLog?.value) return;
  try { await navigator.clipboard.writeText($tuneLog.value); }
  catch { $tuneLog.select(); document.execCommand('copy'); }
});
document.getElementById('tune-log-clear')?.addEventListener('click', () => {
  if ($tuneLog) $tuneLog.value = '';
  tuneRows = 0;
  if ($tuneCount) $tuneCount.textContent = '0 rows';
});

const dispatcher = new ArmDispatcher(() => {});
const origOnLine = dispatcher.onLine.bind(dispatcher);
dispatcher.onLine = (line) => {
  origOnLine(line);
  if (!line || line[0] === '#' || line.startsWith('ERR')) return;
  const parts = line.split(',');
  let armId = 0, offset = 0;
  if (parts.length === 10) { armId = +parts[0]; offset = 1; }
  else if (parts.length !== 9) return;
  const s = {
    t_us: +parts[offset],
    ax: +parts[offset + 1], ay: +parts[offset + 2], az: +parts[offset + 3],
    gx: +parts[offset + 4], gy: +parts[offset + 5], gz: +parts[offset + 6],
    roll: +parts[offset + 7], pitch: +parts[offset + 8],
  };
  if (!Number.isNaN(s.ax)) onRawSample(armId, s);
};

// Pairing wire-up: feed each serial line to pairing so it can auto-assign,
// and refresh the PvP mode flag whenever the slots change.
const pairHintEl = document.getElementById('pair-hint');
function refreshPairing() {
  const armA = pairing.armForPlayer('A');
  const armB = pairing.armForPlayer('B');
  const wasPvp = pvpMode;
  pvpMode = armA !== null && armB !== null;
  pairHintEl.classList.toggle('hidden', pvpMode);
  if (pvpMode && !wasPvp) {
    // Freshly entered PvP mid-game — start turns from A.
    activePlayer = 'A';
    announceTurn();
  }
  renderScorecard();
}
pairing.onChange(refreshPairing);
refreshPairing();

const serialHandlers = {
  baud: 115200,
  onLine: (line) => { pairing.onLine(line); dispatcher.onLine(line); },
  onOpen: () => { statusEl.textContent = 'hub connected';
                  statusEl.classList.add('connected'); },
  onClose: () => { statusEl.textContent = 'hub disconnected';
                   statusEl.classList.remove('connected'); },
  onError: () => { statusEl.textContent = 'hub error, try again';
                    statusEl.classList.remove('connected'); },
};
document.getElementById('connect').addEventListener('click', async () => {
  try {
    statusEl.textContent = 'choosing port…';
    await openSerial(serialHandlers);
  } catch (e) { statusEl.textContent = 'connect hub'; }
});
autoOpenSerial(serialHandlers).catch(() => {});

// Full-game reset — used by the R key and the on-screen "bowl again" button.
function resetGame() {
  for (const letter of ['A', 'B']) {
    const g = games[letter];
    g.frames.length = 0;
    for (let i = 0; i < 10; i++) g.frames.push({ rolls: [], score: null });
    g.currentFrame = 0; g.rollInFrame = 0;
    g.pinsThisFrame = 0; g.gameOver = false;
  }
  activePlayer = 'A';
  standUpAllPins();
  ball.position.set(0, 0.25, BALL_HOME_Z); ballVel.set(0, 0, 0);
  ballState = 'ready'; ballInGutter = false;
  againEl.classList.remove('show');
  if (pvpMode) announceTurn();
  else promptEl.textContent = 'swing forward and let go';
  lastSwingActivityMs = performance.now();
  renderScorecard();
}
againEl.addEventListener('click', resetGame);

// Dev shortcuts
addEventListener('keydown', (e) => {
  if (e.key === ' ' && ballState === 'ready' && !active().gameOver) {
    // SPACE fires a fake swing for whoever's turn it is.
    const power = 0.55 + Math.random() * 0.4;
    const angle = (Math.random() - 0.5) * 0.4;
    launchBall(power, angle);
  }
  if (e.key === 'r' || e.key === 'R') resetGame();
});
</script>
