<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soup Games — Tennis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  /* ── Soup Games palette (from index.html) ── */
  :root {
    --sky-top:    #7bd3ee;
    --sky-mid:    #4fc0e3;
    --sky-deep:   #2a95c4;
    --water:      #37a7d0;
    --cream:      #fbf3e0;
    --cream-warm: #f6e9c9;
    --cream-deep: #ecdcb1;
    --ruin-blue:  #37628a;
    --ruin-teal:  #2f8fa3;
    --vine:       #6cb85a;
    --vine-deep:  #4a9440;
    --ink:        #1c2a3a;
    --ink-soft:   #476278;
    --hot:        #ff9663;
    --gold:       #f4c95d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
               font-family: "Fredoka", "Nunito", -apple-system,
                            "SF Pro Rounded", "SF Pro Display", system-ui,
                            sans-serif;
               color: var(--ink);
               background: linear-gradient(180deg,
                            var(--sky-top) 0%,
                            var(--sky-mid) 45%,
                            var(--sky-deep) 78%,
                            var(--water) 100%); }
  canvas { display:block; }

  /* ── Scoreboard HUD ── */
  #hud { position:absolute; top:14px; left:0; right:0; text-align:center;
         pointer-events:none; z-index:100; }
  @media (max-width: 640px) { #hud { top: 64px; } }
  #scoreboard {
    display:inline-flex; align-items:stretch; gap:0;
    background: var(--cream);
    border: 3px solid var(--ink); border-radius: 18px;
    box-shadow: 0 4px 0 var(--ink);
    overflow: hidden;
    font-weight: 900; letter-spacing:-.01em;
  }
  #scoreboard .col {
    display:flex; flex-direction:column; align-items:center;
    padding: 8px 20px 6px; min-width: 130px;
  }
  #scoreboard .col.A .label { color: var(--hot); text-shadow: 0 2px 0 #a5471d; }
  #scoreboard .col.B .label { color: var(--ruin-blue); text-shadow: 0 2px 0 #1c3350; }
  #scoreboard .label { font-size: 13px; letter-spacing:.14em;
                       text-transform: uppercase; font-weight: 800; }
  #scoreboard .games { font-size: 32px; font-weight: 900; line-height: 1;
                       color: var(--ink); margin-top: 2px; }
  #scoreboard .point { font-size: 13px; letter-spacing:.06em; margin-top: 2px;
                       color: var(--ink-soft); font-weight: 800; }
  #scoreboard .serve-dot { font-size: 12px; margin-top: 2px; color: transparent;
                           font-weight: 900; letter-spacing:.1em; }
  #scoreboard .col.serving .serve-dot { color: var(--vine-deep); }
  #scoreboard .col.serving .games { text-shadow: 0 3px 0 rgba(74,148,64,.35); }
  #scoreboard .mid {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 4px 12px; background: var(--cream-deep);
    border-left: 3px solid var(--ink); border-right: 3px solid var(--ink);
    font-size: 10px; letter-spacing:.18em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 800; min-width: 96px;
  }
  #scoreboard .mid .call { color: var(--ink); font-size: 14px; letter-spacing:.02em;
                           text-transform: none; margin-top: 2px; font-weight: 900; }
  #scoreboard .games.pop, #scoreboard .point.pop { animation: scorePop 240ms ease-out; }
  @keyframes scorePop {
    40% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  #rally-wrap { margin-top:12px; display:flex; justify-content:center; }
  #rally { display:inline-flex; align-items:center; gap:6px;
           padding:5px 14px; background: var(--cream);
           border-radius: 999px;
           font-size:11px; letter-spacing:.28em; text-transform:uppercase;
           color: var(--ink); font-weight: 800;
           border: 2px solid var(--ink);
           box-shadow: 0 2px 0 var(--ink);
           transition: background 240ms, color 240ms, transform 200ms,
                       box-shadow 240ms, border-color 240ms; }
  #rally.streak-1 { background: #fff2d6; }
  #rally.streak-2 { background: #ffe3b8; color: #7a4a12; }
  #rally.streak-3 { background: linear-gradient(180deg,#ffce7a,#ff9663);
                    color: #fff; border-color: #a5471d;
                    box-shadow: 0 4px 0 #a5471d, 0 0 22px rgba(255,150,99,.65);
                    transform: scale(1.05); }
  #rally .streak-flame { font-size: 14px; letter-spacing:0;
                        display:inline-block; transform-origin: 50% 80%;
                        animation: flame-flicker 480ms ease-in-out infinite alternate;
                        filter: drop-shadow(0 0 6px rgba(255,150,99,.7)); }
  @keyframes flame-flicker {
    0%   { transform: scale(1) rotate(-3deg); }
    100% { transform: scale(1.15) rotate(4deg); }
  }

  /* ── Pairing hint (single-player fallback) — lives in the HUD flow just
        below the rally pill so it can never overlap the scoreboard. ── */
  #pair-hint { display:none; margin-top:8px;
               padding:7px 14px; background: rgba(28,42,58,.7);
               color: var(--cream); border-radius: 999px;
               font-size:11px; letter-spacing:.14em; text-transform:uppercase;
               font-weight: 800; pointer-events:none;
               max-width: 92vw; }
  #pair-hint.show { display:inline-block; }

  /* ── Point sparkle shower ── */
  #sparkles { position:absolute; inset:0; overflow:hidden;
              pointer-events:none; z-index:93; }
  .spark { position:absolute; width:16px; height:16px;
           background: var(--gold);
           clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
           animation: spark-fall 900ms ease-out forwards;
           filter: drop-shadow(0 2px 0 rgba(28,42,58,.35)); }
  @keyframes spark-fall {
    0%   { opacity:0; transform: translate(0,0) rotate(0deg) scale(.3); }
    25%  { opacity:1; }
    100% { opacity:0;
           transform: translate(var(--dx,0), var(--dy,140px))
                      rotate(var(--rot,320deg)) scale(1); }
  }

  /* ── Serve / status prompt ── */
  #prompt { position:absolute; bottom:60px; left:50%;
            transform:translateX(-50%);
            padding:11px 22px; background: var(--cream);
            border: 3px solid var(--ink); border-radius: 999px;
            box-shadow: 0 3px 0 var(--ink);
            font-weight:700; letter-spacing:.01em;
            font-size:13px; text-align:center; z-index:100;
            color: var(--ink); white-space:nowrap;
            transition: opacity 220ms; }
  #prompt.hidden { opacity: 0; }

  /* First-time swing hint — sits just under the prompt pill, fades after the
     first detected swing (body.has-gestured). Cream text with an ink outline
     to stay legible over the bright sky background. */
  #howto {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    font-size:12px; font-weight:800; letter-spacing:.06em;
    text-transform:uppercase; color:var(--cream);
    text-shadow: 0 2px 0 var(--ink), 0 0 6px rgba(28,42,58,.6);
    white-space:nowrap; z-index:99; pointer-events:none;
    transition:opacity 500ms ease;
  }
  body.has-gestured #howto { opacity:0; }

  /* ── Center gesture flash ── */
  #gesture { position:absolute; top:38%; left:50%;
             transform:translate(-50%,-50%) scale(1);
             font-size:56px; font-weight:900; letter-spacing:-.02em;
             text-shadow:0 5px 0 var(--ink), 0 8px 24px rgba(28,42,58,.4);
             opacity:0; transition:opacity 90ms, transform 140ms;
             pointer-events:none; z-index:95; color: var(--hot); }
  #gesture.pop { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  @media (max-width: 640px) { #gesture { font-size:38px; } }

  /* ── Hit confirm ── */
  .hit-confirm { position:absolute; inset:0;
                 pointer-events:none; z-index:91; overflow:hidden; }
  .hit-confirm .burst, .hit-confirm .ring {
    position:absolute; left:var(--hit-x, 50%); top:var(--hit-y, 50%);
    opacity:0; will-change:transform, opacity;
  }
  .hit-confirm .burst {
    width:  calc(120px + 260px * var(--hit-power, .4));
    height: calc(120px + 260px * var(--hit-power, .4));
    margin-left: calc(-1 * (120px + 260px * var(--hit-power, .4)) / 2);
    margin-top:  calc(-1 * (120px + 260px * var(--hit-power, .4)) / 2);
    border-radius:50%;
    background: radial-gradient(circle,
      rgba(255,243,224,.95) 0%,
      rgba(244,201,93,.75) 30%,
      rgba(255,150,99,.4) 60%,
      rgba(255,150,99,0) 75%);
    mix-blend-mode:screen; filter:blur(2px);
  }
  .hit-confirm .ring {
    width:  calc(90px + 320px * var(--hit-power, .4));
    height: calc(90px + 320px * var(--hit-power, .4));
    margin-left: calc(-1 * (90px + 320px * var(--hit-power, .4)) / 2);
    margin-top:  calc(-1 * (90px + 320px * var(--hit-power, .4)) / 2);
    border-radius:50%;
    border: calc(3px + 5px * var(--hit-power, .4)) solid rgba(255,220,130,.85);
    mix-blend-mode:screen;
  }
  .hit-confirm.active .burst  { animation: burst 440ms ease-out forwards; }
  .hit-confirm.active .ring   { animation: ring  520ms ease-out forwards; }
  @keyframes burst {
    0%   { opacity:0; transform:scale(.3); }
    30%  { opacity:1; transform:scale(1.05); }
    100% { opacity:0; transform:scale(1.3); }
  }
  @keyframes ring {
    0%   { opacity:0; transform:scale(.4); }
    25%  { opacity:1; }
    100% { opacity:0; transform:scale(1.7); }
  }

  /* ── Point banner ── */
  #banner { position:absolute; top:42%; left:50%;
            transform:translate(-50%,-50%) scale(1);
            font-size:clamp(34px, 8.5vw, 64px); font-weight:900; letter-spacing:-.03em;
            text-transform:uppercase; opacity:0;
            text-shadow:0 6px 0 var(--ink), 0 10px 32px rgba(28,42,58,.4);
            transition:opacity 120ms, transform 200ms; pointer-events:none;
            color: var(--hot); z-index:96; text-align:center; }
  #banner.pop { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  #banner.b   { color: var(--ruin-blue); }
  #banner.miss{ color: var(--gold); }
  #banner .sub { display:block; font-size: clamp(18px, 4.5vw, 28px); margin-top: 6px;
                 font-weight: 800; letter-spacing:.02em; text-transform: none;
                 text-shadow: 0 3px 0 var(--ink); }

  /* ── Soup Games chrome ── */
  .ss-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--cream); color: var(--ink);
    border: 3px solid var(--ink); border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .01em; text-decoration: none; cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 120ms cubic-bezier(.3,.7,.3,1), box-shadow 120ms;
  }
  .ss-btn:hover { transform: translateY(-2px); background: var(--cream-warm);
                  box-shadow: 0 5px 0 var(--ink); }
  .ss-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--ink); }

  #back { position:absolute; top:16px; left:16px; z-index:120; }
  #connect { position:absolute; top:16px; right:16px; z-index:120; }
  #connect::before {
    content: ""; width: 9px; height: 9px; border-radius: 50%; flex-shrink:0;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
    animation: hubpulse 1.8s ease-in-out infinite;
  }
  #connect.connected::before {
    background: var(--vine); box-shadow: 0 0 8px var(--vine);
    animation: none;
  }
  @keyframes hubpulse { 50% { opacity: 0.35; transform: scale(0.85); } }

  #devhint { position:absolute; bottom:12px; right:16px; z-index:60;
             font-size:10px; letter-spacing:.04em; color:var(--ink);
             opacity:.45; font-weight:600; pointer-events:none; }
  @media (max-width: 640px) { #devhint { display:none; } }
  /* Hide dev-only chrome (training-data log + keyboard hint) unless ?dev is set. */
  html:not(.dev) #tune-log-wrap, html:not(.dev) #devhint { display:none !important; }

  /* Tune log */
  #tune-log-wrap { position:absolute; top:16px; left:120px; z-index:131;
                   display:flex; flex-direction:column; gap:6px; max-width:38vw; }
  #tune-log-controls { display:flex; gap:6px; align-items:center; }
  #tune-log-controls button {
    padding:6px 12px; border-radius:8px;
    background:var(--cream); color:var(--ink);
    border:2px solid var(--ink); box-shadow:0 2px 0 var(--ink);
    font:inherit; font-size:11px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; cursor:pointer;
  }
  #tune-log-controls button:hover { background:var(--cream-warm); }
  #tune-log-controls #tune-log-count {
    font-family:ui-monospace,Menlo,monospace; font-size:11px;
    color:var(--cream); background:rgba(28,42,58,.65);
    padding:4px 10px; border-radius:999px;
  }
  #tune-log {
    width:100%; height:200px; padding:10px 12px;
    background:rgba(28,42,58,.85); color:#f7f3e6;
    border:none; border-radius:8px;
    font-family:ui-monospace,Menlo,monospace;
    font-size:11px; line-height:1.5; resize:none;
  }
  @media (max-width: 640px) { #tune-log-wrap { display:none; } }
</style>
</head>
<body>

<script>
  if (/[?&#]dev\b/.test(location.search + location.hash)) {
    document.documentElement.classList.add('dev');
  }
</script>

<div id="hud">
  <div id="scoreboard">
    <div class="col A" id="col-A">
      <div class="label">player a</div>
      <div class="games" id="games-A">0</div>
      <div class="point" id="point-A">0</div>
      <div class="serve-dot">serve</div>
    </div>
    <div class="mid">
      <span>set to 3</span>
      <span class="call" id="score-call">love–love</span>
    </div>
    <div class="col B" id="col-B">
      <div class="label">player b</div>
      <div class="games" id="games-B">0</div>
      <div class="point" id="point-B">0</div>
      <div class="serve-dot">serve</div>
    </div>
  </div>
  <div id="rally-wrap"><span id="rally">rally 0</span></div>
  <div id="pair-hint">only one wristband paired · b is cpu · pair both on menu</div>
</div>

<div id="sparkles"></div>
<div id="prompt">connect the hub to start</div>
<div id="howto">swing your wristband like a racket</div>
<div id="gesture"></div>
<div id="banner"></div>
<div class="hit-confirm" id="hit-confirm">
  <div class="burst"></div>
  <div class="ring"></div>
</div>

<div id="devhint">keys · space swing for receiver</div>
<div id="tune-log-wrap">
  <div id="tune-log-controls">
    <button id="tune-log-copy" type="button">copy</button>
    <button id="tune-log-clear" type="button">clear</button>
    <span id="tune-log-count">0 rows</span>
  </div>
  <textarea id="tune-log" readonly placeholder="each swing logs one row. throw a bunch, click copy, paste back."></textarea>
</div>
<button id="connect" class="ss-btn">connect hub</button>
<a id="back" class="ss-btn" href="index.html">← menu</a>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { openSerial, autoOpenSerial } from './serial.js';
import { ArmDispatcher } from './dispatch.js';
import { pairing } from './pairing.js';
import { sfx } from './sfx.js';

// ═══════════════════════ Three.js scene ═══════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4fc0e3);
scene.fog = new THREE.Fog(0x4fc0e3, 30, 90);

// Side-elevated view so both baselines fit in frame.
const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 200);
const camHome = new THREE.Vector3(9, 8.5, 16);
const camLook = new THREE.Vector3(0, 0.8, 0);
camera.position.copy(camHome);
camera.lookAt(camLook);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Lights
scene.add(new THREE.AmbientLight(0xcfe6f2, 0.75));
const key = new THREE.DirectionalLight(0xfff2d0, 1.05);
key.position.set(5, 12, 6);
scene.add(key);
const rim = new THREE.DirectionalLight(0x99ccee, 0.45);
rim.position.set(-4, 6, -6);
scene.add(rim);

// ── Court dimensions ──
// Player A on +z (near) half. Player B on -z (far) half. Net at z=0.
const COURT_W = 8.0;
const COURT_L = 22.0;
const HALF_L  = COURT_L / 2;
const halfW   = COURT_W / 2;

const court = new THREE.Mesh(
  new THREE.PlaneGeometry(COURT_W + 3.0, COURT_L + 4.0),
  new THREE.MeshStandardMaterial({ color: 0xebd9a8, roughness: 0.9 })
);
court.rotation.x = -Math.PI/2;
scene.add(court);

const outer = new THREE.Mesh(
  new THREE.PlaneGeometry(140, 140),
  new THREE.MeshStandardMaterial({ color: 0x37a7d0, roughness: 0.95 })
);
outer.rotation.x = -Math.PI/2;
outer.position.y = -0.02;
scene.add(outer);

function addLine(x1, z1, x2, z2, thickness = 0.08) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.hypot(dx, dz);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(len, thickness),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 })
  );
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set((x1+x2)/2, 0.01, (z1+z2)/2);
  mesh.rotation.z = -Math.atan2(dz, dx);
  scene.add(mesh);
}
addLine(-halfW, -HALF_L, -halfW,  HALF_L);
addLine( halfW, -HALF_L,  halfW,  HALF_L);
addLine(-halfW, -HALF_L,  halfW, -HALF_L);
addLine(-halfW,  HALF_L,  halfW,  HALF_L);
addLine(-halfW, -HALF_L/2, halfW, -HALF_L/2);
addLine(-halfW,  HALF_L/2, halfW,  HALF_L/2);
addLine(0, -HALF_L/2, 0, HALF_L/2);

// ── Net ──
const netGroup = new THREE.Group();
const netMat = new THREE.MeshStandardMaterial({
  color: 0xfbf3e0, roughness: 0.9, transparent: true, opacity: 0.75, side: THREE.DoubleSide });
const net = new THREE.Mesh(new THREE.PlaneGeometry(COURT_W + 1.5, 0.9), netMat);
net.position.set(0, 0.45, 0);
netGroup.add(net);
const netTop = new THREE.Mesh(
  new THREE.BoxGeometry(COURT_W + 1.6, 0.06, 0.06),
  new THREE.MeshStandardMaterial({ color: 0x1c2a3a, roughness: 0.6 })
);
netTop.position.set(0, 0.9, 0);
netGroup.add(netTop);
const postGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.0, 12);
const postMat = new THREE.MeshStandardMaterial({ color: 0x1c2a3a, roughness: 0.7 });
[-1, 1].forEach(s => {
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(s * (halfW + 0.75), 0.5, 0);
  netGroup.add(post);
});
scene.add(netGroup);

// ── Clouds ──
const clouds = [];
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false });
for (let i = 0; i < 7; i++) {
  const cloud = new THREE.Group();
  const n = 3 + Math.floor(Math.random() * 3);
  for (let j = 0; j < n; j++) {
    const r = 0.9 + Math.random() * 0.9;
    const s = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 8), cloudMat);
    s.position.set((j - n/2) * 1.1, Math.random() * 0.4, Math.random() * 0.5);
    cloud.add(s);
  }
  cloud.position.set(
    (Math.random() - 0.5) * 60,
    8 + Math.random() * 5,
    -20 - Math.random() * 25
  );
  cloud.userData.driftSpeed = 0.15 + Math.random() * 0.2;
  clouds.push(cloud);
  scene.add(cloud);
}

// ═══════════════════════ Player mascots ═══════════════════════
// Two identical soup mascots, retinted per player. Both loaded from the same
// GLB — see soup/HANDOFF.md. Placeholder shows until the GLB lands.
const MASCOT_SCALE = 0.012;
const BASE_Z_A =  HALF_L - 3.5;   // player A near baseline (+z)
const BASE_Z_B = -HALF_L + 3.5;   // player B far  baseline (-z)

function makePlaceholder(tint) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 20, 16),
    new THREE.MeshStandardMaterial({ color: tint, roughness: 0.85 })
  );
  body.position.y = 0.55;
  g.add(body);
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.42, 20, 16),
    new THREE.MeshStandardMaterial({ color: tint, roughness: 0.85 })
  );
  head.position.y = 1.15;
  g.add(head);
  return g;
}

// Group per player — game logic reads .position, animation lives on inner mesh.
const soupA = new THREE.Group();
soupA.position.set(0, 0, BASE_Z_A);
// Turn the whole GROUP 180° around world Y so player A faces the net (-z).
// Do NOT stack rotation.y on top of the mascot's own rotation.x flip — that
// combo lands the mascot upside-down / below the floor (DEVLOG §11, §12).
soupA.rotation.y = Math.PI;
scene.add(soupA);
const soupB = new THREE.Group();
soupB.position.set(0, 0, BASE_Z_B);
scene.add(soupB);

const phA = makePlaceholder(0xff9663); soupA.add(phA);
const phB = makePlaceholder(0xf6e9c9); soupB.add(phB);

const mascot = { A: { mesh: null, paws: null }, B: { mesh: null, paws: null } };
const anim = {
  A: { swingStart: 0, missStart: 0, hopStart: 0 },
  B: { swingStart: 0, missStart: 0, hopStart: 0 },
};

const loader = new GLTFLoader();
loader.load('assets/mascot.glb', (gltf) => {
  try {
    // Player A — near baseline, hot orange, faces -z (toward net/B)
    const a = gltf.scene.clone(true);
    a.traverse(o => { if (o.isMesh) o.material = o.material.clone(); });
    a.scale.setScalar(MASCOT_SCALE);
    a.rotation.x = -Math.PI / 2;
    // NO rotation.y on the mascot itself — the parent group soupA handles the
    // 180° turn. Stacking both rotations here reproduces DEVLOG §11's
    // upside-down-mascot / invisible-mascot bug.
    const aBody = a.getObjectByName('body');   if (aBody) aBody.material.color.setHex(0xff9663);
    const aEars = a.getObjectByName('ears');   if (aEars) aEars.material.color.setHex(0xa5471d);
    const aPaws = a.getObjectByName('paws');   if (aPaws) aPaws.material.color.setHex(0xff9663);
    soupA.remove(phA); soupA.add(a);
    mascot.A.mesh = a; mascot.A.paws = aPaws;

    // Player B — far baseline, teal-blue, faces +z (toward net/A)
    const b = gltf.scene.clone(true);
    b.traverse(o => { if (o.isMesh) o.material = o.material.clone(); });
    b.scale.setScalar(MASCOT_SCALE);
    b.rotation.x = -Math.PI / 2;
    // no y-flip: mascot faces +z by default → toward the net
    // Player B — warm cream/taupe (matches boxing's CPU tint), visually
    // distinct from player A's hot-orange without breaking the palette.
    const bBody = b.getObjectByName('body');   if (bBody) bBody.material.color.setHex(0xf6e9c9);
    const bEars = b.getObjectByName('ears');   if (bEars) bEars.material.color.setHex(0xc9a672);
    const bPaws = b.getObjectByName('paws');   if (bPaws) bPaws.material.color.setHex(0xf6e9c9);
    soupB.remove(phB); soupB.add(b);
    mascot.B.mesh = b; mascot.B.paws = bPaws;

}, undefined, (err) => {
  console.warn('mascot.glb load failed — placeholder stays:', err);
});

// ── Ball ──
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.11, 20, 14),
  new THREE.MeshStandardMaterial({
    color: 0xdaff5a, roughness: 0.4,
    emissive: 0x556600, emissiveIntensity: 0.35 })
);
ball.position.set(0, 1.0, BASE_Z_A);
scene.add(ball);

const ballShadow = new THREE.Mesh(
  new THREE.CircleGeometry(0.15, 16),
  new THREE.MeshBasicMaterial({ color: 0x1c2a3a, transparent: true, opacity: 0.28 })
);
ballShadow.rotation.x = -Math.PI/2;
ballShadow.position.y = 0.02;
scene.add(ballShadow);

// ── Ball trail ──
const TRAIL_LEN = 40;
const trailPositions = new Float32Array(TRAIL_LEN * 3);
const trailGeom = new THREE.BufferGeometry();
trailGeom.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
const trailMatCore = new THREE.LineBasicMaterial({
  color: 0xeaff70, transparent: true, opacity: 0.95,
});
const trail = new THREE.Line(trailGeom, trailMatCore);
scene.add(trail);

const trailSpriteCanvas = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grd.addColorStop(0.00, 'rgba(255,255,220,1)');
  grd.addColorStop(0.35, 'rgba(220,255,90,0.85)');
  grd.addColorStop(0.75, 'rgba(180,220,60,0.25)');
  grd.addColorStop(1.00, 'rgba(180,220,60,0)');
  g.fillStyle = grd; g.fillRect(0, 0, 64, 64);
  return c;
})();
const trailSpriteTex = new THREE.CanvasTexture(trailSpriteCanvas);
const TRAIL_SPRITES = 10;
const trailSprites = [];
for (let i = 0; i < TRAIL_SPRITES; i++) {
  const m = new THREE.SpriteMaterial({
    map: trailSpriteTex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, opacity: 0,
  });
  const s = new THREE.Sprite(m);
  s.scale.setScalar(0.4);
  scene.add(s);
  trailSprites.push(s);
}
const trailBuf = [];
function pushTrail(p) {
  trailBuf.push(p.clone());
  while (trailBuf.length > TRAIL_LEN) trailBuf.shift();
  for (let i = 0; i < TRAIL_LEN; i++) {
    const src = trailBuf[i] || trailBuf[trailBuf.length - 1] || p;
    trailPositions[i*3]   = src.x;
    trailPositions[i*3+1] = src.y;
    trailPositions[i*3+2] = src.z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  const bufLen = trailBuf.length;
  for (let i = 0; i < TRAIL_SPRITES; i++) {
    const idx = bufLen - 1 - Math.floor(i * (bufLen - 1) / (TRAIL_SPRITES - 1 || 1));
    const src = trailBuf[Math.max(0, idx)];
    const s = trailSprites[i];
    if (src) {
      s.position.copy(src);
      const t = 1 - i / TRAIL_SPRITES;
      s.scale.setScalar(0.18 + 0.42 * t);
      s.material.opacity = 0.9 * t * t;
    } else {
      s.material.opacity = 0;
    }
  }
}
function clearTrail() {
  trailBuf.length = 0;
  for (let i = 0; i < TRAIL_LEN; i++) {
    trailPositions[i*3] = ball.position.x;
    trailPositions[i*3+1] = ball.position.y;
    trailPositions[i*3+2] = ball.position.z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  for (const s of trailSprites) s.material.opacity = 0;
}

// ═══════════════════════ Game state ═══════════════════════
//
// Rally state machine:
//   'idle'         — game hasn't started (waiting for connect / pair)
//   'serve_wait'   — ball pinned to server, waiting for their swing
//   'in_flight'    — ball airborne heading to state.headingTo
//   'point_end'    — banner up between points
//   'game_end'     — banner up between games (or set)
//
// The ball's active-player side is state.headingTo. It flips ONCE per rally
// stroke — inside processHit() the moment a receiver successfully returns.
//
// Server is state.server ('A' or 'B'). Server alternates every game
// (standard tennis is one-server-per-game; we use whole-game alternation).
//
// Scoring: state.points['A' | 'B'] is 0..3 for 0/15/30/40, or 'AD' after
// an advantage. Deuce = both at 3. First to 3 games wins the set.

const HITTABLE_MS = 380;      // swing window around ball arrival
const HITTABLE_LATE_MS = 100; // grace after arrival
const SET_TARGET = 3;
const G_ACCEL = 9.8;

const state = {
  mode: 'idle',
  server: 'A',
  headingTo: 'A',        // who ball is currently flying to (or serving to)
  ballVel: new THREE.Vector3(),
  rally: 0,
  points: { A: 0, B: 0 },
  games:  { A: 0, B: 0 },
  arriveTime: 0,
  hittableStart: 0,
  hittableEnd: 0,
  camShake: { until: 0, amp: 0 },
  pvp: false,            // set true once both slots paired
  cpuControls: null,     // 'A' or 'B' when non-pvp
};

// Wire pvp/cpu once — recompute on pairing changes.
function refreshMode() {
  const armA = pairing.armForPlayer('A');
  const armB = pairing.armForPlayer('B');
  state.pvp = (armA !== null && armB !== null);
  state.cpuControls = state.pvp ? null : (armA === null ? 'A' : 'B');
  // Actually: whichever slot is EMPTY is CPU-controlled. If both empty, CPU
  // controls B and player A takes any inbound arm (fallback single-player).
  if (!state.pvp) {
    state.cpuControls = (armB === null) ? 'B' : 'A';
  }
  // Only nag about pairing once at least one wristband has actually been
  // heard — before that the hint is just noise for a judge walking up.
  document.getElementById('pair-hint')
    .classList.toggle('show', !state.pvp && pairing.stats.size > 0);
}

pairing.onChange(refreshMode);
refreshMode();

// ── DOM handles ──
const $rally    = document.getElementById('rally');
const $prompt   = document.getElementById('prompt');
const $gest     = document.getElementById('gesture');
const $banner   = document.getElementById('banner');
const $conf     = document.getElementById('hit-confirm');
const $stat     = document.getElementById('connect');
const $sparkles = document.getElementById('sparkles');
const $gamesA   = document.getElementById('games-A');
const $gamesB   = document.getElementById('games-B');
const $pointA   = document.getElementById('point-A');
const $pointB   = document.getElementById('point-B');
const $call     = document.getElementById('score-call');
const $colA     = document.getElementById('col-A');
const $colB     = document.getElementById('col-B');

function sparkleShower(cx, cy, count = 18) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.background = Math.random() < 0.5 ? '#f4c95d' : (Math.random() < 0.5 ? '#fbf3e0' : '#ff9663');
    const angle = (Math.random() - 0.5) * Math.PI * 1.1;
    const dist  = 120 + Math.random() * 220;
    const dx = Math.sin(angle) * dist;
    const dy = 60 + Math.abs(Math.cos(angle)) * dist * 0.7;
    const rot = (Math.random() - 0.5) * 720;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.animationDelay = (Math.random() * 120) + 'ms';
    $sparkles.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

function pointLabel(p) { return p === 'AD' ? 'AD' : ['0','15','30','40'][p]; }
function scoreCall() {
  const { A, B } = state.points;
  if (A === 3 && B === 3) return 'deuce';
  if (A === 'AD') return 'advantage a';
  if (B === 'AD') return 'advantage b';
  return `${pointLabel(A)}–${pointLabel(B)}`;
}

// Set a scoreboard number and give it a quick pop when it changes.
function setScoreNum(el, v) {
  const s = String(v);
  if (el.textContent === s) return;
  el.textContent = s;
  el.classList.remove('pop'); void el.offsetWidth;
  el.classList.add('pop');
}

function refreshScore() {
  setScoreNum($gamesA, state.games.A);
  setScoreNum($gamesB, state.games.B);
  setScoreNum($pointA, pointLabel(state.points.A));
  setScoreNum($pointB, pointLabel(state.points.B));
  $call.textContent = scoreCall();
  $colA.classList.toggle('serving', state.server === 'A');
  $colB.classList.toggle('serving', state.server === 'B');
  const r = state.rally;
  let streakClass = '';
  let flame = '';
  const FLAME = '<svg width="11" height="14" viewBox="0 0 11 14" aria-hidden="true"><path d="M5.5 1 C7 3.4 9.6 4.9 9.6 8.2 C9.6 11.2 7.7 13 5.5 13 C3.3 13 1.4 11.2 1.4 8.2 C1.4 6.3 2.4 5.2 3.2 4.1 C3.6 5.7 4.5 6.3 4.9 5.9 C5.3 5.3 4.8 3.3 5.5 1 Z" fill="#ff9663" stroke="#a5471d" stroke-width="1"/></svg>';
  const SPARK = '<svg width="11" height="11" viewBox="0 0 11 11" aria-hidden="true"><path d="M5.5 0 L6.7 4.3 L11 5.5 L6.7 6.7 L5.5 11 L4.3 6.7 L0 5.5 L4.3 4.3 Z" fill="#f4c95d" stroke="#c88c00" stroke-width=".7"/></svg>';
  if (r >= 6)      { streakClass = 'streak-3'; flame = `<span class="streak-flame">${FLAME}${FLAME}</span>`; }
  else if (r >= 4) { streakClass = 'streak-2'; flame = `<span class="streak-flame">${FLAME}</span>`; }
  else if (r >= 3) { streakClass = 'streak-1'; flame = `<span class="streak-flame">${SPARK}</span>`; }
  $rally.className = streakClass;
  $rally.innerHTML = `rally ${r}${flame ? ' ' + flame : ''}`;
}

function setPrompt(text, hidden = false) {
  $prompt.textContent = text;
  $prompt.classList.toggle('hidden', hidden);
}

function popGesture(text, color) {
  $gest.textContent = text;
  $gest.style.color = color || 'var(--hot)';
  $gest.classList.remove('pop'); void $gest.offsetWidth;
  $gest.classList.add('pop');
  setTimeout(() => $gest.classList.remove('pop'), 420);
  document.body.classList.add('has-gestured');
}

function popBanner(main, sub, kind) {
  $banner.className = '';
  if (kind) $banner.classList.add(kind);
  $banner.innerHTML = `${main}${sub ? `<span class="sub">${sub}</span>` : ''}`;
  void $banner.offsetWidth;
  $banner.classList.add('pop');
  setTimeout(() => $banner.classList.remove('pop'), 1400);
}

function fireHitConfirm(worldPos, power) {
  const p = worldPos.clone().project(camera);
  const px = (p.x *  0.5 + 0.5) * innerWidth;
  const py = (p.y * -0.5 + 0.5) * innerHeight;
  $conf.style.setProperty('--hit-x', px + 'px');
  $conf.style.setProperty('--hit-y', py + 'px');
  $conf.style.setProperty('--hit-power', power.toFixed(2));
  $conf.classList.remove('active'); void $conf.offsetWidth;
  $conf.classList.add('active');
}

function shakeCamera(power) {
  state.camShake.until = performance.now() + 260;
  state.camShake.amp = 0.06 + 0.18 * power;
}

// ═══════════════════════ Ball flight ═══════════════════════
function baselineZFor(player) { return player === 'A' ? BASE_Z_A : BASE_Z_B; }
function otherPlayer(p) { return p === 'A' ? 'B' : 'A'; }
function mascotPos(player) { return player === 'A' ? soupA.position : soupB.position; }

function launchArc(from, to, flightMs) {
  const t = flightMs / 1000;
  const dx = to.x - from.x;
  const dz = to.z - from.z;
  const dy = to.y - from.y;
  ball.position.copy(from);
  const vx = dx / t;
  const vz = dz / t;
  const vy = (dy + 0.5 * G_ACCEL * t * t) / t;
  state.ballVel.set(vx, vy, vz);
  state.mode = 'in_flight';
  state.arriveTime = performance.now() + flightMs;
  state.hittableEnd = state.arriveTime + HITTABLE_LATE_MS;
  state.hittableStart = state.arriveTime - (HITTABLE_MS - HITTABLE_LATE_MS);
  clearTrail();
}

function pinBallToServer() {
  const mp = mascotPos(state.server);
  // Slight offset in from the baseline + upward hold
  const zOffset = state.server === 'A' ? -0.3 : 0.3;
  ball.position.set(mp.x + 0.35, 1.3, mp.z + zOffset);
  clearTrail();
}

function startServe() {
  state.mode = 'serve_wait';
  state.headingTo = state.server;   // ball is with server; they'll launch to the other
  pinBallToServer();
  const label = state.server === 'A' ? 'player a' : 'player b';
  setPrompt(`${label} — swing to serve!`);
  // CPU serves automatically after a beat.
  if (!state.pvp && state.cpuControls === state.server) {
    setTimeout(() => {
      if (state.mode === 'serve_wait') cpuSwing();
    }, 900);
  }
}

// swinger = 'A' | 'B', with input power/roll.
// Called both from serve and from mid-rally return. Ball flips to the other side.
function processHit(swinger, power, roll) {
  const target = otherPlayer(swinger);
  const from = ball.position.clone();
  const aim = THREE.MathUtils.clamp(roll / 45, -1, 1);
  const targetX = aim * (halfW - 0.6);
  // Land ball a bit inside opponent's baseline, deeper on higher power.
  const baseZ = baselineZFor(target);
  const dir = target === 'B' ? -1 : +1;   // deeper into B = more negative z
  const targetZ = baseZ - dir * (1.2 + (1 - power) * 2.5);
  const to = new THREE.Vector3(targetX, 1.0, targetZ);
  const flight = 1100 - power * 400;
  launchArc(from, to, flight);
  state.headingTo = target;
  fireHitConfirm(from, power);
  shakeCamera(power * 0.7);
  anim[swinger].swingStart = performance.now();
}

function cpuSwing() {
  // Straightforward CPU: 85% return rate, random aim.
  const returns = state.mode === 'serve_wait' ? true : Math.random() < 0.85;
  const cpu = state.cpuControls;
  if (returns) {
    const power = 0.5 + Math.random() * 0.4;
    const roll = (Math.random() - 0.5) * 60;
    processHit(cpu, power, roll);
  } else {
    anim[cpu].missStart = performance.now();
    awardPoint(otherPlayer(cpu), `${cpu.toLowerCase()} missed`);
  }
}

// ═══════════════════════ Scoring ═══════════════════════
function awardPoint(winner, subtitle) {
  if (state.mode === 'point_end' || state.mode === 'game_end') return;
  state.mode = 'point_end';
  const loser = otherPlayer(winner);
  const w = state.points[winner];
  const l = state.points[loser];

  let gameWon = false;
  if (w === 'AD') {
    gameWon = true;
  } else if (l === 'AD') {
    // Back to deuce
    state.points = { A: 3, B: 3 };
  } else if (w < 3) {
    state.points[winner] = w + 1;
  } else {
    // winner is at 40
    if (l < 3) gameWon = true;
    else state.points[winner] = 'AD';   // deuce → advantage
  }

  const cx = innerWidth * 0.5;
  const cy = innerHeight * 0.42;
  sparkleShower(cx, cy, 22);
  anim[winner].hopStart = performance.now();

  const bannerKind = winner === 'A' ? '' : 'b';
  const winnerName = winner === 'A' ? 'player a' : 'player b';

  if (gameWon) {
    state.games[winner] += 1;
    state.points = { A: 0, B: 0 };
    const setWon = state.games[winner] >= SET_TARGET;
    if (setWon) {
      state.mode = 'game_end';
      popBanner(`${winnerName} wins the set!`,
                `${state.games.A}–${state.games.B}`, bannerKind);
      refreshScore();
      setTimeout(() => {
        state.games = { A: 0, B: 0 };
        state.server = winner === 'A' ? 'B' : 'A';
        refreshScore();
        startServe();
      }, 3200);
      return;
    }
    popBanner(`game — ${winnerName}`,
              `games ${state.games.A}–${state.games.B}`, bannerKind);
    // Alternate serve on each new game.
    state.server = otherPlayer(state.server);
  } else {
    popBanner(subtitle || `point — ${winnerName}`, scoreCall(), bannerKind);
  }
  state.rally = 0;
  refreshScore();
  setTimeout(startServe, 1600);
}

// ═══════════════════════ Physics tick ═══════════════════════
function updateBall(dt) {
  if (state.mode !== 'in_flight') return;
  state.ballVel.y -= G_ACCEL * dt;
  ball.position.addScaledVector(state.ballVel, dt);
  ball.rotation.x += 6 * dt;
  pushTrail(ball.position);
  ballShadow.position.x = ball.position.x;
  ballShadow.position.z = ball.position.z;
  const s = THREE.MathUtils.clamp(1.0 - ball.position.y * 0.3, 0.2, 1.0);
  ballShadow.scale.setScalar(s);
  ballShadow.material.opacity = 0.28 * s;

  if (ball.position.y <= 0.11 && state.ballVel.y < 0) {
    ball.position.y = 0.11;
    state.ballVel.y = -state.ballVel.y * 0.55;
    state.ballVel.x *= 0.9;
    state.ballVel.z *= 0.9;
  }

  const now = performance.now();
  const target = state.headingTo;
  const hitter = otherPlayer(target);

  // Sideways out of play → hitter's shot was bad → point to target.
  if (Math.abs(ball.position.x) > halfW + 0.9) {
    awardPoint(target, `${hitter.toLowerCase()} sent it wide`);
    return;
  }
  // Past target's baseline OR swing window expired → target failed to
  // return a legit shot → hitter's point. (No bounce tracking; if the ball
  // landed in bounds and bounced past, we still count it as missed.)
  const baseZ = baselineZFor(target);
  const past = target === 'A' ? (ball.position.z > baseZ + 1.2)
                              : (ball.position.z < baseZ - 1.2);
  if (past || now > state.hittableEnd + 250) {
    awardPoint(hitter, `${target.toLowerCase()} missed`);
    return;
  }

  // If CPU controls the receiver, decide their return around arrival time.
  if (!state.pvp && state.cpuControls === target && now >= state.arriveTime - 30) {
    // Consume this in-flight so the next tick doesn't re-fire.
    state.mode = 'idle';
    state.rally++;
    refreshScore();
    setTimeout(cpuSwing, 180);
  }
}

// ═══════════════════════ Swing detector (per-arm) ═══════════════════════
// Constants tuned from live logs (see previous single-player revision).
// The state machine itself is unchanged; we just clone the state per armId
// so two wristbands can be running through the same detector concurrently.
const GYRO_ARM_DPS   = 200;
const GYRO_QUIET_DPS = 90;
const QUIET_MS       = 40;
const MAX_ACTIVE_MS  = 260;
const REFRACTORY_MS  = 400;
const POST_PEAK_DROP = 0.55;
const POST_PEAK_MIN  = 25;
const ACCEL_MIN      = 15;
const ACCEL_MAX      = 100;
const MIN_PEAK_ACC   = 22;
// Sign of yaw rate (gz) at peak → forehand vs backhand. Flip to swap.
const FOREHAND_YAW_SIGN = +1;

function newSwingState() {
  return {
    phase: 'IDLE',
    startedAt: 0,
    refractoryUntil: 0,
    peakAccel: 0,
    peakGyro: 0,
    rollAtPeak: 0,
    yawSignAtPeak: 0,
    lastAboveT: 0,
  };
}
const swingByArm = new Map();
function swingFor(armId) {
  let s = swingByArm.get(armId);
  if (!s) { s = newSwingState(); swingByArm.set(armId, s); }
  return s;
}

function fireSwing(armId, sw) {
  if (sw.peakAccel < MIN_PEAK_ACC) {
    sw.phase = 'REFRACTORY';
    sw.refractoryUntil = performance.now() + REFRACTORY_MS;
    return;
  }
  const power = THREE.MathUtils.clamp(
    (sw.peakAccel - ACCEL_MIN) / (ACCEL_MAX - ACCEL_MIN), 0.15, 1.0);
  const roll = sw.rollAtPeak;
  const yawSign = sw.yawSignAtPeak || FOREHAND_YAW_SIGN;
  const isForehand = yawSign === FOREHAND_YAW_SIGN;
  // Route to player via pairing. If unpaired, fall back: arm 0 → A, arm 1 → B.
  const paired = pairing.playerForArm(armId);
  const player = paired || (armId === 1 ? 'B' : 'A');
  logTune('swing', {
    peakGyro: sw.peakGyro, peakAccel: sw.peakAccel,
    roll, power, forehand: isForehand ? 'F' : 'B',
    yawSign, arm: armId, player,
  });
  handleSwing(player, { power, roll, forehand: isForehand });
  sw.phase = 'REFRACTORY';
  sw.refractoryUntil = performance.now() + REFRACTORY_MS;
}

function onRawSample(armId, s) {
  const sw = swingFor(armId);
  const now = performance.now();
  if (sw.phase === 'REFRACTORY') {
    if (now >= sw.refractoryUntil) {
      // reset in place
      const fresh = newSwingState();
      Object.assign(sw, fresh);
    } else return;
  }
  const accelMag = Math.hypot(s.ax, s.ay, s.az);
  const dynA = Math.abs(accelMag - 9.8);
  const gyroMag = Math.hypot(s.gx, s.gy, s.gz);

  if (sw.phase === 'IDLE') {
    if (gyroMag > GYRO_ARM_DPS) {
      sw.phase = 'ACTIVE';
      sw.startedAt = now;
      sw.peakAccel = dynA;
      sw.peakGyro = gyroMag;
      sw.rollAtPeak = s.roll;
      sw.yawSignAtPeak = Math.sign(s.gz || 0);
      sw.lastAboveT = now;
    }
    return;
  }

  if (dynA > sw.peakAccel) {
    sw.peakAccel = dynA;
    sw.rollAtPeak = s.roll;
    sw.yawSignAtPeak = Math.sign(s.gz || sw.yawSignAtPeak);
  }
  if (gyroMag > sw.peakGyro) sw.peakGyro = gyroMag;
  if (gyroMag > GYRO_QUIET_DPS) sw.lastAboveT = now;

  const quietFor = now - sw.lastAboveT;
  const activeFor = now - sw.startedAt;
  const postPeakFire = sw.peakAccel >= POST_PEAK_MIN
                    && dynA < sw.peakAccel * POST_PEAK_DROP;

  if (postPeakFire || activeFor > MAX_ACTIVE_MS || quietFor > QUIET_MS) {
    if (sw.peakAccel > ACCEL_MIN * 0.4) fireSwing(armId, sw);
    else {
      sw.phase = 'REFRACTORY';
      sw.refractoryUntil = now + REFRACTORY_MS;
    }
  }
}

// ═══════════════════════ Swing → game event ═══════════════════════
function handleSwing(player, { power, roll, forehand }) {
  const now = performance.now();

  // Serve: only the current server's swing launches the ball.
  if (state.mode === 'serve_wait') {
    if (player !== state.server) return;
    popGesture(`serve ${Math.round(power*100)}`, '#ff9663');
    sfx.serve(power);
    processHit(player, power, roll);
    return;
  }

  // Return: only the swing of the player the ball is heading to counts.
  if (state.mode === 'in_flight') {
    if (player !== state.headingTo) return;   // spectator-side swings ignored
    const inWindow = now >= state.hittableStart && now <= state.hittableEnd;
    if (inWindow) {
      state.rally++;
      refreshScore();
      popGesture(`${forehand ? 'forehand' : 'backhand'} ${Math.round(power*100)}`,
                 forehand ? '#ff9663' : '#37628a');
      sfx.rally(power);
      processHit(player, power, roll);
    } else {
      popGesture('miss', '#f4c95d');
      anim[player].missStart = performance.now();
      awardPoint(otherPlayer(player), `${player.toLowerCase()} whiffed`);
    }
    return;
  }
}

// ═══════════════════════ Main tick ═══════════════════════
let lastT = performance.now();
function tick() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  updateBall(dt);

  // If ball is pinned to server, keep it glued to the server mascot.
  if (state.mode === 'serve_wait') {
    const mp = mascotPos(state.server);
    const zOffset = state.server === 'A' ? -0.3 : 0.3;
    ball.position.set(mp.x + 0.35, 1.3, mp.z + zOffset);
    ballShadow.position.x = ball.position.x;
    ballShadow.position.z = ball.position.z;
  }

  // Mascots track the ball's x when it's coming to them.
  if (state.mode === 'in_flight') {
    const target = state.headingTo;
    const tGroup = target === 'A' ? soupA : soupB;
    const tx = THREE.MathUtils.clamp(ball.position.x, -halfW + 0.5, halfW - 0.5);
    tGroup.position.x += (tx - tGroup.position.x) * 3 * dt;
    const other = target === 'A' ? soupB : soupA;
    other.position.x += (0 - other.position.x) * 1.5 * dt;
  }

  // ── Mascot procedural anim (per player) ──
  for (const p of ['A', 'B']) {
    const m = mascot[p].mesh;
    if (!m) continue;
    const a = anim[p];
    const t = now / 1000 + (p === 'A' ? 0 : 0.5);

    let hop = 0;
    if (a.hopStart) {
      const dth = now - a.hopStart;
      if (dth > 480) a.hopStart = 0;
      else hop = Math.sin((dth / 480) * Math.PI) * 0.35;
    }
    const bob = Math.sin(t * 2) * 0.02;
    m.position.y = bob + hop;
    const breathe = 1 + Math.sin(t * 2) * 0.02;
    m.scale.set(MASCOT_SCALE, MASCOT_SCALE, MASCOT_SCALE * breathe);

    // swing lean + paws
    let swingLean = 0;
    if (a.swingStart) {
      const dt2 = now - a.swingStart;
      if (dt2 > 320) {
        a.swingStart = 0;
        if (mascot[p].paws) mascot[p].paws.rotation.set(0, 0, 0);
      } else {
        const phase = dt2 / 320;
        if (mascot[p].paws) mascot[p].paws.rotation.z = Math.sin(phase * Math.PI) * 0.9;
        swingLean = Math.sin(phase * Math.PI) * 0.28;
      }
    }
    // miss lean
    let missLean = 0;
    if (a.missStart) {
      const dt2 = now - a.missStart;
      if (dt2 > 500) a.missStart = 0;
      else {
        const phase = dt2 / 500;
        missLean = phase < 0.35
          ? (phase / 0.35) * 0.55
          : (1 - (phase - 0.35) / 0.65) * 0.55;
      }
    }
    m.rotation.z = swingLean + missLean;
    // preserve the base rotation.x (from load) and player-specific y flip.
    // We only ever mutate .z here.
  }

  // Cloud drift
  for (const c of clouds) {
    c.position.x += c.userData.driftSpeed * dt;
    if (c.position.x > 40) c.position.x = -40;
  }

  // Camera shake
  const shake = state.camShake.until > now ? (state.camShake.until - now) / 260 : 0;
  camera.position.x = camHome.x + (Math.random() - 0.5) * state.camShake.amp * shake;
  camera.position.y = camHome.y + (Math.random() - 0.5) * state.camShake.amp * shake * 0.7;
  camera.lookAt(camLook);

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ═══════════════════════ Serial wire-up ═══════════════════════
const $tuneLog = document.getElementById('tune-log');
const $tuneCount = document.getElementById('tune-log-count');
let tuneRows = 0;
function logTune(kind, f) {
  if (!$tuneLog) return;
  const pad = (v, w=5, p=1) => (typeof v === 'number' ? v.toFixed(p) : String(v)).padStart(w);
  const yawStr = (typeof f.yawSign === 'number') ? (f.yawSign > 0 ? '+' : (f.yawSign < 0 ? '-' : '0')) : ' ';
  const row = `${kind.padEnd(6)} arm=${f.arm} p=${f.player} pkGyro=${pad(f.peakGyro,5,0)} pkAcc=${pad(f.peakAccel,5,1)} roll=${pad(f.roll,6,1)} pwr=${pad(f.power,4,2)} yaw=${yawStr} side=${f.forehand}\n`;
  $tuneLog.value += row;
  $tuneLog.scrollTop = $tuneLog.scrollHeight;
  tuneRows++;
  if ($tuneCount) $tuneCount.textContent = `${tuneRows} row${tuneRows === 1 ? '' : 's'}`;
}
document.getElementById('tune-log-copy')?.addEventListener('click', async () => {
  if (!$tuneLog?.value) return;
  try { await navigator.clipboard.writeText($tuneLog.value); }
  catch { $tuneLog.select(); document.execCommand('copy'); }
});
document.getElementById('tune-log-clear')?.addEventListener('click', () => {
  if ($tuneLog) $tuneLog.value = '';
  tuneRows = 0;
  if ($tuneCount) $tuneCount.textContent = '0 rows';
});

// Feed each serial line through both pairing (for slot assignment) and our
// custom parser (for the swing detector). Canonical pattern from boxing.html.
const dispatcher = new ArmDispatcher(() => {});
const origOnLine = dispatcher.onLine.bind(dispatcher);
dispatcher.onLine = (line) => {
  origOnLine(line);
  if (!line || line[0] === '#' || line.startsWith('ERR')) return;
  const parts = line.split(',');
  let armId = 0, offset = 0;
  if (parts.length === 10) { armId = +parts[0]; offset = 1; }
  else if (parts.length !== 9) return;
  const s = {
    t_us: +parts[offset],
    ax: +parts[offset + 1], ay: +parts[offset + 2], az: +parts[offset + 3],
    gx: +parts[offset + 4], gy: +parts[offset + 5], gz: +parts[offset + 6],
    roll: +parts[offset + 7], pitch: +parts[offset + 8],
  };
  if (!Number.isNaN(s.ax)) onRawSample(armId, s);
};

const serialHandlers = {
  baud: 115200,
  onLine: (line) => { pairing.onLine(line); dispatcher.onLine(line); },
  onOpen:  () => { $stat.textContent = 'hub connected';
                   $stat.classList.add('connected');
                   if (state.mode === 'idle') startServe(); },
  onClose: () => { $stat.textContent = 'hub disconnected';
                   $stat.classList.remove('connected'); },
  onError: () => { $stat.textContent = 'hub error, try again';
                    $stat.classList.remove('connected'); },
};
document.getElementById('connect').addEventListener('click', async () => {
  try {
    $stat.textContent = 'choosing port…';
    await openSerial(serialHandlers);
  } catch (e) { $stat.textContent = 'connect hub'; }
});
autoOpenSerial(serialHandlers).catch(() => {});

// ═══════════════════════ Dev shortcuts ═══════════════════════
// SPACE: swing on behalf of whoever's supposed to swing right now.
// Serve → the server; in-flight return → the receiver (state.headingTo).
addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    const player = state.mode === 'serve_wait' ? state.server
                 : state.mode === 'in_flight'  ? state.headingTo
                 : null;
    if (!player) return;
    handleSwing(player, {
      power: 0.6 + Math.random() * 0.35,
      roll:  (Math.random() - 0.5) * 30,
      forehand: true,
    });
  }
});

// ═══════════════════════ Kick off ═══════════════════════
refreshScore();
clearTrail();
// Don't launch a rally until the hub connects (so the server prompt reflects
// pairing). In single-player fallback we still start immediately.
if (state.pvp === false && pairing.armForPlayer('A') === null &&
    pairing.armForPlayer('B') === null) {
  // No wristbands paired yet. Start anyway; SPACE-key works.
  startServe();
} else {
  startServe();
}
</script>
