<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soup Games — Tennis</title>
<style>
  /* ── Soup Games palette (from index.html) ── */
  :root {
    --sky-top:    #7bd3ee;
    --sky-mid:    #4fc0e3;
    --sky-deep:   #2a95c4;
    --water:      #37a7d0;
    --cream:      #fbf3e0;
    --cream-warm: #f6e9c9;
    --cream-deep: #ecdcb1;
    --ruin-blue:  #37628a;
    --ruin-teal:  #2f8fa3;
    --vine:       #6cb85a;
    --vine-deep:  #4a9440;
    --ink:        #1c2a3a;
    --ink-soft:   #476278;
    --hot:        #ff9663;
    --gold:       #f4c95d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
               font-family: "Fredoka", "Nunito", -apple-system,
                            "SF Pro Rounded", "SF Pro Display", system-ui,
                            sans-serif;
               color: var(--ink);
               background: linear-gradient(180deg,
                            var(--sky-top) 0%,
                            var(--sky-mid) 45%,
                            var(--sky-deep) 78%,
                            var(--water) 100%); }
  canvas { display:block; }

  /* ── Score HUD ── */
  #hud { position:absolute; top:14px; left:0; right:0; text-align:center;
         pointer-events:none; z-index:100; }
  @media (max-width: 640px) { #hud { top: 64px; } }
  #score { display:inline-flex; align-items:center; gap:12px;
           padding:8px 22px; background: var(--cream);
           border: 3px solid var(--ink); border-radius: 16px;
           box-shadow: 0 4px 0 var(--ink);
           font-size:30px; font-weight:900; letter-spacing:-.02em; }
  #score .you  { color: var(--hot);
                 text-shadow: 0 3px 0 #a5471d; }
  #score .cpu  { color: var(--ruin-blue);
                 text-shadow: 0 3px 0 #1c3350; }
  #score .dash { color: var(--ink-soft); font-weight: 800; }
  #rally-wrap { margin-top:16px; display:flex; justify-content:center; }
  #rally { display:inline-flex; align-items:center; gap:6px;
           padding:6px 16px; background: rgba(255,255,255,.85);
           border-radius: 999px;
           font-size:11px; letter-spacing:.28em; text-transform:uppercase;
           color: var(--ink); font-weight: 800;
           border: 2px solid rgba(28,42,58,.12);
           box-shadow: 0 3px 0 rgba(0,0,0,.08);
           transition: background 240ms, color 240ms, transform 200ms,
                       box-shadow 240ms, border-color 240ms; }
  #rally.streak-1 { background: #fff2d6; border-color: rgba(244,201,93,.55);
                    box-shadow: 0 3px 0 rgba(244,201,93,.35); }
  #rally.streak-2 { background: #ffe3b8; color: #7a4a12;
                    border-color: rgba(255,150,99,.65);
                    box-shadow: 0 3px 0 rgba(255,150,99,.45); }
  #rally.streak-3 { background: linear-gradient(180deg,#ffce7a,#ff9663);
                    color: #fff; border-color: #a5471d;
                    box-shadow: 0 4px 0 #a5471d, 0 0 22px rgba(255,150,99,.65);
                    transform: scale(1.05); }
  #rally .streak-flame { font-size: 14px; letter-spacing:0;
                        display:inline-block; transform-origin: 50% 80%;
                        animation: flame-flicker 480ms ease-in-out infinite alternate;
                        filter: drop-shadow(0 0 6px rgba(255,150,99,.7)); }
  @keyframes flame-flicker {
    0%   { transform: scale(1) rotate(-3deg); }
    100% { transform: scale(1.15) rotate(4deg); }
  }

  /* ── Gesture tutorial diagram (idle hint, wordless) ── */
  #tutorial { position:absolute; left:50%; bottom:126px;
              transform: translate(-50%,0);
              display:flex; flex-direction:column; align-items:center;
              pointer-events:none; z-index:94;
              opacity:0; transition: opacity 320ms;
              filter: drop-shadow(0 3px 0 rgba(28,42,58,.25)); }
  #tutorial.show { opacity: 1; }
  #tutorial .swing-scene { position:relative; width:150px; height:56px; }
  #tutorial .arm {
    position:absolute; left:12px; top:34px;
    width:64px; height:10px; border-radius:6px;
    background: linear-gradient(90deg, var(--hot), #ffbf94);
    border: 2px solid var(--ink);
    transform-origin: 6px 6px;
    animation: swing-arm 1600ms ease-in-out infinite;
  }
  #tutorial .ball {
    position:absolute; left:74px; top:24px;
    width:16px; height:16px; border-radius:50%;
    background:#d7e75a; border:2px solid var(--ink);
    transform-origin: -60px 10px;
    animation: swing-ball 1600ms ease-in-out infinite;
  }
  @keyframes swing-arm {
    0%   { transform: rotate(-42deg); }
    38%  { transform: rotate(-42deg); }
    55%  { transform: rotate(38deg); }
    72%  { transform: rotate(38deg); }
    100% { transform: rotate(-42deg); }
  }
  @keyframes swing-ball {
    0%   { transform: rotate(-42deg) translate(0,0); opacity:.9; }
    38%  { transform: rotate(-42deg) translate(0,0); opacity:1; }
    55%  { transform: rotate(38deg)  translate(28px,-4px); opacity:.7; }
    72%  { transform: rotate(38deg)  translate(28px,-4px); opacity:0; }
    100% { transform: rotate(-42deg) translate(0,0); opacity:.9; }
  }

  /* ── Point sparkle shower ── */
  #sparkles { position:absolute; inset:0; overflow:hidden;
              pointer-events:none; z-index:93; }
  .spark { position:absolute; width:16px; height:16px;
           background: var(--gold);
           clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
           animation: spark-fall 900ms ease-out forwards;
           filter: drop-shadow(0 2px 0 rgba(28,42,58,.35)); }
  @keyframes spark-fall {
    0%   { opacity:0; transform: translate(0,0) rotate(0deg) scale(.3); }
    25%  { opacity:1; }
    100% { opacity:0;
           transform: translate(var(--dx,0), var(--dy,140px))
                      rotate(var(--rot,320deg)) scale(1); }
  }

  /* ── Serve / status prompt ── */
  #prompt { position:absolute; bottom:60px; left:50%;
            transform:translateX(-50%);
            padding:11px 22px; background: var(--cream);
            border: 3px solid var(--ink); border-radius: 999px;
            box-shadow: 0 3px 0 var(--ink);
            font-weight:700; letter-spacing:.01em;
            font-size:13px; text-align:center; z-index:100;
            color: var(--ink); white-space:nowrap;
            transition: opacity 220ms; }
  #prompt.hidden { opacity: 0; }

  /* ── Center gesture flash ── */
  #gesture { position:absolute; top:38%; left:50%;
             transform:translate(-50%,-50%) scale(1);
             font-size:64px; font-weight:900; letter-spacing:-.02em;
             text-shadow:0 5px 0 var(--ink), 0 8px 24px rgba(28,42,58,.4);
             opacity:0; transition:opacity 90ms, transform 140ms;
             pointer-events:none; z-index:95; color: var(--hot); }
  #gesture.pop { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  @media (max-width: 640px) { #gesture { font-size:42px; } }

  /* ── Hit confirm ── */
  .hit-confirm { position:absolute; inset:0;
                 pointer-events:none; z-index:91; overflow:hidden; }
  .hit-confirm .burst, .hit-confirm .ring {
    position:absolute; left:var(--hit-x, 50%); top:var(--hit-y, 50%);
    opacity:0; will-change:transform, opacity;
  }
  .hit-confirm .burst {
    width:  calc(120px + 260px * var(--hit-power, .4));
    height: calc(120px + 260px * var(--hit-power, .4));
    margin-left: calc(-1 * (120px + 260px * var(--hit-power, .4)) / 2);
    margin-top:  calc(-1 * (120px + 260px * var(--hit-power, .4)) / 2);
    border-radius:50%;
    background: radial-gradient(circle,
      rgba(255,243,224,.95) 0%,
      rgba(244,201,93,.75) 30%,
      rgba(255,150,99,.4) 60%,
      rgba(255,150,99,0) 75%);
    mix-blend-mode:screen; filter:blur(2px);
  }
  .hit-confirm .ring {
    width:  calc(90px + 320px * var(--hit-power, .4));
    height: calc(90px + 320px * var(--hit-power, .4));
    margin-left: calc(-1 * (90px + 320px * var(--hit-power, .4)) / 2);
    margin-top:  calc(-1 * (90px + 320px * var(--hit-power, .4)) / 2);
    border-radius:50%;
    border: calc(3px + 5px * var(--hit-power, .4)) solid rgba(255,220,130,.85);
    mix-blend-mode:screen;
  }
  .hit-confirm.active .burst  { animation: burst 440ms ease-out forwards; }
  .hit-confirm.active .ring   { animation: ring  520ms ease-out forwards; }
  @keyframes burst {
    0%   { opacity:0; transform:scale(.3); }
    30%  { opacity:1; transform:scale(1.05); }
    100% { opacity:0; transform:scale(1.3); }
  }
  @keyframes ring {
    0%   { opacity:0; transform:scale(.4); }
    25%  { opacity:1; }
    100% { opacity:0; transform:scale(1.7); }
  }

  /* ── Point banner (POINT / OUT / GAME) ── */
  #banner { position:absolute; top:42%; left:50%;
            transform:translate(-50%,-50%) scale(1);
            font-size:88px; font-weight:900; letter-spacing:-.03em;
            text-transform:uppercase; opacity:0;
            text-shadow:0 6px 0 var(--ink), 0 10px 32px rgba(28,42,58,.4);
            transition:opacity 120ms, transform 200ms; pointer-events:none;
            color: var(--hot); z-index:96; }
  #banner.pop { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  #banner.cpu { color: var(--ruin-blue); }
  #banner.miss{ color: var(--gold); }

  /* ── Soup Games chrome (shared treatment across pages) ── */
  .ss-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--cream); color: var(--ink);
    border: 3px solid var(--ink); border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: .01em; text-decoration: none; cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 120ms cubic-bezier(.3,.7,.3,1), box-shadow 120ms;
  }
  .ss-btn:hover { transform: translateY(-2px); background: var(--cream-warm);
                  box-shadow: 0 5px 0 var(--ink); }
  .ss-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--ink); }

  #back { position:absolute; top:16px; left:16px; z-index:120; }
  #connect { position:absolute; top:16px; right:16px; z-index:120; }
  #connect::before {
    content: ""; width: 9px; height: 9px; border-radius: 50%; flex-shrink:0;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
    animation: hubpulse 1.8s ease-in-out infinite;
  }
  #connect.connected::before {
    background: var(--vine); box-shadow: 0 0 8px var(--vine);
    animation: none;
  }
  @keyframes hubpulse { 50% { opacity: 0.35; transform: scale(0.85); } }

  #devhint { position:absolute; bottom:12px; right:16px; z-index:60;
             font-size:10px; letter-spacing:.04em; color:var(--ink);
             opacity:.45; font-weight:600; pointer-events:none; }
  @media (max-width: 640px) { #devhint { display:none; } }

  /* Tune log */
  #tune-log-wrap { position:absolute; top:16px; left:120px; z-index:131;
                   display:flex; flex-direction:column; gap:6px; max-width:44vw; }
  #tune-log-controls { display:flex; gap:6px; align-items:center; }
  #tune-log-controls button {
    padding:6px 12px; border-radius:8px;
    background:var(--cream); color:var(--ink);
    border:2px solid var(--ink); box-shadow:0 2px 0 var(--ink);
    font:inherit; font-size:11px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; cursor:pointer;
  }
  #tune-log-controls button:hover { background:var(--cream-warm); }
  #tune-log-controls #tune-log-count {
    font-family:ui-monospace,Menlo,monospace; font-size:11px;
    color:var(--cream); background:rgba(28,42,58,.65);
    padding:4px 10px; border-radius:999px;
  }
  #tune-log {
    width:100%; height:220px; padding:10px 12px;
    background:rgba(28,42,58,.85); color:#f7f3e6;
    border:none; border-radius:8px;
    font-family:ui-monospace,Menlo,monospace;
    font-size:11px; line-height:1.5; resize:none;
  }
  @media (max-width: 640px) { #tune-log-wrap { display:none; } }
</style>
</head>
<body>

<div id="hud">
  <div id="score">
    <span class="you">you 0</span><span class="dash">·</span><span class="cpu">soup 0</span>
  </div>
  <div id="rally-wrap"><span id="rally">rally 0</span></div>
</div>

<div id="tutorial">
  <div class="swing-scene">
    <div class="arm"></div>
    <div class="ball"></div>
  </div>
</div>

<div id="sparkles"></div>
<div id="prompt">give it a swing to serve</div>
<div id="gesture"></div>
<div id="banner"></div>
<div class="hit-confirm" id="hit-confirm">
  <div class="burst"></div>
  <div class="ring"></div>
</div>

<div id="devhint">keys · space hit · a miss · n rush</div>
<div id="tune-log-wrap">
  <div id="tune-log-controls">
    <button id="tune-log-copy" type="button">copy</button>
    <button id="tune-log-clear" type="button">clear</button>
    <span id="tune-log-count">0 rows</span>
  </div>
  <textarea id="tune-log" readonly placeholder="each swing logs one row here. throw a bunch, click copy, paste back."></textarea>
</div>
<button id="connect" class="ss-btn">connect hub</button>
<a id="back" class="ss-btn" href="index.html">← menu</a>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { openSerial, autoOpenSerial } from './serial.js';
import { ArmDispatcher } from './dispatch.js';

// ═══════════════════════ Three.js scene ═══════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4fc0e3);   // sky-mid
scene.fog = new THREE.Fog(0x4fc0e3, 24, 70);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 200);
const camHome = new THREE.Vector3(0, 3.4, 12.5);
camera.position.copy(camHome);
camera.lookAt(0, 0.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Lights
scene.add(new THREE.AmbientLight(0xcfe6f2, 0.75));
const key = new THREE.DirectionalLight(0xfff2d0, 1.05);
key.position.set(5, 12, 6);
scene.add(key);
const rim = new THREE.DirectionalLight(0x99ccee, 0.45);
rim.position.set(-4, 6, -6);
scene.add(rim);

// ── Court dimensions ──
const COURT_W = 8.0;
const COURT_L = 22.0;
const HALF_L  = COURT_L / 2;

// Cream court plane
const court = new THREE.Mesh(
  new THREE.PlaneGeometry(COURT_W + 3.0, COURT_L + 4.0),
  new THREE.MeshStandardMaterial({ color: 0xebd9a8, roughness: 0.9 })
);
court.rotation.x = -Math.PI/2;
court.position.y = 0;
scene.add(court);

// Outer water surround
const outer = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshStandardMaterial({ color: 0x37a7d0, roughness: 0.95 })
);
outer.rotation.x = -Math.PI/2;
outer.position.y = -0.02;
scene.add(outer);

// Court lines helper
function addLine(x1, z1, x2, z2, thickness = 0.08) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.hypot(dx, dz);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(len, thickness),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 })
  );
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set((x1+x2)/2, 0.01, (z1+z2)/2);
  mesh.rotation.z = -Math.atan2(dz, dx);
  scene.add(mesh);
}
const halfW = COURT_W/2;
addLine(-halfW, -HALF_L, -halfW,  HALF_L);
addLine( halfW, -HALF_L,  halfW,  HALF_L);
addLine(-halfW, -HALF_L,  halfW, -HALF_L);
addLine(-halfW,  HALF_L,  halfW,  HALF_L);
addLine(-halfW, -HALF_L/2, halfW, -HALF_L/2);
addLine(-halfW,  HALF_L/2, halfW,  HALF_L/2);
addLine(0, -HALF_L/2, 0, HALF_L/2);

// ── Net (cream w/ ink top) ──
const netGroup = new THREE.Group();
const netMat = new THREE.MeshStandardMaterial({
  color: 0xfbf3e0, roughness: 0.9, transparent: true, opacity: 0.75, side: THREE.DoubleSide });
const net = new THREE.Mesh(new THREE.PlaneGeometry(COURT_W + 1.5, 0.9), netMat);
net.position.set(0, 0.45, 0);
netGroup.add(net);
const netTop = new THREE.Mesh(
  new THREE.BoxGeometry(COURT_W + 1.6, 0.06, 0.06),
  new THREE.MeshStandardMaterial({ color: 0x1c2a3a, roughness: 0.6 })
);
netTop.position.set(0, 0.9, 0);
netGroup.add(netTop);
const postGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.0, 12);
const postMat = new THREE.MeshStandardMaterial({ color: 0x1c2a3a, roughness: 0.7 });
[-1, 1].forEach(s => {
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(s * (COURT_W/2 + 0.75), 0.5, 0);
  netGroup.add(post);
});
scene.add(netGroup);

// ── Clouds ──
const clouds = [];
// Cheerful puffy clouds — unlit white so they never take shadow tones
// and never fade into the fog.
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false });
for (let i = 0; i < 7; i++) {
  const cloud = new THREE.Group();
  const n = 3 + Math.floor(Math.random() * 3);
  for (let j = 0; j < n; j++) {
    const r = 0.9 + Math.random() * 0.9;
    const s = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 8), cloudMat);
    s.position.set((j - n/2) * 1.1, Math.random() * 0.4, Math.random() * 0.5);
    cloud.add(s);
  }
  cloud.position.set(
    (Math.random() - 0.5) * 60,
    8 + Math.random() * 5,
    -20 - Math.random() * 25
  );
  cloud.userData.driftSpeed = 0.15 + Math.random() * 0.2;
  clouds.push(cloud);
  scene.add(cloud);
}

// ═══════════════════════ CPU opponent (mascot) ═══════════════════════
//
// The GLB loads async. Until it lands, we render a chunky cream placeholder
// so the scene never looks empty and the game logic (which reads cpu.position)
// keeps working. Once the mascot arrives, we swap it into the same Group.

const CPU_SCALE = 0.012;
const cpu = new THREE.Group();
cpu.position.set(0, 0, -HALF_L + 3.5);
scene.add(cpu);

// Cream placeholder — same silhouette-ish shape as soup, sized to match
// the mascot so the framing doesn't shift when the GLB swaps in.
const placeholder = new THREE.Group();
const phBody = new THREE.Mesh(
  new THREE.SphereGeometry(0.55, 20, 16),
  new THREE.MeshStandardMaterial({ color: 0xb8d4e8, roughness: 0.85 })
);
phBody.position.y = 0.55;
placeholder.add(phBody);
const phHead = new THREE.Mesh(
  new THREE.SphereGeometry(0.42, 20, 16),
  new THREE.MeshStandardMaterial({ color: 0xb8d4e8, roughness: 0.85 })
);
phHead.position.y = 1.15;
placeholder.add(phHead);
cpu.add(placeholder);

// Handles for procedural animation. Populated when GLB loads.
let soupMascot = null;
let soupPaws   = null;
let soupBaseY  = 0;

// Swing / miss animation state
const soupAnim = {
  swingStart: 0,   // 0 = not swinging
  missStart:  0,
  hopStart:   0,   // celebratory hop
};
const playerAnim = {
  hopStart: 0,
};

// Player-side soup — dropped below camera, visible if you tilt down.
let playerSoup = null;

const loader = new GLTFLoader();
loader.load('assets/mascot.glb', (gltf) => {
  try {
    // ── CPU mascot ──
    const soup = gltf.scene;
    soup.traverse(o => { if (o.isMesh) o.material = o.material.clone(); });
    soup.scale.setScalar(CPU_SCALE);
    soup.rotation.x = -Math.PI / 2;
    // No y-flip: after the x-flip the mascot faces +Z toward camera/player,
    // which is exactly what a CPU on the far baseline should do.
    // Retint body: soft blue-cream, distinct from player-side hot orange
    // Cool teal-blue tint distinct from player-side hot orange AND sky/court.
    const body = soup.getObjectByName('body');
    if (body) body.material.color.setHex(0x6fb3c8);
    const ears = soup.getObjectByName('ears');
    if (ears) ears.material.color.setHex(0x4d8fa5);
    soupPaws = soup.getObjectByName('paws');

    // Remove placeholder, add mascot
    cpu.remove(placeholder);
    cpu.add(soup);
    soupMascot = soup;
    soupBaseY = 0;

    // ── Player-side soup (out of primary view) ──
    const ps = gltf.scene.clone(true);
    ps.traverse(o => { if (o.isMesh) o.material = o.material.clone(); });
    ps.scale.setScalar(0.008);
    ps.rotation.x = -Math.PI / 2;
    // Faces +Z by default → toward net after clone (no y flip)
    const pBody = ps.getObjectByName('body');
    if (pBody) pBody.material.color.setHex(0xffbfa0);   // warm hot-adjacent
    const pPaws = ps.getObjectByName('paws');
    if (pPaws) pPaws.material.color.setHex(0xffbfa0);
    // Position: on the near baseline, off to the side so camera catches him
    // if the player tilts down. Below primary framing.
    ps.position.set(-1.6, 0, HALF_L - 0.6);
    playerSoup = ps;
    scene.add(ps);
  } catch (err) {
    console.warn('mascot setup failed, keeping placeholder:', err);
  }
}, undefined, (err) => {
  console.warn('mascot.glb load failed — placeholder stays:', err);
});

// ── Ball ──
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.11, 20, 14),
  new THREE.MeshStandardMaterial({
    color: 0xdaff5a, roughness: 0.4,
    emissive: 0x556600, emissiveIntensity: 0.35 })
);
ball.position.set(0, 1.0, 10.5);
scene.add(ball);

const ballShadow = new THREE.Mesh(
  new THREE.CircleGeometry(0.15, 16),
  new THREE.MeshBasicMaterial({ color: 0x1c2a3a, transparent: true, opacity: 0.28 })
);
ballShadow.rotation.x = -Math.PI/2;
ballShadow.position.y = 0.02;
scene.add(ballShadow);

// ── Ball trail: thick + glowy via layered lines + a sprite sparkle trail ──
const TRAIL_LEN = 40;
const trailPositions = new Float32Array(TRAIL_LEN * 3);
const trailGeom = new THREE.BufferGeometry();
trailGeom.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));

// Core bright line (yellow-green)
const trailMatCore = new THREE.LineBasicMaterial({
  color: 0xeaff70, transparent: true, opacity: 0.95,
});
const trail = new THREE.Line(trailGeom, trailMatCore);
scene.add(trail);

// Sprite-based glow trail: growing/shrinking billboards per trail sample.
// Sprite material is unlit, additive, so it reads as a warm ball glow.
const trailSpriteCanvas = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grd.addColorStop(0.00, 'rgba(255,255,220,1)');
  grd.addColorStop(0.35, 'rgba(220,255,90,0.85)');
  grd.addColorStop(0.75, 'rgba(180,220,60,0.25)');
  grd.addColorStop(1.00, 'rgba(180,220,60,0)');
  g.fillStyle = grd; g.fillRect(0, 0, 64, 64);
  return c;
})();
const trailSpriteTex = new THREE.CanvasTexture(trailSpriteCanvas);
const TRAIL_SPRITES = 10;
const trailSprites = [];
for (let i = 0; i < TRAIL_SPRITES; i++) {
  const m = new THREE.SpriteMaterial({
    map: trailSpriteTex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, opacity: 0,
  });
  const s = new THREE.Sprite(m);
  s.scale.setScalar(0.4);
  scene.add(s);
  trailSprites.push(s);
}

const trailBuf = [];
function pushTrail(p) {
  trailBuf.push(p.clone());
  while (trailBuf.length > TRAIL_LEN) trailBuf.shift();
  for (let i = 0; i < TRAIL_LEN; i++) {
    const src = trailBuf[i] || trailBuf[trailBuf.length - 1] || p;
    trailPositions[i*3]   = src.x;
    trailPositions[i*3+1] = src.y;
    trailPositions[i*3+2] = src.z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  // Position sprites along the trail buffer, newest = biggest+brightest.
  const bufLen = trailBuf.length;
  for (let i = 0; i < TRAIL_SPRITES; i++) {
    // sample from the tail (newest) backward
    const idx = bufLen - 1 - Math.floor(i * (bufLen - 1) / (TRAIL_SPRITES - 1 || 1));
    const src = trailBuf[Math.max(0, idx)];
    const s = trailSprites[i];
    if (src) {
      s.position.copy(src);
      const t = 1 - i / TRAIL_SPRITES;         // 1 near head, ~0 at tail
      s.scale.setScalar(0.18 + 0.42 * t);
      s.material.opacity = 0.9 * t * t;
    } else {
      s.material.opacity = 0;
    }
  }
}
function clearTrail() {
  trailBuf.length = 0;
  for (let i = 0; i < TRAIL_LEN; i++) {
    trailPositions[i*3] = ball.position.x;
    trailPositions[i*3+1] = ball.position.y;
    trailPositions[i*3+2] = ball.position.z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  for (const s of trailSprites) s.material.opacity = 0;
}

// ═══════════════════════ Game state ═══════════════════════
const PLAYER_BASE_Z = HALF_L - 0.8;
const HIT_Z         = HALF_L - 1.2;
const HITTABLE_MS   = 250;
const AI_RETURN_RATE = 0.85;

const state = {
  mode: 'idle',
  server: 'you',
  ballVel: new THREE.Vector3(),
  ballFrom: 'you',
  rally: 0,
  scoreYou: 0,
  scoreCpu: 0,
  arriveTime: 0,
  hittableStart: 0,
  hittableEnd: 0,
  camShake: { until: 0, amp: 0 },
};

const $score  = document.getElementById('score');
const $rally  = document.getElementById('rally');
const $prompt = document.getElementById('prompt');
const $gest   = document.getElementById('gesture');
const $banner = document.getElementById('banner');
const $conf   = document.getElementById('hit-confirm');
const $stat   = document.getElementById('connect'); // hub pill doubles as status
const $tutorial = document.getElementById('tutorial');
const $sparkles = document.getElementById('sparkles');

// ── Tutorial overlay: show after 2s of no swing, hide once player swings. ──
let lastSwingActivityAt = performance.now();
let tutorialShown = false;
function markSwingActivity() {
  lastSwingActivityAt = performance.now();
  if (tutorialShown) {
    $tutorial.classList.remove('show');
    tutorialShown = false;
  }
}
function tutorialTick() {
  const idleFor = performance.now() - lastSwingActivityAt;
  const shouldShow = idleFor > 2000
                  && state.mode === 'idle'
                  && state.server === 'you'
                  && state.ballFrom === 'you';
  if (shouldShow && !tutorialShown) {
    $tutorial.classList.add('show');
    tutorialShown = true;
  } else if (!shouldShow && tutorialShown) {
    $tutorial.classList.remove('show');
    tutorialShown = false;
  }
}

// ── Sparkle shower on point win ──
function sparkleShower(cx, cy, count = 18) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.background = Math.random() < 0.5 ? '#f4c95d' : (Math.random() < 0.5 ? '#fbf3e0' : '#ff9663');
    const angle = (Math.random() - 0.5) * Math.PI * 1.1;   // spread outward
    const dist  = 120 + Math.random() * 220;
    const dx = Math.sin(angle) * dist;
    const dy = 60 + Math.abs(Math.cos(angle)) * dist * 0.7;
    const rot = (Math.random() - 0.5) * 720;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.animationDelay = (Math.random() * 120) + 'ms';
    $sparkles.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

function refreshScore() {
  $score.innerHTML =
    `<span class="you">you ${state.scoreYou}</span>` +
    `<span class="dash">·</span>` +
    `<span class="cpu">soup ${state.scoreCpu}</span>`;
  // Rally streak escalates visually at 3+.
  const r = state.rally;
  let streakClass = '';
  let flame = '';
  const FLAME = '<svg width="11" height="14" viewBox="0 0 11 14" aria-hidden="true"><path d="M5.5 1 C7 3.4 9.6 4.9 9.6 8.2 C9.6 11.2 7.7 13 5.5 13 C3.3 13 1.4 11.2 1.4 8.2 C1.4 6.3 2.4 5.2 3.2 4.1 C3.6 5.7 4.5 6.3 4.9 5.9 C5.3 5.3 4.8 3.3 5.5 1 Z" fill="#ff9663" stroke="#a5471d" stroke-width="1"/></svg>';
  const SPARK = '<svg width="11" height="11" viewBox="0 0 11 11" aria-hidden="true"><path d="M5.5 0 L6.7 4.3 L11 5.5 L6.7 6.7 L5.5 11 L4.3 6.7 L0 5.5 L4.3 4.3 Z" fill="#f4c95d" stroke="#c88c00" stroke-width=".7"/></svg>';
  if (r >= 6)      { streakClass = 'streak-3'; flame = `<span class="streak-flame">${FLAME}${FLAME}</span>`; }
  else if (r >= 4) { streakClass = 'streak-2'; flame = `<span class="streak-flame">${FLAME}</span>`; }
  else if (r >= 3) { streakClass = 'streak-1'; flame = `<span class="streak-flame">${SPARK}</span>`; }
  $rally.className = streakClass;
  $rally.innerHTML = `rally ${r}${flame ? ' ' + flame : ''}`;
}

function setPrompt(text, hidden = false) {
  $prompt.textContent = text;
  $prompt.classList.toggle('hidden', hidden);
}

function popGesture(text, color) {
  $gest.textContent = text;
  $gest.style.color = color || 'var(--hot)';
  $gest.classList.remove('pop'); void $gest.offsetWidth;
  $gest.classList.add('pop');
  setTimeout(() => $gest.classList.remove('pop'), 420);
}

function popBanner(text, kind) {
  $banner.className = '';
  if (kind) $banner.classList.add(kind);
  $banner.textContent = text;
  void $banner.offsetWidth;
  $banner.classList.add('pop');
  setTimeout(() => $banner.classList.remove('pop'), 900);
}

function fireHitConfirm(worldPos, power) {
  const p = worldPos.clone().project(camera);
  const px = (p.x *  0.5 + 0.5) * innerWidth;
  const py = (p.y * -0.5 + 0.5) * innerHeight;
  $conf.style.setProperty('--hit-x', px + 'px');
  $conf.style.setProperty('--hit-y', py + 'px');
  $conf.style.setProperty('--hit-power', power.toFixed(2));
  $conf.classList.remove('active'); void $conf.offsetWidth;
  $conf.classList.add('active');
}

function shakeCamera(power) {
  state.camShake.until = performance.now() + 260;
  state.camShake.amp = 0.06 + 0.18 * power;
}

// ═══════════════════════ Ball flight ═══════════════════════
const GRAVITY = 9.8;

function launchArc(from, to, flightMs) {
  const t = flightMs / 1000;
  const dx = to.x - from.x;
  const dz = to.z - from.z;
  const dy = to.y - from.y;
  ball.position.copy(from);
  const vx = dx / t;
  const vz = dz / t;
  const vy = (dy + 0.5 * GRAVITY * t * t) / t;
  state.ballVel.set(vx, vy, vz);
  state.mode = 'in_flight';
  state.arriveTime = performance.now() + flightMs;
  clearTrail();
}

function serveFromYou() {
  state.server = 'you';
  state.ballFrom = 'you';
  state.mode = 'idle';
  ball.position.set(0.4, 1.2, PLAYER_BASE_Z);
  clearTrail();
  setPrompt('give it a swing to serve');
}

function serveFromCpu() {
  state.server = 'cpu';
  state.ballFrom = 'cpu';
  ball.position.set(0, 1.4, cpu.position.z + 0.3);
  clearTrail();
  setPrompt('incoming, swing to return', true);
  setTimeout(() => {
    if (state.mode !== 'idle') return;
    cpuHitBall(true);
  }, 700);
}

function cpuHitBall(isServe = false) {
  const from = ball.position.clone();
  const targetX = (Math.random() - 0.5) * (COURT_W - 1.4);
  const targetZ = HIT_Z - (Math.random() * 1.5);
  const to = new THREE.Vector3(targetX, 1.0, targetZ);
  const flight = 900 + Math.random() * 350;
  state.ballFrom = 'cpu';
  launchArc(from, to, flight);
  state.hittableEnd = performance.now() + flight;
  state.hittableStart = state.hittableEnd - HITTABLE_MS;
  setPrompt('incoming, swing to return', false);
  // CPU swing animation
  soupAnim.swingStart = performance.now();
}

function playerHitBall(power, rollDeg) {
  const from = ball.position.clone();
  const aim = THREE.MathUtils.clamp(rollDeg / 45, -1, 1);
  const targetX = aim * (COURT_W/2 - 0.6);
  const targetZ = -HALF_L + 2.5 + (1 - power) * 3.0;
  const to = new THREE.Vector3(targetX, 1.0, targetZ);
  const flight = 1100 - power * 400;
  state.ballFrom = 'you';
  launchArc(from, to, flight);
  state.hittableEnd = performance.now() + flight;
  state.hittableStart = state.hittableEnd - HITTABLE_MS;
  fireHitConfirm(from, power);
  shakeCamera(power);
  setPrompt('nice return', true);
}

function cpuDecideReturn() {
  const returns = Math.random() < AI_RETURN_RATE;
  if (returns) {
    setTimeout(() => cpuHitBall(false), 180);
  } else {
    // CPU misses → trigger miss anim
    soupAnim.missStart = performance.now();
    scorePoint('you', 'soup missed');
  }
}

function scorePoint(winner, bannerText) {
  state.mode = 'point_end';
  // Sparkle shower + winning-soup hop
  const cx = innerWidth * 0.5;
  const cy = innerHeight * 0.42;
  sparkleShower(cx, cy, 22);
  if (winner === 'you') {
    state.scoreYou++;
    popBanner(bannerText || 'your point', '');
    playerAnim.hopStart = performance.now();
    shakeCamera(0.6);
  } else {
    state.scoreCpu++;
    popBanner(bannerText || "soup's point", 'cpu');
    soupAnim.hopStart = performance.now();
  }
  state.rally = 0;
  refreshScore();
  if (state.scoreYou >= 5 || state.scoreCpu >= 5) {
    const winMsg = state.scoreYou > state.scoreCpu ? 'you take the game' : 'soup takes the game';
    setTimeout(() => {
      popBanner(winMsg, state.scoreYou > state.scoreCpu ? '' : 'cpu');
      state.scoreYou = 0; state.scoreCpu = 0;
      setTimeout(() => { refreshScore(); nextServe(); }, 2400);
    }, 1200);
    return;
  }
  setTimeout(nextServe, 1400);
}

function nextServe() {
  const next = state.server === 'you' ? 'cpu' : 'you';
  if (next === 'you') serveFromYou();
  else                serveFromCpu();
}

// ═══════════════════════ Physics tick ═══════════════════════
function updateBall(dt) {
  if (state.mode !== 'in_flight') return;
  state.ballVel.y -= GRAVITY * dt;
  ball.position.addScaledVector(state.ballVel, dt);
  ball.rotation.x += 6 * dt;
  pushTrail(ball.position);
  ballShadow.position.x = ball.position.x;
  ballShadow.position.z = ball.position.z;
  const s = THREE.MathUtils.clamp(1.0 - ball.position.y * 0.3, 0.2, 1.0);
  ballShadow.scale.setScalar(s);
  ballShadow.material.opacity = 0.28 * s;

  if (ball.position.y <= 0.11 && state.ballVel.y < 0) {
    ball.position.y = 0.11;
    state.ballVel.y = -state.ballVel.y * 0.55;
    state.ballVel.x *= 0.9;
    state.ballVel.z *= 0.9;
  }

  const now = performance.now();
  if (state.ballFrom === 'cpu') {
    if (ball.position.z > PLAYER_BASE_Z + 1.5 || now > state.hittableEnd + 250) {
      scorePoint('cpu', 'missed');
    }
  } else {
    if (Math.abs(ball.position.x) > halfW + 0.8) {
      scorePoint('cpu', 'out');
      return;
    }
    if (ball.position.z < -HALF_L - 0.5) {
      scorePoint('cpu', 'out');
      return;
    }
    if (now >= state.arriveTime && state.mode === 'in_flight') {
      if (ball.position.z < 0) {
        state.mode = 'idle';
        state.rally++;
        refreshScore();
        cpuDecideReturn();
      }
    }
  }
}

// ═══════════════════════ Swing detector ═══════════════════════
// Tuned from live logs on the user's mount:
//   real forehand swings: pkGyro 970..1329, pkAcc 24..45
//   false-positive twitch: pkGyro 403, pkAcc 7 (drops below MIN_PEAK_ACC)
const GYRO_ARM_DPS  = 250;
const GYRO_QUIET_DPS = 90;
const QUIET_MS      = 80;
const MAX_ACTIVE_MS = 500;
const REFRACTORY_MS = 500;
const ACCEL_MIN     = 15;   // power floor
const ACCEL_MAX     = 50;   // saturates around a strong swing (~45)
const MIN_PEAK_ACC  = 15;   // commit gate: false-positive twitches sit at ~7

const swing = {
  phase: 'IDLE',
  startedAt: 0,
  refractoryUntil: 0,
  peakAccel: 0,
  peakGyro: 0,
  rollAtPeak: 0,
  yawSignAtPeak: 0,
  lastAboveT: 0,
};

function resetSwing() {
  swing.phase = 'IDLE';
  swing.peakAccel = 0;
  swing.peakGyro = 0;
  swing.rollAtPeak = 0;
  swing.yawSignAtPeak = 0;
}

function fireSwing() {
  // Commit gate: reject swings whose peak accel never really got going.
  // Real swings hit ~24+, false-positive twitches sit at ~7.
  if (swing.peakAccel < MIN_PEAK_ACC) {
    swing.phase = 'REFRACTORY';
    swing.refractoryUntil = performance.now() + REFRACTORY_MS;
    return;
  }
  const power = THREE.MathUtils.clamp(
    (swing.peakAccel - ACCEL_MIN) / (ACCEL_MAX - ACCEL_MIN), 0.15, 1.0);
  const roll = swing.rollAtPeak;
  const isForehand = swing.yawSignAtPeak >= 0;
  logTune('swing', {
    peakGyro: swing.peakGyro, peakAccel: swing.peakAccel,
    roll, power, forehand: isForehand ? 'F' : 'B',
  });
  handleSwing({ power, roll, forehand: isForehand });
  swing.phase = 'REFRACTORY';
  swing.refractoryUntil = performance.now() + REFRACTORY_MS;
}

function onRawSample(armId, s) {
  if (armId !== 0) return;
  const now = performance.now();
  if (swing.phase === 'REFRACTORY') {
    if (now >= swing.refractoryUntil) resetSwing();
    else return;
  }
  const accelMag = Math.hypot(s.ax, s.ay, s.az);
  const dynA = Math.abs(accelMag - 9.8);
  const gyroMag = Math.hypot(s.gx, s.gy, s.gz);

  if (swing.phase === 'IDLE') {
    if (gyroMag > GYRO_ARM_DPS) {
      swing.phase = 'ACTIVE';
      swing.startedAt = now;
      swing.peakAccel = dynA;
      swing.peakGyro = gyroMag;
      swing.rollAtPeak = s.roll;
      swing.yawSignAtPeak = Math.sign(s.gz || 0);
      swing.lastAboveT = now;
    }
    return;
  }

  if (dynA > swing.peakAccel) {
    swing.peakAccel = dynA;
    swing.rollAtPeak = s.roll;
    swing.yawSignAtPeak = Math.sign(s.gz || swing.yawSignAtPeak);
  }
  if (gyroMag > swing.peakGyro) swing.peakGyro = gyroMag;
  if (gyroMag > GYRO_QUIET_DPS) swing.lastAboveT = now;

  const quietFor = now - swing.lastAboveT;
  const activeFor = now - swing.startedAt;

  if (activeFor > MAX_ACTIVE_MS || quietFor > QUIET_MS) {
    if (swing.peakAccel > ACCEL_MIN * 0.4) {
      fireSwing();
    } else {
      swing.phase = 'REFRACTORY';
      swing.refractoryUntil = now + REFRACTORY_MS;
    }
  }
}

// ═══════════════════════ Swing → game event ═══════════════════════
function handleSwing({ power, roll, forehand }) {
  markSwingActivity();
  const now = performance.now();
  const inWindow = now >= state.hittableStart && now <= state.hittableEnd + 80;

  if (state.mode === 'idle' && state.server === 'you' && state.ballFrom === 'you') {
    popGesture(`serve ${Math.round(power*100)}`, '#ff9663');
    const from = ball.position.clone();
    const aim = THREE.MathUtils.clamp(roll / 45, -0.7, 0.7);
    const to = new THREE.Vector3(aim * (COURT_W/2 - 1.0), 1.0, -HALF_L + 3.0);
    launchArc(from, to, 1000 - power * 300);
    state.hittableEnd = performance.now() + (1000 - power * 300);
    state.hittableStart = state.hittableEnd - HITTABLE_MS;
    setPrompt('...', true);
    fireHitConfirm(from, power * 0.7);
    return;
  }

  if (state.mode === 'in_flight' && state.ballFrom === 'cpu') {
    if (inWindow) {
      popGesture(`${forehand ? 'forehand' : 'backhand'} ${Math.round(power*100)}`,
                 forehand ? '#ff9663' : '#37628a');
      playerHitBall(power, roll);
    } else {
      popGesture('miss', '#f4c95d');
    }
    return;
  }

  popGesture('swing', '#476278');
}

// ═══════════════════════ Main tick ═══════════════════════
let lastT = performance.now();
function tick() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  updateBall(dt);

  // CPU tracks the ball's x when incoming (moves the whole cpu group)
  if (state.mode === 'in_flight' && state.ballFrom === 'you') {
    const targetX = THREE.MathUtils.clamp(ball.position.x, -halfW + 0.5, halfW - 0.5);
    cpu.position.x += (targetX - cpu.position.x) * 3 * dt;
  } else {
    cpu.position.x += (0 - cpu.position.x) * 1.5 * dt;
  }

  // ─── Mascot procedural animation ───
  if (soupMascot) {
    const t = now / 1000;
    // idle bob + subtle breathe squish (root scale y)
    const bob = Math.sin(t * 2) * 0.02;
    // hop bump — additive, driven by cpuHopStart
    let hop = 0;
    if (soupAnim.hopStart) {
      const dth = now - soupAnim.hopStart;
      const HOP_DUR = 480;
      if (dth > HOP_DUR) soupAnim.hopStart = 0;
      else {
        const p = dth / HOP_DUR;
        // parabolic hop
        hop = Math.sin(p * Math.PI) * 0.35;
      }
    }
    soupMascot.position.y = soupBaseY + bob + hop;
    // squish on landing (last 20% of hop)
    let squish = 1;
    if (soupAnim.hopStart) {
      const p = (now - soupAnim.hopStart) / 480;
      if (p > 0.8) squish = 1 - (1 - (p - 0.8) / 0.2) * 0.15;
    }
    const breathe = 1 + Math.sin(t * 2) * 0.02;
    soupMascot.scale.set(CPU_SCALE, CPU_SCALE, CPU_SCALE * breathe * squish);

    // swing: BIG whole-body tilt + paws swing over 320ms
    // Body rotates around Z axis (world lean) while paws swing across.
    let swingLean = 0;
    if (soupAnim.swingStart) {
      const dt2 = now - soupAnim.swingStart;
      const DUR = 320;
      if (dt2 > DUR) {
        soupAnim.swingStart = 0;
        if (soupPaws) soupPaws.rotation.set(0, 0, 0);
      } else {
        const phase = dt2 / DUR;    // 0..1
        // paws: sinusoid 0 → 0.9 → 0
        if (soupPaws) soupPaws.rotation.z = Math.sin(phase * Math.PI) * 0.9;
        // body lean: quick tilt forward+across, spring back
        swingLean = Math.sin(phase * Math.PI) * 0.28;
      }
    }

    // miss: quick body tilt (bigger lean, springs back)
    let missLean = 0;
    if (soupAnim.missStart) {
      const dt2 = now - soupAnim.missStart;
      const dur = 500;
      if (dt2 > dur) {
        soupAnim.missStart = 0;
      } else {
        const phase = dt2 / dur;
        missLean = phase < 0.35
          ? (phase / 0.35) * 0.55
          : (1 - (phase - 0.35) / 0.65) * 0.55;
      }
    }

    // apply combined lean; base y-rotation stays at 0 (facing player)
    soupMascot.rotation.y = 0;
    soupMascot.rotation.z = swingLean + missLean;
  }

  // Player-side soup — gentle idle bob + celebratory hop
  if (playerSoup) {
    let hop = 0;
    if (playerAnim.hopStart) {
      const dth = now - playerAnim.hopStart;
      const HOP_DUR = 480;
      if (dth > HOP_DUR) playerAnim.hopStart = 0;
      else hop = Math.sin((dth / HOP_DUR) * Math.PI) * 0.35;
    }
    playerSoup.position.y = Math.sin(now / 500) * 0.02 + hop;
  }

  // Tutorial overlay show/hide
  tutorialTick();

  // Cloud drift
  for (const c of clouds) {
    c.position.x += c.userData.driftSpeed * dt;
    if (c.position.x > 40) c.position.x = -40;
  }

  // Camera shake
  const shake = state.camShake.until > now ? (state.camShake.until - now) / 260 : 0;
  camera.position.x = camHome.x + (Math.random() - 0.5) * state.camShake.amp * shake;
  camera.position.y = camHome.y + (Math.random() - 0.5) * state.camShake.amp * shake * 0.7;
  camera.lookAt(0, 0.6, 0);

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ═══════════════════════ Serial wire-up ═══════════════════════
// Tune-log helpers.
const $tuneLog = document.getElementById('tune-log');
const $tuneCount = document.getElementById('tune-log-count');
let tuneRows = 0;
function logTune(kind, f) {
  if (!$tuneLog) return;
  const pad = (v, w=5, p=1) => (typeof v === 'number' ? v.toFixed(p) : String(v)).padStart(w);
  const row = `${kind.padEnd(8)} pkGyro=${pad(f.peakGyro,5,0)} pkAcc=${pad(f.peakAccel,5,1)} roll=${pad(f.roll,6,1)} pwr=${pad(f.power,4,2)} side=${f.forehand}\n`;
  $tuneLog.value += row;
  $tuneLog.scrollTop = $tuneLog.scrollHeight;
  tuneRows++;
  if ($tuneCount) $tuneCount.textContent = `${tuneRows} row${tuneRows === 1 ? '' : 's'}`;
}
document.getElementById('tune-log-copy')?.addEventListener('click', async () => {
  if (!$tuneLog?.value) return;
  try { await navigator.clipboard.writeText($tuneLog.value); }
  catch { $tuneLog.select(); document.execCommand('copy'); }
});
document.getElementById('tune-log-clear')?.addEventListener('click', () => {
  if ($tuneLog) $tuneLog.value = '';
  tuneRows = 0;
  if ($tuneCount) $tuneCount.textContent = '0 rows';
});

const dispatcher = new ArmDispatcher(() => {});
const origOnLine = dispatcher.onLine.bind(dispatcher);
dispatcher.onLine = (line) => {
  origOnLine(line);
  if (!line || line[0] === '#' || line.startsWith('ERR')) return;
  const parts = line.split(',');
  let armId = 0, offset = 0;
  if (parts.length === 10) { armId = +parts[0]; offset = 1; }
  else if (parts.length !== 9) return;
  const s = {
    t_us: +parts[offset],
    ax: +parts[offset + 1], ay: +parts[offset + 2], az: +parts[offset + 3],
    gx: +parts[offset + 4], gy: +parts[offset + 5], gz: +parts[offset + 6],
    roll: +parts[offset + 7], pitch: +parts[offset + 8],
  };
  if (!Number.isNaN(s.ax)) onRawSample(armId, s);
};

const serialHandlers = {
  baud: 115200,
  onLine: (line) => dispatcher.onLine(line),
  onOpen:  () => { $stat.textContent = 'hub connected';
                   $stat.classList.add('connected'); },
  onClose: () => { $stat.textContent = 'hub disconnected';
                   $stat.classList.remove('connected'); },
  onError: () => { $stat.textContent = 'hub error, try again';
                    $stat.classList.remove('connected'); },
};
document.getElementById('connect').addEventListener('click', async () => {
  try {
    $stat.textContent = 'choosing port…';
    await openSerial(serialHandlers);
  } catch (e) { $stat.textContent = 'connect hub'; }
});
// Silent reconnect if hub was authorized on a prior page.
autoOpenSerial(serialHandlers).catch(() => {});

// ═══════════════════════ Dev shortcuts ═══════════════════════
addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    handleSwing({ power: 0.7 + Math.random() * 0.3,
                  roll: (Math.random() - 0.5) * 30,
                  forehand: true });
  } else if (e.key === 'a' || e.key === 'A') {
    popGesture('miss', '#f4c95d');
    if (state.mode === 'in_flight' && state.ballFrom === 'cpu') {
      state.hittableStart = -Infinity;
      state.hittableEnd = performance.now() - 500;
    }
  } else if (e.key === 'n' || e.key === 'N') {
    if (state.mode === 'in_flight' && state.ballFrom === 'cpu') {
      ball.position.set(0, 1.0, HIT_Z);
      state.arriveTime = performance.now() + 100;
      state.hittableEnd = performance.now() + 100;
      state.hittableStart = state.hittableEnd - HITTABLE_MS;
    }
  }
});

// ═══════════════════════ Kick off ═══════════════════════
refreshScore();
clearTrail();
serveFromYou();
